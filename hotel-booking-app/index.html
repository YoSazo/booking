<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.jpg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Suite Stay</title>

    <!-- Webkit/Safari Safety Script -->
    <script>
      (function() {
        // Prevent webkit-specific bugs and ensure compatibility
        if (/Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent)) {
          // Fix for Safari input autofill issues
          document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(function(input) {
              // Force Safari to respect autocomplete attributes
              input.setAttribute('autocomplete', input.getAttribute('autocomplete') || 'off');
            });
          });

          // Fix for Safari scroll issues with fixed elements
          document.addEventListener('touchstart', function() {}, { passive: true });

          console.log('Safari/Webkit optimizations applied');
        }
      })();
    </script>

    <!-- Analytics and session-recording IDs removed from the handoff build.
         Configure your own GA, Meta Pixel, and Smartlook settings before enabling tracking. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
