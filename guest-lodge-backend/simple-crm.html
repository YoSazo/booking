<!DOCTYPE html>
<!-- SOURCE OF TRUTH for Front Desk. Run `npm run build:frontdesk` after edits. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Marketel · Front Desk</title>
  <link rel="manifest" href="/manifest-simple-crm.json">
  <meta name="theme-color" content="#EEF2EF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Front Desk">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root {
      --green: #2E7D5B; --green-light: #4CAF7D; --green-pale: #E8F5EE;
      --green-mint: #C8EDD9; --green-dark: #245F46; --bg: #EEF2EF; --white: #FFFFFF;
      --surface-subtle: #F4F8F5; --text: #1A2B22; --text-muted: #6B7D72;
      --text-soft: #4B5D52; --border: #D8E4DC; --border-soft: #E6EEE9;
      --red: #E05252; --amber: #F59E0B;
      --shadow-sm: 0 1px 2px rgba(26,43,34,0.04), 0 1px 3px rgba(46,125,91,0.06);
      --shadow: 0 2px 6px rgba(46,125,91,0.06), 0 8px 20px rgba(46,125,91,0.08);
      --shadow-lg: 0 4px 14px rgba(46,125,91,0.08), 0 18px 44px rgba(46,125,91,0.13);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif; color: var(--text); min-height: 100vh; overflow-x: hidden;
      background: var(--bg);
      background-image: radial-gradient(1200px 600px at 50% -10%, #FBFDFC 0%, rgba(251,253,252,0) 60%), linear-gradient(180deg, #F2F7F4 0%, var(--bg) 220px);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility; letter-spacing: -0.01em;
    }
    /* Prevent iOS zoom on input focus (exclude WYSIWYG preview inputs) */
    input, textarea, select { font-size: 16px !important; }
    #edit-hotel-name { font-size: 24px !important; }
    #edit-hotel-subtitle { font-size: 14px !important; }
    #edit-hotel-address { font-size: 13px !important; }
    #edit-hotel-phone { font-size: 13px !important; }
    #edit-hotel-phone::placeholder { color: #999 !important; opacity: 1; }
    #edit-hotel-name::placeholder, #edit-hotel-subtitle::placeholder, #edit-hotel-address::placeholder { color: #999 !important; opacity: 1; }
    #edit-hotel-policy { font-size: 11px !important; }

    /* ── LOGIN ── */
    .login-screen {
      min-height: 100vh; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      padding: 16px;
      background: linear-gradient(135deg, #1a2b22 0%, #2E7D5B 100%);
    }
    .login-card {
      background: white; border-radius: 20px;
      padding: clamp(28px, 8vw, 40px) clamp(22px, 6vw, 36px);
      width: min(340px, 100%); max-width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .status-card {
      width: min(420px, calc(100vw - 32px));
      padding: 40px 32px;
    }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .login-logo-icon { height: 48px; width: auto; }
    .login-logo-text { height: 28px; width: auto; }
    .login-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    /* D21: hotel-led login brand */
    .login-hotel-brand { margin-bottom: 22px; }
    .login-hotel-icon {
      width: 56px; height: 56px; border-radius: 14px; margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
      background: var(--green); color: #fff; font-size: 26px; font-weight: 800;
      box-shadow: 0 6px 18px rgba(46,125,91,0.25);
    }
    .login-hotel-icon img { width: 100%; height: 100%; object-fit: cover; }
    .login-hotel-name { font-size: 22px; font-weight: 800; color: var(--text); margin: 0 0 4px; line-height: 1.25; }
    .login-card .login-descriptor { font-size: 13px; color: var(--text-muted); margin: 0; }
    .login-footer {
      margin-top: 22px; padding-top: 16px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 7px;
      font-size: 11px; color: var(--text-muted);
    }
    .login-footer-logo { height: 13px; width: auto; opacity: 0.65; }
    .status-title {
      font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 12px;
    }
    .status-message {
      font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 0;
    }
    .status-spinner-wrap {
      display: flex; align-items: center; justify-content: center; margin: 18px 0 8px;
    }
    .status-spinner {
      width: 28px; height: 28px; border-width: 3px;
    }
    .status-debug {
      margin-top: 18px; padding: 12px 14px; border-radius: 12px; background: var(--bg);
      color: var(--text-muted); font-size: 12px; line-height: 1.5; text-align: left;
      word-break: break-word; display: none;
    }
    .status-actions { margin-top: 18px; }
    .login-input {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: 12px; font-family: inherit; font-size: 18px; text-align: center;
      letter-spacing: 4px; outline: none; margin-bottom: 12px; color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .login-input:focus { border-color: var(--green); box-shadow: 0 0 0 4px var(--green-pale); }
    .login-btn {
      width: 100%; padding: 13px; min-height: 48px;
      background: linear-gradient(135deg, var(--green-light) 0%, var(--green) 60%, var(--green-dark) 100%);
      color: white; box-shadow: 0 6px 18px rgba(46,125,91,0.3);
      border: none; border-radius: 12px; font-family: inherit; font-size: 16px;
      font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    }
    .login-btn:disabled { opacity: 0.72; cursor: wait; transform: none; box-shadow: 0 4px 12px rgba(46,125,91,0.2); }
    @media (hover: hover) and (pointer: fine) {
      .login-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 9px 26px rgba(46,125,91,0.38); }
    }
    .login-btn:active:not(:disabled) { transform: scale(0.98); }
    .login-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 20px; }

    /* ── HEADER ── */
    .header {
      background: rgba(255,255,255,0.78);
      -webkit-backdrop-filter: saturate(1.4) blur(14px); backdrop-filter: saturate(1.4) blur(14px);
      border-bottom: 1px solid var(--border-soft);
      padding: 8px 16px; min-height: 58px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 18px rgba(46,125,91,0.06);
      gap: 8px; flex-wrap: wrap;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; color: var(--text); flex-shrink: 0; }
    .header-logo-icon { height: 32px; width: auto; }
    .header-logo-text { height: 20px; width: auto; }
    .header-logo-suffix { margin-left: 2px; color: var(--text-muted); font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stat-pill {
      background: var(--green-pale); border-radius: 20px; padding: 4px 12px;
      font-size: 12px; font-weight: 600; color: var(--green); display: flex; align-items: center; gap: 4px;
    }
    .refresh-btn {
      background: var(--green-pale); border: 1.5px solid var(--border); border-radius: 8px;
      padding: 5px 12px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--green); cursor: pointer; transition: all 0.15s;
    }
    .refresh-btn:hover { background: var(--green); color: white; border-color: var(--green); }
    .refresh-btn.notify-on {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .refresh-btn.notify-off {
      background: #f2f4f3;
      border-color: var(--border);
      color: var(--text-muted);
    }
    .refresh-btn.notify-off:hover {
      background: var(--green-pale);
      border-color: var(--green);
      color: var(--green);
    }

    /* ── LAYOUT ── */
    .container { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

    /* TABS */
    .tabs-container {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 5px;
      box-shadow: var(--shadow-sm);
      -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
      position: relative;
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    .tabs-container::-webkit-scrollbar { display: none; }

    .tabs-slider {
      position: absolute;
      top: 5px;
      left: 5px;
      height: calc(100% - 10px);
      background: var(--white);
      border-radius: 11px;
      box-shadow: 0 2px 8px rgba(46,125,91,0.13), 0 1px 3px rgba(0,0,0,0.07);
      transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.38s cubic-bezier(0.34, 1.56, 0.64, 1), height 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 0;
      will-change: transform, width, height;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: none;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.22s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
      border-radius: 11px;
      white-space: nowrap;
      user-select: none;
    }

    .tab:hover {
      color: var(--text);
      background: none;
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: transparent;
    }

    .tab-badge {
      background: var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      transition: background 0.22s ease, color 0.22s ease, transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab.active .tab-badge {
      background: var(--green-pale);
      color: var(--green);
      transform: scale(1.08);
    }

    /* Tab ripple on click */
    .tab::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 11px;
      background: var(--green);
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.15s, transform 0.15s;
      z-index: -1;
      pointer-events: none;
    }

    .tab:active::after {
      opacity: 0.07;
      transform: scale(1);
    }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .count-badge {
      background: var(--green); color: white;
      padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }

    /* ── BOOKING CARD ── */
    .booking-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      box-shadow: var(--shadow); margin-bottom: 14px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }
    .booking-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--green-mint); }

    .card-accent { height: 5px; background: linear-gradient(90deg, var(--green) 0%, var(--green-light) 100%); }
    .card-accent.declined { background: linear-gradient(90deg, var(--amber) 0%, #FBBF24 100%); }

    .card-inner { padding: 20px 22px; }

    /* TOP ROW */
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 17px; }
    .guest-info { display: flex; flex-direction: column; gap: 4px; }
    .guest-name { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; letter-spacing: -0.02em; }
    .guest-time { font-size: 15px; color: var(--text-muted); font-weight: 500; }

    .card-amount { 
      font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 700;
      color: var(--green); text-align: right; flex-shrink: 0; margin-left: 17px;
    }

    /* META ROW */
    .card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 17px; align-items: center; }
    .meta-chip {
      display: flex; align-items: center; gap: 4px; background: var(--bg);
      border-radius: 10px; padding: 4px 11px; font-size: 15px; color: var(--text-muted); font-weight: 500;
    }
    .declined-chip {
      background: #FEF3C7; color: #92400E; border-radius: 10px;
      padding: 4px 11px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .pay-chip {
      background: #DBEAFE; color: #1E40AF; border-radius: 10px;
      padding: 4px 11px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }

    /* DATES */
    .card-dates {
      display: flex; gap: 0; margin-bottom: 17px;
      background: var(--bg); border-radius: 14px; overflow: hidden;
      border: 2px solid var(--border);
    }
    .date-block {
      flex: 1; padding: 11px 17px; display: flex; flex-direction: column; gap: 3px;
    }
    .date-block + .date-block { border-left: 2px solid var(--border); }
    .date-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: var(--text-muted); }
    .date-value { font-size: 18px; font-weight: 600; color: var(--text); }

    /* CONTACT ROW */
    .card-contact { display: flex; align-items: center; justify-content: space-between; margin-bottom: 17px; gap: 14px; }
    .contact-details { display: flex; flex-direction: column; gap: 3px; }
    .contact-phone { font-size: 25px; font-weight: 700; color: var(--green); font-family: 'DM Mono', monospace; }
    .contact-email { font-size: 15px; color: var(--text-muted); }

    .phone-call-btn {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--green-light) 0%, var(--green) 60%, var(--green-dark) 100%);
      color: white;
      border: none; border-radius: 14px; padding: 13px 22px;
      font-family: inherit; font-size: 18px; font-weight: 700;
      cursor: pointer; text-decoration: none; transition: all 0.15s;
      flex-shrink: 0; box-shadow: 0 4px 14px rgba(46,125,91,0.28);
    }
    .phone-call-btn:hover { transform: translateY(-1px) scale(1.02); box-shadow: 0 6px 20px rgba(46,125,91,0.36); }

    /* FOOTER */
    .card-footer { display: flex; gap: 11px; padding-top: 17px; border-top: 1.4px solid var(--border); }
    .btn {
      flex: 1; padding: 13px 17px; border-radius: 14px; font-family: inherit;
      font-size: 17px; font-weight: 600; cursor: pointer; border: 2px solid transparent;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-confirm {
      background: linear-gradient(135deg, var(--green-light) 0%, var(--green) 60%, var(--green-dark) 100%);
      color: white; box-shadow: 0 4px 14px rgba(46,125,91,0.26);
    }
    .btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 7px 22px rgba(46,125,91,0.34); }
    .btn-note { background: var(--white); color: var(--text); border-color: var(--border); }
    .btn-note:hover { border-color: var(--green); color: var(--green); background: var(--green-pale); }
    .btn-note-quiet {
      color: var(--text-muted);
      opacity: 0.8;
    }
    .btn-note-quiet:hover {
      opacity: 1;
      border-color: var(--border);
      color: var(--text);
      background: var(--bg);
    }

    /* ── STATES ── */
    .empty-state {
      text-align: center; padding: 64px 20px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-sub { font-size: 13px; color: var(--text-muted); }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; font-size: 14px; color: var(--text-muted); gap: 10px;
    }
    .availability-day-saving-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.94);
      border-radius: inherit;
    }
    .availability-day-saving-overlay[hidden] { display: none; }
    .availability-day-saving-inner {
      height: auto;
      flex-direction: column;
      gap: 12px;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    /* Notes Section */
    .card-notes {
      margin-top: 12px;
      padding: 12px;
      background: var(--surface-subtle);
      border-radius: 10px;
      border: 1px solid var(--border-soft);
    }
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .notes-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .notes-count {
      font-size: 11px;
      background: var(--green-pale);
      color: var(--green);
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .notes-content {
      font-size: 13px;
      color: var(--text-soft);
      line-height: 1.5;
      white-space: pre-wrap;
      max-height: 100px;
      overflow-y: auto;
    }
    .notes-empty {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Notes Modal */
    .notes-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 43, 34, 0.45);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .notes-modal {
      background: var(--white);
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
      animation: modalSlideUp 0.2s ease-out;
    }
    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .notes-modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .notes-modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .notes-modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: var(--surface-subtle);
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .notes-modal-close:hover {
      background: var(--green-pale);
      color: var(--green);
    }
    .notes-modal-body {
      padding: 24px;
    }
    .notes-input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 8px;
    }
    .notes-input {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .notes-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px var(--green-pale);
    }
    .notes-modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-soft);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .notes-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      font-family: inherit;
    }
    .notes-btn-cancel {
      background: var(--surface-subtle);
      color: var(--text-muted);
    }
    .notes-btn-cancel:hover {
      background: var(--border);
    }
    .notes-btn-save {
      background: var(--green);
      color: #fff;
    }
    .notes-btn-save:hover {
      background: var(--green-dark);
    }

    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 7px; }
    .toast {
      background: var(--text); color: white; border-radius: 11px; padding: 11px 16px;
      font-size: 12px; font-weight: 600; box-shadow: var(--shadow-lg);
      display: flex; align-items: center; gap: 7px;
      animation: slideInR 0.2s ease, fadeOut 0.3s ease 2.7s forwards;
    }
    @keyframes slideInR { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeOut { to{opacity:0;transform:translateX(20px)} }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    .availability-view { margin-top: 8px; display: flex; flex-direction: column; gap: 12px; }
    .rooms-shell { display: flex; flex-direction: column; gap: 12px; }
    .room-pill-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .room-pill-wrap { display: inline-flex; align-items: center; gap: 6px; }
    .room-pill {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .room-pill:hover { border-color: var(--green); color: var(--green); }
    .room-pill.active { background: var(--green); border-color: var(--green); color: #fff; }
    .room-pill-action {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .room-pill-action:hover { border-color: var(--green); color: var(--green); }
    .room-pill-action.danger:hover { border-color: var(--red); color: var(--red); }
    .room-pill-add {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .room-pill-add:hover { border-color: var(--green); color: var(--green); }
    .room-mobile-actions {
      display: none;
      gap: 8px;
      margin-top: 12px;
    }
    .room-mobile-action-btn {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: var(--white);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .room-mobile-action-btn:hover { border-color: var(--green); color: var(--green); }
    .room-mobile-action-btn.danger:hover { border-color: var(--red); color: var(--red); }

    .availability-card {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .availability-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .availability-help { font-size: 12px; color: var(--text-muted); }
    .availability-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 30px 10px;
      font-size: 14px;
    }
    .two-room-explainer {
      background: linear-gradient(135deg, #f0f7f3 0%, #e8f0ec 100%);
      border: 1.5px solid #c5ddd0;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 14px;
      text-align: left;
    }
    .two-room-explainer-title {
      font-size: 13px;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 10px;
    }
    .two-room-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .two-room-col {

let lucideLoadPromise = null;
function ensureLucideLoaded() {
  if (typeof lucide !== 'undefined') return Promise.resolve();
  if (lucideLoadPromise) return lucideLoadPromise;
  lucideLoadPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js';
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('lucide load failed'));
    document.head.appendChild(s);
  });
  return lucideLoadPromise;
}

async function optimizeRoomPhotoForUpload(file) {
  if (!file || !file.type.startsWith('image/')) return file;
  if (file.type === 'image/webp' && file.size < 400000) return file;
  try {
    const bitmap = await createImageBitmap(file);
    const maxW = 1600;
    const maxH = 1200;
    let w = bitmap.width;
    let h = bitmap.height;
    const scale = Math.min(1, maxW / w, maxH / h);
    w = Math.round(w * scale);
    h = Math.round(h * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
    bitmap.close();
    const blob = await new Promise((resolve, reject) => {
      canvas.toBlob((b) => (b ? resolve(b) : reject(new Error('encode failed'))), 'image/webp', 0.82);
    });
    const base = (file.name || 'room-photo').replace(/\.[^.]+$/, '') || 'room-photo';
    return new File([blob], base + '.webp', { type: 'image/webp' });
  } catch (_) {
    return file;
  }
}

// Point the page's manifest at this hotel's dynamic Front Desk manifest so the
// installed app is branded as their hotel (name + icon). Also refresh the
// iOS-specific tags (apple-touch-icon + title) because iOS reads THOSE from the
// DOM at "Add to Home Screen" time and largely ignores manifest icons — and it
// only accepts PNG, never SVG, so a custom uploaded icon (photo/PNG) or our
// PNG fallback is what makes the home-screen icon render instead of blank.
function updateFrontdeskManifestLink() {
  if (!activeHotelId) return;
  const link = document.querySelector('link[rel="manifest"]');
  if (link) {
    link.href = '/api/hotel/' + encodeURIComponent(activeHotelId) + '/frontdesk-manifest.webmanifest';
  }
  try {
    // The Front Desk ALWAYS uses the Marketel logo — it's the owner's back-office
    // app and must look distinct from the hotel's guest booking engine (which uses
    // the custom uploaded icon). So we never swap in activeHotelAppIcon here.
    let appleLink = document.querySelector('link[rel="apple-touch-icon"]');
    if (!appleLink) {
      appleLink = document.createElement('link');
      appleLink.rel = 'apple-touch-icon';
      document.head.appendChild(appleLink);
    }
    appleLink.href = '/apple-touch-icon.png';
    // Home-screen label should be short — just the hotel name (iOS shows the
    // app full-screen so "Front Desk" context is obvious once it's open).
    const titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
    if (titleMeta) titleMeta.content = activeHotelName || 'Front Desk';
  } catch (_) {}
}

async function syncNotificationButtonState() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    setNotificationButtonState(false);
    return;

  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();

    setNotificationButtonState(enabled);
  } catch (e) {

}

function resolveLegacyCrmHotelId() {
  const overrideHotelId = getContextParam('hotelId');
  if (overrideHotelId) return overrideHotelId;

  const host = getDetectedHostname();
  if (host && CRM_HOTEL_BY_HOST[host]) return CRM_HOTEL_BY_HOST[host];
  if (!host || host === 'localhost' || host === '127.0.0.1' || host.endsWith('.onrender.com') || host.endsWith('.vercel.app')) {
    return 'guest-lodge-minot';
  }
  return '';
}

function applyLegacyHotelContext(hotelId, reason = '') {
  const cleanHotelId = String(hotelId || '').trim();
  if (!cleanHotelId) return false;
  activeHotelId = cleanHotelId;
  activeHotelName = CRM_HOTEL_LABELS[cleanHotelId] || cleanHotelId;
  activeHotelDomain = getDetectedHostname();
  activeHotelContext = {
    hotelId: cleanHotelId,
    domain: activeHotelDomain || '',
    config: {
      id: cleanHotelId,
      name: activeHotelName,
      source: 'legacy-fallback',
    },
  };
  updateHotelChrome();
  if (reason && window.console && typeof window.console.warn === 'function') {
    window.console.warn('Falling back to legacy CRM hotel resolution.', { hotelId: cleanHotelId, reason });
  }
  return true;
}

function buildHotelContextUrl() {
  const url = new URL('/api/hotel-context', window.location.origin);
  const overrideHotelId = getContextParam('hotelId');
  const overrideDomain = getContextParam('domain');
  if (overrideHotelId) url.searchParams.set('hotelId', overrideHotelId);
  // Always pass the current hostname so the backend can resolve the hotel
  // even if x-forwarded-host is not set by the proxy
  const domain = overrideDomain || getDetectedHostname();
  if (domain) url.searchParams.set('domain', domain);
  return url.toString();
}

}

function showHotelContextError(error) {
  const status = Number(error && error.status) || 0;
  const host = getDetectedHostname() || 'unknown';
  const domain = (error && error.domain) ? String(error.domain) : '';
  const message = (error && error.message) ? String(error.message) : 'Could not load hotel context.';
  const debug = formatContextDebugLines([
    `Detected host: ${host}`,
    domain && domain !== host ? `Resolved domain: ${domain}` : '',
    activeHotelId ? `Hotel ID: ${activeHotelId}` : '',
  ]);

  if (!status) {
    showBootState({
      title: 'Network error',
      message: 'Could not reach the server to resolve this hotel. Check the network connection and try again.',
      debug,
      showRetry: true,
    });
    return;
  }

  showBootState({
    title: status === 404 ? 'Hotel not linked'
      : status === 403 ? 'Hotel inactive'
      : 'Hotel context error',
    message,
    debug,
    showRetry: true,
  });
}

async function loadHotelContext() {
  const res = await fetch(buildHotelContextUrl(), { headers: { 'Accept': 'application/json' } });
  const json = await res.json().catch(() => ({}));
  if (!res.ok || !json.success) {
    const err = new Error(json.message || `Failed to load hotel context (${res.status})`);
    err.status = res.status;
    err.domain = (json && json.domain) || getDetectedHostname();
    throw err;
  }

  const data = json.data || {};
  const config = data.config || {};
  if (!data.hotelId) {
    const err = new Error('Hotel context response is missing hotelId.');
    err.status = 500;
    throw err;
  }

  activeHotelId = String(data.hotelId || '').trim();
  activeHotelName = String(config.name || data.hotelId || '').trim();
  activeHotelAppIcon = String(config.appIconUrl || '').trim();
  activeHotelDomain = String(data.domain || getDetectedHostname() || '').trim();
  activeHotelContext = data;
  updateHotelChrome();
  return data;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toIsoDate(dateLike) {
  if (!dateLike) return '';
  if (typeof dateLike === 'string' && dateLike.length >= 10) {
    if (dateLike.includes('T')) return dateLike.split('T')[0];
    return dateLike.slice(0, 10);
  }
  const d = new Date(dateLike);
  if (Number.isNaN(d.getTime())) return '';
  // Ensure we use the local date values to prevent UTC-shifting the day
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function addDaysIso(days) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function enumerateDates(startIso, endIso, maxDays = 180) {
  if (!startIso || !endIso || endIso < startIso) return [];
  const out = [];
  let cursor = new Date(`${startIso}T00:00:00.000Z`);
  const end = new Date(`${endIso}T00:00:00.000Z`);
  while (cursor <= end && out.length < maxDays) {
    out.push(cursor.toISOString().slice(0, 10));
    cursor = new Date(cursor.getTime() + 86400000);
  }
  return out;
}

function formatCurrencyCompact(value) {
  const amount = Number(value || 0);
  const abs = Math.abs(amount);
  if (abs >= 1000) {
    const compact = (amount / 1000).toFixed(abs >= 100000 ? 0 : 1).replace(/\.0$/, '');
    return `$${compact}k`;
  }
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    maximumFractionDigits: 0,
  }).format(amount);
}

function revenuePeriodLabel(period) {
  if (period === 'all') return 'All time';
  if (period === 'today') return 'Today';
  if (period === '7d') return 'Last 7 days';
  return 'Last 30 days';
}

function normalizeRevenuePeriod(period) {
  if (ALLOWED_REVENUE_PERIODS.has(period)) return period;
  return '30d';
}

function renderRevenueRooms(rooms) {
  const list = document.getElementById('revenueRoomList');
  if (!list) return;

  const items = Array.isArray(rooms) ? rooms : [];
  if (!items.length) {
    list.innerHTML = '<div class="revenue-empty-inline">No room revenue yet for this period.</div>';
    return;
  }

  list.innerHTML = items.map((room) => `
      <div class="revenue-room-row revenue-room-row--simple">
        <div class="revenue-room-name">${esc(room.name || 'Room')}</div>
        <div class="revenue-room-value">${esc(formatCurrencyCompact(room.rev))}</div>
      </div>
    `).join('');
}

function renderRevenueView() {
  syncRevenueUi();
  const view = document.getElementById('revenueView');
  if (!view) return;
  revenuePeriod = normalizeRevenuePeriod(revenuePeriod);

  const statusEl = document.getElementById('revenueStatus');
  const contentEl = document.getElementById('revenueContent');
  const subhintEl = document.getElementById('revenueSubhint');
  const periodButtons = document.querySelectorAll('.revenue-period-btn');
  const currentPeriodLabel = revenuePeriodLabel(revenuePeriod);
  if (subhintEl) subhintEl.textContent = `${currentPeriodLabel} · stay dates`;
  periodButtons.forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.period === revenuePeriod);
  });
  const data = revenueCache[revenuePeriod] || null;

  if (!data) {
    if (contentEl) contentEl.style.display = 'none';
    if (statusEl) {
      if (revenueLoading) {
        statusEl.innerHTML = '<div class="loading"><div class="logo-sprite-bounce"></div> Loading revenue...</div>';
      } else if (revenueError) {
        statusEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">!</div>
            <div class="empty-text">Could not load revenue</div>
            <div class="empty-sub">${esc(revenueError)}</div>
          </div>`;
      } else {
        statusEl.innerHTML = '';
      }
    }
    return;
  }

  if (statusEl) statusEl.innerHTML = '';
  if (contentEl) contentEl.style.display = 'block';

  const revEl = document.getElementById('revenueKpiRev');
  const bookingsEl = document.getElementById('revenueKpiBookings');
  const savedEl = document.getElementById('revenueKpiSaved');
  const savedCopyEl = document.getElementById('revenueSavingsCopy');
  const revenueValue = Number(data.rev || 0);
  if (revEl) revEl.textContent = formatCurrencyCompact(revenueValue);
  if (bookingsEl) bookingsEl.textContent = String(data['bookings'] || 0);
  const savedAmount = revenueValue * OTA_COMMISSION_RATE;
  if (savedEl) savedEl.textContent = formatCurrencyCompact(savedAmount);
  if (savedCopyEl) savedCopyEl.textContent = revenuePeriod === 'today' ? 'You saved today' : `You saved (${currentPeriodLabel.toLowerCase()})`;
  renderRevenueRooms(data.rooms);
}

async function loadRevenueData(force = false) {
  if (!revenueEnabled) return;
  if (settingsTourActive) {
    seedTourRevenueShell();
    renderRevenueView();
    return;
  }
  revenuePeriod = normalizeRevenuePeriod(revenuePeriod);

  const cached = revenueCache[revenuePeriod];
  if (cached && !force) {
    revenueError = '';
    renderRevenueView();
    return;
  }

  revenueLoading = true;
  revenueError = '';
  renderRevenueView();

  try {
    const data = await api('GET', `/api/crm/revenue?period=${encodeURIComponent(revenuePeriod)}`);
    if (!data.success) throw new Error(data.message || 'Failed to load revenue');
    revenueCache[revenuePeriod] = data.data || {};
  } catch (e) {
    revenueError = e.message || 'Failed to load revenue';
  } finally {
    revenueLoading = false;
    renderRevenueView();
  }
}

// ── LOGIN ──────────────────────────────────────────────
async function verifyCrmToken(pin) {
  if (!activeHotelId) throw new Error('Hotel context is not ready yet.');
  const res = await fetch(`/api/crm/verify?hotelId=${encodeURIComponent(activeHotelId)}`, {
    headers: { 'x-crm-token': pin }
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok || !json.success) {
    throw new Error(json.message || (res.status === 401 ? 'Wrong PIN' : 'Could not verify access'));
  }
  return json;
}

function blockedDemandLineHtml() {
  if (!blockedDemand || blockedDemand.total < 1) return '';

  return `

      ${n} guest${n > 1 ? 's' : ''} tried to book ${when} — activate to accept reservations like these.
    </div>`;
}

// high-intent moments (Bookings empty state, Your page, Phones). When real
// blocked demand exists, the pill upgrades to a proof-of-demand nudge, since

      </div>`;
  }
  return `
    <div onclick="goLive()" role="button" tabindex="0" style="display:flex;align-items:center;gap:10px;background:#eef6f1;border:1px solid #cfe6da;border-radius:999px;padding:8px 14px;margin-bottom:14px;cursor:pointer;">

function goLiveInlineCardHtml() {
  // D19: never surface pricing during onboarding (welcome modal + settings tour).

  if (hotelSubscribed || settingsTourActive || !localStorage.getItem('settingsTourDone')) return '';

// D19: the Your-page go-live card is gated off during onboarding (see
// goLiveInlineCardHtml). The edit page renders once and isn't auto-rebuilt, so
// once the tour completes we inject the card into the already-mounted DOM.
function refreshGoLiveInlineCard() {
  const existing = document.getElementById('tour-go-live-card');
  const html = goLiveInlineCardHtml();
  if (existing) {
    if (html) existing.outerHTML = html;
    else existing.remove();
    if (typeof lucide !== 'undefined') lucide.createIcons();
    return;
  }
  if (!html) return;
  const list = document.getElementById('editRoomsList');
  if (!list) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = html.trim();
  const card = tmp.firstElementChild;
  if (!card) return;
  const ratesCard = document.getElementById('tour-rates-card');
  if (ratesCard && ratesCard.parentNode === list) list.insertBefore(card, ratesCard);
  else list.insertBefore(card, list.firstChild);
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// D19: fetch blocked-demand counts and refresh any visible go-live surfaces.
async function loadBlockedDemand() {
  if (hotelSubscribed) return;
  try {
    const data = await api('GET', '/api/crm/blocked-demand');
    if (data && data.success) {
      blockedDemand = { total: data.total || 0, today: data.today || 0, recent: data.recent || [] };
      updateGoLiveBanner();
      const inline = document.getElementById('tour-go-live-card');
      if (inline) inline.outerHTML = goLiveInlineCardHtml();
    }
  } catch (e) { /* non-fatal */ }
}

function updateGoLiveBanner() {
  const banner = document.getElementById('goLiveBanner');
  if (!banner) return;
  const shouldShow = !hotelSubscribed && !banner.dataset.tourHidden && !settingsTourActive;
  banner.style.display = shouldShow ? 'block' : 'none';
  if (shouldShow) banner.innerHTML = goLiveBannerHtml();
  const app = document.getElementById('app');
  if (app) app.classList.toggle('has-go-live-banner', shouldShow);
}

  const badge = document.getElementById('countNeedsCalled');

  const needsCalls = (bookings || []).filter(b => b.callStatus === 'not-called').length;

// Launch checklist truth: a real photo and real rates exist on the server.

  try {
    const res = await api('GET', '/api/crm/rooms');
    if (!res || !res.success) return;
    const photo = (res.rooms || []).some(r => (r.images && r.images.length > 0) || r.imageUrl);

  } catch (e) { /* non-fatal */ }

function growthTriedCount() {
  if (growthFunnel && Number.isFinite(growthFunnel.blockedAttempts)) return growthFunnel.blockedAttempts;
  return (blockedDemand && blockedDemand.total) || 0;
}

function renderBookingsSubtabs() {
  const wrap = document.getElementById('bookingsSubtabs');
  if (!wrap) return;
  if (currentFilter !== 'bookings' || settingsTourActive) { wrap.style.display = 'none'; return; }
  ensureGrowthStyles();
  wrap.style.display = 'block';
  const tried = growthTriedCount();
  const badge = (bookingsSubview !== 'growth' && tried > 0) ? `<span class="subtab-badge">${tried}</span>` : '';
  // Keep the 'bookings' string literal out of template interpolations — the build
  // splitter treats ${...} as raw and would flag it as a bare state ref.
  const onBookings = bookingsSubview !== 'growth';
  const bkActive = onBookings ? 'active' : '';
  const grActive = onBookings ? '' : 'active';
  wrap.innerHTML = `
    <div class="subtab-group" role="tablist">
      <button type="button" role="tab" class="subtab ${bkActive}" aria-selected="${onBookings}" onclick="setBookingsSubview('bookings')">Bookings</button>
      <button type="button" role="tab" class="subtab ${grActive}" aria-selected="${!onBookings}" onclick="setBookingsSubview('growth')">Get found${badge}</button>
    </div>`;
}

function setBookingsSubview(view) {
  bookingsSubview = (view === 'growth') ? 'growth' : 'bookings';
  renderBookingsSubtabs();
  applyBookingsSubview();
}

function applyBookingsSubview() {
  const isGrowth = bookingsSubview === 'growth';
  const listEl = document.getElementById('bookingsList');
  const chipsEl = document.getElementById('bookingFilterChips');
  const msgPanel = document.getElementById('messagesPanel');
  const growthEl = document.getElementById('growthPanel');
  if (listEl) listEl.style.display = isGrowth ? 'none' : '';
  if (msgPanel) msgPanel.style.display = isGrowth ? 'none' : '';
  if (isGrowth && chipsEl) chipsEl.style.display = 'none';
  if (growthEl) growthEl.style.display = isGrowth ? 'block' : 'none';
  if (isGrowth) {
    renderGrowthPanel();
  } else {
    if (!guestMessages.length) loadMessages(); else renderMessages();
    renderBookings(bookings);
  }
}

async function loadGrowthData() {
  try {
    const [funnel, checklist] = await Promise.all([
      api('GET', `/api/crm/growth-funnel?period=${encodeURIComponent(growthPeriod)}`).catch(() => null),
      api('GET', '/api/crm/growth-checklist').catch(() => null),
    ]);
    if (funnel && funnel.success) growthFunnel = funnel;
    if (checklist && checklist.success) growthChecklist = checklist.checklist || {};
    renderBookingsSubtabs();
    if (currentFilter === 'bookings' && bookingsSubview === 'growth') renderGrowthPanel();
  } catch (e) { /* non-fatal */ }
}

function setGrowthPeriod(p) {
  growthPeriod = ['today', '7d', '30d'].includes(p) ? p : '30d';
  renderGrowthPanel();
  loadGrowthData();
}

async function setGrowthChecklistItem(key, done) {
  growthChecklist = { ...growthChecklist, [key]: done ? { done: true } : { done: false } };
  renderGrowthPanel();
  try {
    const res = await api('POST', '/api/crm/growth-checklist', { key, done });
    if (res && res.success) { growthChecklist = res.checklist || growthChecklist; renderGrowthPanel(); }
  } catch (e) { toast('Could not save — try again', 'error'); }
}

function growthCheckDone(key) {
  return !!(growthChecklist && growthChecklist[key] && growthChecklist[key].done);
}

function renderGrowthPanel() {
  ensureGrowthStyles();
  const el = document.getElementById('growthPanel');
  if (!el) return;
  const domain = activeHotelDomain || (activeHotelId ? activeHotelId + '.mktel.co' : '');
  const bookingUrl = domain ? 'https://' + domain : '';
  const urlAttr = bookingUrl.replace(/'/g, "\\'");
  const f = growthFunnel || {};
  const pv = f.pageViews || 0, cs = f.checkoutStarted || 0, blk = f.blockedAttempts || 0, bk = f.completedBookings || 0;

  let insight = '', insightCls = '';
  if (pv === 0) {
    insight = 'No page views yet. Put your link where guests already look — start with Google below.';
  } else if (blk > 0 && !hotelSubscribed) {
    insight = `${blk} guest${blk > 1 ? 's' : ''} tried to book but couldn’t — you’re in preview mode. Activate to accept reservations like these.`;
    insightCls = 'warn';
  } else if (bk > 0) {
    insight = `${bk} direct booking${bk > 1 ? 's' : ''} this period — that’s money you kept off the OTAs. Keep your link in front of guests.`;
  } else if (cs > 0) {
    insight = `${cs} reached checkout but didn’t finish. More visits up top means more bookings down here.`;
  } else {
    insight = 'People are viewing your page. Make it effortless to find — share your link everywhere below.';
  }

  const periodBtn = (p, label) => `<button type="button" class="${growthPeriod === p ? 'active' : ''}" onclick="setGrowthPeriod('${p}')">${label}</button>`;
  const stat = (num, label, accent) => `<div class="growth-stat"><div class="growth-stat-num${accent ? ' accent' : ''}">${num}</div><div class="growth-stat-label">${label}</div></div>`;
  const arrow = '<div class="growth-arrow">→</div>';
  const checkMark = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>';

  const step = (key, pill, title, desc, actionsHtml) => {
    const done = growthCheckDone(key);
    return `
    <div class="growth-step">
      <button type="button" class="growth-step-check ${done ? 'done' : ''}" onclick="setGrowthChecklistItem('${key}', ${done ? 'false' : 'true'})" aria-label="${done ? 'Mark not done' : 'Mark done'}">${done ? checkMark : ''}</button>
      <div class="growth-step-body">
        <div class="growth-step-title">${title}${pill ? `<span class="growth-pill">${pill}</span>` : ''}</div>
        <div class="growth-step-desc">${desc}</div>
        <div class="growth-step-actions">${actionsHtml}</div>
      </div>
    </div>`;
  };

  // Precompute every sub-string at statement level. The build splitter's masker
  // treats `${...}` interpolations as raw, so nested template literals inside an
  // interpolation desync it — keep interpolations to simple values only.
  const linkBoxHtml = bookingUrl
    ? `<div class="growth-link-box"><input type="text" readonly value="${domain}"><button type="button" class="growth-btn growth-btn-primary" style="justify-content:center;" onclick="navigator.clipboard.writeText('${urlAttr}').then(()=>toast('Link copied!','success'))">Copy</button></div>`
    : `<div class="growth-step-desc" style="margin-top:8px;">Your booking link is still setting up.</div>`;

  const periodHtml = periodBtn('today', 'Today') + periodBtn('7d', '7 days') + periodBtn('30d', '30 days');
  const statsHtml = stat(pv, 'Page views') + arrow + stat(cs, 'Reached checkout') + arrow + stat(bk, 'Booked', true);

  const funnelCard = `
    <div class="growth-card">
      <div class="growth-card-title">Your guest funnel</div>
      <div class="growth-card-sub">Where your direct bookings come from. Page views are how many people landed on your booking page.</div>
      <div class="growth-period">${periodHtml}</div>
      <div class="growth-funnel">${statsHtml}</div>
      <div class="growth-insight ${insightCls}">${insight}</div>
    </div>`;

  const openGoogleBtn = bookingUrl ? `<a class="growth-btn growth-btn-ghost" href="https://business.google.com/" target="_blank" rel="noopener">Open Google Business &#8599;</a>` : '';
  const textBtn = bookingUrl ? `<button type="button" class="growth-btn growth-btn-ghost" onclick="navigator.clipboard.writeText('${urlAttr}').then(()=>toast('Link copied!','success'))">Copy link to text</button>` : '';
  const qrBtn = `<button type="button" class="growth-btn growth-btn-primary" onclick="showCheckinQrOverlay()">Show QR</button>`;

  const gbpStep = step('gbp', 'Biggest lever', 'Add your link to Google', 'Most guests find motels on Google Maps. Paste your booking link into your Google Business Profile so they book direct instead of through an OTA.', openGoogleBtn + linkBoxHtml);
  const qrStep = step('qr', '', 'Show a QR at the front desk', 'Walk-ins and repeat guests can scan it to save your hotel and book direct next time. Print it or show it on check-in.', qrBtn);
  const textStep = step('textLink', '', 'Text it to past guests', 'Repeat guests are your cheapest bookings. Text them your link so they skip Booking.com next time.', textBtn);

  const checklistCard = `
    <div class="growth-card">
      <div class="growth-card-title">Get found — put your link where guests already are</div>
      <div class="growth-card-sub">A booking page only works if people see it. These are the highest-value places to put your link — no ads required.</div>
      ${gbpStep}${qrStep}${textStep}
    </div>`;

  el.innerHTML = `<div class="growth-wrap">${funnelCard}${checklistCard}</div>`;
}

    revenueCache[revenuePeriod] = { rev: 0, rooms: [{ name: 'Your rooms', rev: 0 }] };

  revenueError = '';

async function invokeLoadEditRooms() {
  if (typeof loadSettingsModule === 'function') await loadSettingsModule();
  const fn = (typeof loadEditRooms === 'function')
    ? loadEditRooms
    : (typeof window.loadEditRooms === 'function' ? window.loadEditRooms : null);
  return fn ? fn() : Promise.resolve();
}
window.invokeLoadEditRooms = invokeLoadEditRooms;

function hydrateCrmInBackground() {
  void (async () => {
    if (typeof loadSettingsModule === 'function') await loadSettingsModule();
    if (revenueEnabled) seedTourRevenueShell();
    const editLoad = (typeof needsEditPageLoad === 'function' && needsEditPageLoad())
      ? invokeLoadEditRooms()
      : Promise.resolve();
    // Your page first — availability/bookings can wait so we don't stampede the DB.
    await editLoad;
    await Promise.allSettled([
      loadBookings({ deferMessages: true, silent: true }),
      loadManualAvailability({ silent: true }),
    ]);
  })();
}

async function hydrateCrmAfterTour() {
  if (typeof loadSettingsModule === 'function') await loadSettingsModule();
  settingsTourActive = false;
  updateGoLiveBanner();
  const editLoad = (typeof needsEditPageLoad === 'function' && needsEditPageLoad())
    ? invokeLoadEditRooms()
    : Promise.resolve();
  await Promise.allSettled([
    editLoad,
    loadManualAvailability(),
    loadBookings({ deferMessages: true }),
    revenueEnabled ? loadRevenueData(true) : Promise.resolve(),
  ]);
  // Tour is over and value is established — now the go-live pricing card is
  // allowed to surface on Your page (it was gated off during onboarding).
  refreshGoLiveInlineCard();
}

function finishTourHydration() {
  void hydrateCrmAfterTour();
}

async function startCrmApp(verification) {
  currentHotelPms = String((verification && verification.pms) || '').toLowerCase();
  revenueEnabled = !!(verification && verification.isManualPms);
  revenueCache = {};
  revenueLoading = false;
  revenueError = '';
  ensureAvailabilityUi();
  syncNotificationButtonState();
  syncRevenueUi();

  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('pwa') === '1') {
    try { sessionStorage.setItem('frontdeskSimulatePwa', '1'); } catch (_) {}
  } else {
    try { sessionStorage.removeItem('frontdeskSimulatePwa'); } catch (_) {}
  }
  const isFirstWelcome = urlParams.has('welcome') && !localStorage.getItem('onboardingDone');

  if (urlParams.has('welcome') || urlParams.get('tab') === 'settings') {
    currentFilter = 'settings';
    const cleanUrl = new URL(window.location);
    cleanUrl.searchParams.delete('tab');
    // Keep ?welcome=1 in the URL until the welcome modal is dismissed (refresh-safe).
    if (urlParams.has('welcome') && localStorage.getItem('onboardingDone')) {
      cleanUrl.searchParams.delete('welcome');
    }
    window.history.replaceState({}, '', cleanUrl);
  } else if (urlParams.get('tab') === 'bookings') {
    currentFilter = 'bookings';
    const cleanUrl = new URL(window.location);
    cleanUrl.searchParams.delete('tab');
    window.history.replaceState({}, '', cleanUrl);
  } else if (urlParams.get('tab') === 'apps' || urlParams.get('tab') === 'phones') {
    currentFilter = 'apps';
    const cleanUrl = new URL(window.location);
    cleanUrl.searchParams.delete('tab');
    window.history.replaceState({}, '', cleanUrl);
  } else if (!urlParams.has('welcome') && verification && verification.subscribed) {
    // D6: live hotels open on Bookings — the daily-loop default ("anything new?").
    // Pre-activation hotels fall through to 'settings' so setup stays first.
    currentFilter = 'bookings';
  }

  if (isFirstWelcome) {
    if (revenueEnabled) seedTourRevenueShell();
    if (typeof loadSettingsModule === 'function') await loadSettingsModule();
    applyFilter();
    hydrateCrmInBackground();
  }

  document.getElementById('bootScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Track subscription status globally for banner visibility
  hotelSubscribed = !!(verification && verification.subscribed);
  updateGoLiveBanner();
  if (!hotelSubscribed) loadBlockedDemand();

  const realignActiveTab = () => {
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) moveSlider(activeTab);
  };
  requestAnimationFrame(realignActiveTab);
  setTimeout(realignActiveTab, 120);

  initMobileBottomNav();
  updateMobileRevenueNavVisibility();
  syncMobileNavActive(currentFilter);
  ensureLucideLoaded().then(() => {
    refreshMobileBottomNavIcons();
    requestAnimationFrame(refreshMobileBottomNavIcons);
  }).catch(() => {});

  if (isFirstWelcome) {
    showWelcomeModal();
  } else {
    await Promise.allSettled([
      loadManualAvailability(),
      loadBookings({ deferMessages: true }),
    ]);

    refreshMobileBottomNavIcons();

    if (currentFilter === 'bookings') {
      setFilter('bookings', document.querySelector('.tab[data-nav-filter="bookings"]'));
    } else if (currentFilter === 'apps') {
      setFilter('apps', document.querySelector('.tab[data-nav-filter="apps"]')
        || document.querySelector('.mobile-nav-item[data-nav-filter="apps"]'));
    }
  }

  if (urlParams.get('action') === 'go-live') {
    window.history.replaceState({}, '', window.location.pathname);
    goLive();
  }

  if (urlParams.get('activated') === '1') {
    const cleanUrl = new URL(window.location);
    cleanUrl.searchParams.delete('activated');
    window.history.replaceState({}, '', cleanUrl);
    hotelSubscribed = true;
    updateGoLiveBanner();
    const _goLiveBanner = document.getElementById('goLiveBanner');
    if (_goLiveBanner) { _goLiveBanner.style.display = 'none'; _goLiveBanner.innerHTML = ''; }
    const openActivatedModal = () => {
      const fn = (typeof showActivatedModal === 'function')
        ? showActivatedModal
        : (typeof window.showActivatedModal === 'function' ? window.showActivatedModal : null);
      if (fn) fn();
    };
    if (typeof loadSettingsModule === 'function') {
      loadSettingsModule().then(openActivatedModal).catch(openActivatedModal);
    } else {
      openActivatedModal();
    }
  }

  if (!isFirstWelcome) {
    if (!localStorage.getItem('onboardingDone')) localStorage.setItem('onboardingDone', '1');
    // Don't mark tour done if a step is in progress (e.g. refresh mid-walkthrough).
    if (!localStorage.getItem('settingsTourDone') && !localStorage.getItem('settingsTourStep')) {
      localStorage.setItem('settingsTourDone', '1');
    }
    if (localStorage.getItem('settingsTourStep') === 'handoff') {
      localStorage.removeItem('settingsTourStep');
      if (!localStorage.getItem('settingsTourDone')) {
        const runFinale = () => {
          const showFinale = (typeof showFinaleMockModal === 'function')
            ? showFinaleMockModal
            : window.showFinaleMockModal;
          if (typeof showFinale === 'function') showFinale();
        };
        if (typeof loadSettingsModule === 'function') {
          loadSettingsModule().then(runFinale).catch(runFinale);
        } else {
          runFinale();
        }
      }
    }
  }

  // First time opening the INSTALLED app → offer to turn on booking alerts.
  maybePromptInstalledNotifications();
}

async function doLogin() {
  const pin = document.getElementById('pinInput').value.trim();
  const err = document.getElementById('loginError');
  const btn = document.getElementById('signInBtn');
  err.textContent = '';
  if (!activeHotelId) { err.textContent = 'Hotel context is still loading'; return; }
  if (!pin) { err.textContent = 'Please enter PIN'; return; }

  const prevLabel = btn ? btn.textContent : 'Sign In';
  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Signing in…';
  }
  try {
    const verification = await verifyCrmToken(pin);
    token = pin;
    try { localStorage.setItem('crmToken', token); } catch(e) {}
    await startCrmApp(verification);
  } catch (e) {
    err.textContent = e.message === 'Wrong PIN' ? 'Wrong PIN' : (e.message || 'Connection failed');
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = prevLabel;
    }
  }
}

// ── API ────────────────────────────────────────────────
async function api(method, path, body) {
  if (!activeHotelId) throw new Error('Hotel context is not loaded.');
  const url = new URL(path, window.location.origin);
  if (!url.searchParams.get('hotelId')) {
    url.searchParams.set('hotelId', activeHotelId);
  }

  const opts = { method, headers: { 'Content-Type': 'application/json', 'x-crm-token': token } };
  const normalizedMethod = String(method || 'GET').toUpperCase();
  if (body || (normalizedMethod !== 'GET' && normalizedMethod !== 'HEAD')) {
    const payload = (body && typeof body === 'object' && !Array.isArray(body)) ? { ...body } : (body || {});
    if (payload.hotelId === undefined) payload.hotelId = activeHotelId;
    opts.body = JSON.stringify(payload);
  }
  const res = await fetch(url.pathname + url.search, opts);
  if (res.status === 401) { showLogin(); throw new Error('Unauthorized'); }
  return res.json();
}

function showLogin() {
  document.getElementById('bootScreen').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  token = '';
  currentHotelPms = '';
  revenueEnabled = false;
  revenueCache = {};
  revenueLoading = false;
  revenueError = '';
  syncRevenueUi();
  try { localStorage.removeItem('crmToken'); } catch(e) {}
}

async function bootCrmApp() {
  if (bootInFlight) return;
  bootInFlight = true;
  activeHotelId = '';
  activeHotelName = '';
  activeHotelDomain = '';
  activeHotelContext = null;
  updateHotelChrome();
  showBootState({
    title: 'Connecting to hotel...',
    message: 'Checking this domain and loading front desk context.',
    debug: formatContextDebugLines([`Detected host: ${getDetectedHostname() || 'unknown'}`]),
    showRetry: false,
  });

  try {
    await loadHotelContext();
    if (token) {
      try {
        const verification = await verifyCrmToken(token);
        await startCrmApp(verification);
        return;
      } catch (e) {
        showLogin();
        return;
      }
    }
    showLogin();
  } catch (e) {
    const legacyHotelId = resolveLegacyCrmHotelId();
    if (legacyHotelId && applyLegacyHotelContext(legacyHotelId, e && e.message ? e.message : 'hotel-context-load-failed')) {
      if (token) {
        try {
          const verification = await verifyCrmToken(token);
          await startCrmApp(verification);
          return;
        } catch (verifyError) {
          showLogin();
          return;
        }
      }
      showLogin();
      return;
    }
    showHotelContextError(e);
  } finally {
    bootInFlight = false;
  }
}

// ── LOAD ───────────────────────────────────────────────
async function loadBookings(opts = {}) {
  const silent = !!opts.silent;
  try {
    const data = await api('GET', '/api/crm/bookings');
    if (!data.success) throw new Error(data.message);
    bookings = data.data || [];
    if (currentFilter !== 'revenue') revenueCache = {};
    
    // Update counts
    const needsCalls = bookings.filter(b => b.callStatus === 'not-called');
    const statEl = document.getElementById('statCount');
    if (statEl) statEl.textContent = needsCalls.length;
    updateBookingsTabBadge();
    
    if (silent) {
      if (opts.deferMessages) scheduleDeferredMessagesLoad();
      return;
    }
    // Render based on current filter
    applyFilter();
    if (opts.deferMessages) scheduleDeferredMessagesLoad();
    else loadMessages();
  } catch(e) {
    if (silent) return;
    if (e.message === 'Unauthorized') return;
    document.getElementById('bookingsList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
      <div class="empty-text">Could not load bookings</div>
      <div class="empty-sub">${esc(e.message)}</div>
      </div>`;
  }
}

// ── GUEST MESSAGES ─────────────────────────────────────
async function loadMessageBadges() {
  try {
    const data = await api('GET', '/api/crm/messages/unread-count');
    if (!data.success) return;
    messageUnreadCount = Number(data.unread) || 0;
    updateMessageBadges();
  } catch (e) { /* non-fatal */ }
}

async function loadMessages() {
  try {
    const data = await api('GET', '/api/crm/messages');
    if (!data.success) return;
    guestMessages = data.messages || [];
    messageUnreadCount = 0;
    updateMessageBadges();
    if (currentFilter === 'bookings') renderMessages();
  } catch (e) { /* non-fatal */ }
}

function updateMessageBadges() {
  const unread = guestMessages.length
    ? guestMessages.filter(m => !m.read && (m.sender || 'guest') !== 'hotel').length
    : messageUnreadCount;
  const badge = document.getElementById('msgUnreadBadge');
  if (badge) {
    badge.textContent = unread;
    badge.style.display = unread > 0 ? '' : 'none';
  }
  const dot = document.getElementById('msgUnreadDot');
  if (dot) dot.style.display = unread > 0 ? '' : 'none';
  updateBookingsTabBadge();
}

function timeAgo(iso) {
  const then = new Date(iso).getTime();
  if (!then) return '';
  const diff = Math.max(0, Date.now() - then);
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return new Date(iso).toLocaleDateString();
}

function buildMessageThreads() {
  const threads = {};
  guestMessages.forEach(m => {
    const key = m.reservationCode || m.id;
    if (!threads[key]) {
      threads[key] = {
        key,
        code: m.reservationCode,
        guestName: m.guestName,
        roomName: m.roomName,
        guestPhone: m.guestPhone,
        guestEmail: m.guestEmail,
        msgs: [],
      };
    }
    threads[key].msgs.push(m);
  });
  return Object.values(threads).sort((a, b) => {
    const aUnread = a.msgs.some(m => !m.read && (m.sender || 'guest') === 'guest');
    const bUnread = b.msgs.some(m => !m.read && (m.sender || 'guest') === 'guest');
    if (aUnread && !bUnread) return -1;
    if (!aUnread && bUnread) return 1;
    const aLatest = new Date(Math.max(...a.msgs.map(m => new Date(m.createdAt))));
    const bLatest = new Date(Math.max(...b.msgs.map(m => new Date(m.createdAt))));
    return bLatest - aLatest;
  });
}

function pickDefaultMessageThread(threadList) {
  if (!threadList.length) return '';
  const unread = threadList.find(t => t.msgs.some(m => !m.read && (m.sender || 'guest') === 'guest'));
  return (unread || threadList[0]).key;
}

function threadSummary(thread) {
  const hasUnread = thread.msgs.some(m => !m.read && (m.sender || 'guest') === 'guest');
  const sorted = thread.msgs.slice().sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
  const latest = sorted[sorted.length - 1];
  const preview = latest?.body
    ? latest.body.replace(/\s+/g, ' ').trim().slice(0, 56) + (latest.body.length > 56 ? '…' : '')
    : (latest?.requests?.length ? latest.requests.join(', ') : 'Request');
  return { hasUnread, latest, preview };
}

async function markMessageRead(id) {
  const msg = guestMessages.find(m => m.id === id);
  if (msg) msg.read = true;
  updateMessageBadges();
  renderMessages();
  try { await api('POST', `/api/crm/messages/${encodeURIComponent(id)}/read`); }
  catch (e) { /* optimistic; ignore */ }
}

async function markAllMessagesRead() {
  guestMessages.forEach(m => { m.read = true; });
  updateMessageBadges();
  renderMessages();
  try { await api('POST', '/api/crm/messages/read-all'); }
  catch (e) { /* optimistic; ignore */ }
}

async function replyToThread(reservationCode, inputId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const body = input.value.trim();
  if (!body) return;
  input.disabled = true;
  try {
    const data = await api('POST', `/api/crm/messages/${encodeURIComponent(reservationCode)}/reply`, { body });
    if (data.success && data.message) {
      // Add the reply to our local messages array so it renders immediately
      guestMessages.push({
        id: data.message.id,
        reservationCode,
        guestName: guestMessages.find(m => m.reservationCode === reservationCode)?.guestName || 'Guest',
        body: data.message.body,
        sender: 'hotel',
        createdAt: data.message.createdAt,
        read: true,
        requests: [],
      });
      input.value = '';
      renderMessages();
    }
  } catch (e) {
    console.error('Reply failed:', e);
  }
  input.disabled = false;
}

async function refreshCurrentView() {
  if (!token || !activeHotelId || document.getElementById('app').style.display === 'none') return;
  // Don't auto-refresh when user is on Edit tab (causes disruptive reload)
  if (currentFilter === 'settings') return;
  if (currentFilter === 'apps') {
    loadAppsModule().then(() => loadGuestInstallStats()).catch(() => {});
    return;
  }
  const tasks = [loadBookings()];
  if (currentFilter === 'bookings') tasks.push(loadMessages());
  if (currentFilter === 'availability') {
    tasks.push(loadManualAvailability());
  }
  if (currentFilter === 'revenue' && revenueEnabled) {
    tasks.push(loadRevenueData(true));
  }
  await Promise.allSettled(tasks);
}

function ensureBookingsVirtualScroll() {
  const el = document.getElementById('bookingsList');
  if (!el || el.dataset.virtualBound === '1') return;
  el.dataset.virtualBound = '1';
  el.classList.add('bookings-virtual');
  el.addEventListener('scroll', () => {
    if (bookingsVirtualRaf) return;
    bookingsVirtualRaf = requestAnimationFrame(() => {
      bookingsVirtualRaf = 0;
      renderBookingsWindow();
    });
  }, { passive: true });
}

function renderBookingsWindow() {
  const el = document.getElementById('bookingsList');
  const list = bookingsVirtualList;
  if (!el || !list.length) return;
  const scrollTop = el.scrollTop || 0;
  const viewHeight = el.clientHeight || window.innerHeight;
  const start = Math.max(0, Math.floor(scrollTop / BOOKING_CARD_EST_HEIGHT) - 2);
  const end = Math.min(list.length, Math.ceil((scrollTop + viewHeight) / BOOKING_CARD_EST_HEIGHT) + 2);
  const topPad = start * BOOKING_CARD_EST_HEIGHT;
  const bottomPad = Math.max(0, (list.length - end) * BOOKING_CARD_EST_HEIGHT);
  el.innerHTML = `<div style="height:${topPad}px" aria-hidden="true"></div>`
    + list.slice(start, end).map(bookingCardHtml).join('')
    + `<div style="height:${bottomPad}px" aria-hidden="true"></div>`;
}

function renderBookings(fullList) {
  const el = document.getElementById('bookingsList');
  if (!el) return;
  fullList = fullList || [];
  el.classList.remove('bookings-virtual');
  delete el.dataset.virtualBound;
  bookingsVirtualList = [];

  // D17: counts come from the full set; the chips apply a view filter.
  const counts = {
    all: fullList.length,
    needs: fullList.filter(b => b.callStatus === 'not-called').length,
    called: fullList.filter(b => b.callStatus !== 'not-called').length,
  };
  renderBookingFilterChips(counts);

  let list = fullList;
  if (bookingCallFilter === 'needs') list = fullList.filter(b => b.callStatus === 'not-called');
  else if (bookingCallFilter === 'called') list = fullList.filter(b => b.callStatus !== 'not-called');

  // D17: a filter that matches nothing (but bookings exist) shows a quiet note,
  // never the launch checklist.
  if (list.length === 0 && fullList.length > 0) {
    const label = bookingCallFilter === 'needs' ? 'No bookings need a call right now' : 'No called bookings yet';
    el.innerHTML = `<div class="empty-state" style="padding:32px 0;"><div class="empty-text" style="font-size:15px;">${label}</div><div class="empty-sub">Switch filters above to see your other bookings.</div></div>`;
    return;
  }

  if (list.length === 0) {
    // Launch checklist completion is derived from SERVER truth (rooms + rates),
    // not browser-local flags — a localStorage flag is wrong across devices and
    // after a reinstall. localStorage flags are kept only as an optimistic OR.

function refreshMobileBottomNavIcons() {
  if (typeof lucide === 'undefined' || typeof lucide.createIcons !== 'function') {
    ensureLucideLoaded().then(() => refreshMobileBottomNavIcons()).catch(() => {});
    return;
  }
  const root = document.getElementById('mobileBottomNav');
  if (!root || !root.querySelector('i[data-lucide]')) return;
  try {
    lucide.createIcons();
  } catch (e) { /* ignore */ }
}

function syncMobileNavActive(filter) {
  const nav = document.getElementById('mobileBottomNav');
  if (!nav) return;
  nav.querySelectorAll('.mobile-nav-item').forEach((n) => {
    const f = n.getAttribute('data-nav-filter');
    if (f === 'revenue' && n.classList.contains('mobile-nav-item--hidden')) {
      n.classList.remove('active');
      n.removeAttribute('aria-current');
      return;
    }
    const match = f === filter;
    n.classList.toggle('active', match);
    if (match) n.setAttribute('aria-current', 'page');
    else n.removeAttribute('aria-current');
  });
}

function updateMobileRevenueNavVisibility() {
  const el = document.getElementById('mobileNavRevenueBtn');
  if (el) el.classList.toggle('mobile-nav-item--hidden', !revenueEnabled);
  // Desktop sidebar: Revenue is always visible via CSS (display:flex !important);
  // only hide it on desktop if NOT in desktop mode.
  const deskEl = document.getElementById('desktopTabRevenueBtn');
  const isDesktop = window.matchMedia && window.matchMedia('(min-width: 1024px)').matches;
  if (deskEl) deskEl.classList.toggle('tab--hidden', !revenueEnabled && !isDesktop);
}

function initMobileBottomNav() {
  const nav = document.getElementById('mobileBottomNav');
  if (!nav || nav.dataset.bound === '1') return;
  nav.dataset.bound = '1';
  nav.addEventListener('click', (e) => {
    const item = e.target.closest('.mobile-nav-item');
    if (!item || item.classList.contains('mobile-nav-item--hidden')) return;
    const filter = item.getAttribute('data-nav-filter');
    if (!filter) return;
    if (filter === 'revenue' && !revenueEnabled) return;
    setFilter(filter, item);
  });

  // Mobile keeps a single Bookings bucket.
  if (window.matchMedia && window.matchMedia('(max-width: 600px)').matches && (currentFilter === 'needs-call' || currentFilter === 'called')) {
    const bookingsBtn = nav.querySelector('.mobile-nav-item[data-nav-filter="bookings"]');
    setFilter('bookings', bookingsBtn);
  }
}

function setFilter(filter, btn) {
  // On desktop Revenue is always accessible (shows upsell if not enabled).
  const isDesktop = window.matchMedia && window.matchMedia('(min-width: 1024px)').matches;
  if (filter === 'revenue' && !revenueEnabled && !isDesktop) return;
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  let tabBtn = null;
  if (btn && btn.classList && btn.classList.contains('tab')) {
    tabBtn = btn;
  } else {
    tabBtn = document.querySelector(`.tab[data-nav-filter="${filter}"]`);
  }
  if (tabBtn) {
    tabBtn.classList.add('active');
    moveSlider(tabBtn);
  }
  syncMobileNavActive(filter);
  if (filter === 'availability') {
    applyFilter();
    if ((manualAvailability.rooms || []).length) {
      renderAvailabilityView();
      updateGoLiveBanner();
      return;
    }
    const calWrap = document.getElementById('availabilityCalendarWrap');
    const noRoom = document.getElementById('availabilityNoRoom');
    if (calWrap) calWrap.style.display = 'none';
    if (noRoom) { noRoom.style.display = 'block'; noRoom.innerHTML = '<div class="loading"><div class="logo-sprite-bounce"></div> Loading availability…</div>'; }
    loadManualAvailability().then(() => { renderAvailabilityView(); }).catch(() => { renderAvailabilityView(); });
    updateGoLiveBanner();
    return;
  }
  if (filter === 'revenue') {
    applyFilter();
    if (settingsTourActive) {
      seedTourRevenueShell();
      renderRevenueView();
      updateGoLiveBanner();
      return;
    }
    if (revenueCache[revenuePeriod] && !revenueLoading) {
      renderRevenueView();
      updateGoLiveBanner();
      return;
    }
    loadRevenueData();
    updateGoLiveBanner();
    return;
  }
  applyFilter();
  if (filter === 'bookings') loadMessages();
  updateGoLiveBanner();
}

function moveSlider(activeTab) {
  if (window.matchMedia && window.matchMedia('(max-width: 600px)').matches) return;
  const slider = document.getElementById('tabsSlider');
  const tabs = activeTab ? activeTab.closest('.tabs-container') : null;
  if (!slider || !activeTab || !tabs) return;

  const isDesktop = window.matchMedia && window.matchMedia('(min-width: 1024px)').matches;
  const tabRect = activeTab.getBoundingClientRect();
  const tabsRect = tabs.getBoundingClientRect();
  const cs = getComputedStyle(tabs);

  if (isDesktop) {
    // Vertical sidebar: slide the highlight down to the active tab.
    const borderTop = parseFloat(cs.borderTopWidth) || 0;
    const padTop = parseFloat(cs.paddingTop) || 0;
    const top = tabRect.top - tabsRect.top + tabs.scrollTop - borderTop - padTop;
    slider.style.width = 'calc(100% - 10px)';
    slider.style.height = `${Math.round(tabRect.height)}px`;
    slider.style.transform = `translateY(${Math.round(top)}px)`;
  } else {
    // Horizontal pills: slide the highlight across to the active tab.
    const borderLeft = parseFloat(cs.borderLeftWidth) || 0;
    const padLeft = parseFloat(cs.paddingLeft) || 0;
    // Slider is `left: Npx` from the padding edge; delta from border box must subtract border + padding.
    const left = tabRect.left - tabsRect.left + tabs.scrollLeft - borderLeft - padLeft;
    slider.style.width = `${Math.round(tabRect.width)}px`;
    slider.style.height = 'calc(100% - 10px)';
    slider.style.transform = `translateX(${Math.round(left)}px)`;
  }
}

// Call on load to position slider under the default active tab
document.addEventListener('DOMContentLoaded', () => {
  ensureAvailabilityUi();
  syncRevenueUi();
  initMobileBottomNav();
  updateMobileRevenueNavVisibility();
  syncMobileNavActive(currentFilter);
  refreshMobileBottomNavIcons();
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) moveSlider(activeTab);

  const tabs = document.querySelector('.tabs-container');
  if (tabs) {
    tabs.addEventListener('scroll', () => {
      const current = document.querySelector('.tab.active');
      if (current) moveSlider(current);
    }, { passive: true });
  }

  window.addEventListener('resize', () => {
    const current = document.querySelector('.tab.active');
    if (current) moveSlider(current);
    if (window.matchMedia && window.matchMedia('(max-width: 600px)').matches && (currentFilter === 'needs-call' || currentFilter === 'called')) {
      const bookingsBtn = document.querySelector('.mobile-nav-item[data-nav-filter="bookings"]');
      setFilter('bookings', bookingsBtn);
      return;
    }
    syncMobileNavActive(currentFilter);
  });

  window.addEventListener('load', refreshMobileBottomNavIcons, { once: true });
});

async function loadManualAvailability(opts = {}) {
  const silent = !!opts.silent;
  try {
    const data = await api('GET', '/api/crm/manual-availability');
    if (!data.success) throw new Error(data.message || 'Failed to load manual availability');
    manualAvailability = data.data || { rooms: [], overrides: {} };
    if (!Array.isArray(manualAvailability.rooms)) manualAvailability.rooms = [];
    if (!manualAvailability.overrides || typeof manualAvailability.overrides !== 'object') {
