async function sendGuestBroadcast() {
  const titleEl = document.getElementById('guest-broadcast-title');
  const bodyEl = document.getElementById('guest-broadcast-body');
  const resultEl = document.getElementById('guest-broadcast-result');
  const title = titleEl?.value.trim();
  const body = bodyEl?.value.trim();
  if (!title || !body) {
    toast('Enter a title and what you want to notify them about', 'error');
    return;
  }
  const btn = document.getElementById('guest-broadcast-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Notifying…'; }
  if (resultEl) resultEl.textContent = '';
  try {
    const data = await api('POST', '/api/crm/guest-broadcast', { title, body });
    if (data.success) {
      const msg = data.sent > 0
        ? `Notified ${data.sent} guest${data.sent === 1 ? '' : 's'}`
        : 'No guests to notify yet';
      if (resultEl) resultEl.textContent = msg;
      toast(msg, data.sent > 0 ? 'success' : '');
      if (bodyEl) bodyEl.value = '';
    } else {
      toast(data.message || 'Broadcast failed', 'error');
    }
  } catch (e) {
    toast('Broadcast failed', 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Notify all guests'; }
  }
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function toast(msg, type = '') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = `${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'} ${msg}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

async function settingsUploadPhoto(event, roomId) {
  const file = event.target.files[0];
  if (!file) return;
  const optimized = await optimizeRoomPhotoForUpload(file);
  const fd = new FormData();
  fd.append('image', optimized, optimized.name || 'room.webp');
  try {
    const res = await fetch(`/api/crm/rooms/${roomId}/images?hotelId=${encodeURIComponent(activeHotelId)}`, {
      method: 'POST',
      headers: { 'x-crm-token': token },
      body: fd,
    });
    const data = await res.json();
    if (data.success) {
      toast('Photo uploaded!', 'success');
      loadSettings();
    } else {
      toast(data.message || 'Upload failed', 'error');
    }
  } catch (e) {
    toast('Upload failed', 'error');
  }
}

// Single rule: when a checklist action completes, advance the tour past that step
function advanceTourIfNeeded() {
  if (localStorage.getItem('settingsTourDone')) return;
  const step = parseInt(localStorage.getItem('settingsTourStep') || '0');
  const hasPhoto = editRooms.some(r => r.images && r.images.length > 0);
  const hasRates = !!localStorage.getItem('ratesChanged');
  const hasLink = !!localStorage.getItem('linkCopied');

  // Steps: 0=header info, 1=photo, 2=rates, 3=copy link
  if (step === 1 && hasPhoto) localStorage.setItem('settingsTourStep', '2');
  if (step === 2 && hasRates) localStorage.setItem('settingsTourStep', '3');
  if (step === 3 && hasLink) localStorage.setItem('settingsTourStep', '4');

  // Remove active tour tooltip and overlay if stale
  const tooltip = document.getElementById('tourTooltip');
  if (tooltip) tooltip.remove();
  const overlay = document.getElementById('tourBlurOverlay');
  if (overlay) overlay.remove();
  document.querySelectorAll('[data-tour-highlighted]').forEach(el => {
    el.style.position = el.dataset.tourOrigPosition || '';
    el.style.zIndex = '';
    el.style.boxShadow = '';
    el.removeAttribute('data-tour-highlighted');
    delete el.dataset.tourOrigPosition;
  });
  document.body.style.overflow = '';
}

        const val = document.getElementById('onboardingTextInput').value.trim();
        if (!val) return; // require an answer
        answers[q.key] = val;

    } else {

      });
    }
  }

  render();
}

function refreshFrontdeskInstallCard() {
  const el = document.getElementById('frontdeskInstallCard');
  if (!el) return;
  el.outerHTML = frontdeskInstallCardHtml();
}

function handleInstallFrontdesk() {
  if (isIosDevice()) {
    showIosInstallSheet({
      title: (activeHotelName ? activeHotelName + ' ' : '') + 'Front Desk',
      subtitle: 'Add it to your home screen — takes 3 seconds.',
    });
    return;
  }
  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then((choice) => {
      if (choice && choice.outcome === 'accepted') { frontdeskInstalled = true; }
      deferredInstallPrompt = null;
      refreshFrontdeskInstallCard();
    }).catch(() => {});
  } else {
    toast('Use your browser menu → "Install app" / "Add to Home screen".', 'info');
  }
}

async function toggleAppNotifications() {
  const granted = (typeof Notification !== 'undefined') && Notification.permission === 'granted';
  if (granted) {
    // Already on — fire a test so they know it works.
    try {
      await api('POST', '/api/push/test', {});
      toast('Test notification sent', 'success');
    } catch (e) {
      toast('Could not send test', 'error');
    }
    return;
  }
  await enableNotifications();
  refreshFrontdeskInstallCard();
}

// First-launch nudge inside the INSTALLED app. Installing a PWA never asks for
// notifications on its own — permission is a separate, gesture-driven step (iOS
// flat-out ignores requestPermission unless it comes from a tap). So the first
// time they open the installed Front Desk we surface a one-time card whose
// "Enable" button supplies that gesture. Shown once per device.
function maybePromptInstalledNotifications() {
  try {
    if (!isStandaloneApp()) return;                 // only inside the installed app
    if (!pushSupported()) return;                   // device can't do web push
    if (typeof Notification === 'undefined' || Notification.permission !== 'default') return;
    if (localStorage.getItem('notifPromptShown') === '1') return;
    // Don't stack on top of the welcome / payment-success modals.
    if (document.getElementById('welcomeModalOverlay') || document.getElementById('activatedModalOverlay')) return;
    localStorage.setItem('notifPromptShown', '1');
    setTimeout(showNotifPromptModal, 700);
  } catch (_) {}
}

    {

    },

  function cleanupTour() {
    const prev = document.getElementById('tourTooltip');
    if (prev) prev.remove();
    const prevOverlay = document.getElementById('tourBlurOverlay');
    if (prevOverlay) prevOverlay.remove();
    // Remove any lingering highlight styles — restore original position
    document.querySelectorAll('[data-tour-highlighted]').forEach(el => {
      el.style.position = el.dataset.tourOrigPosition || '';
      el.style.zIndex = '';
      el.style.boxShadow = '';
      el.removeAttribute('data-tour-highlighted');
      delete el.dataset.tourOrigPosition;
    });
    document.body.style.overflow = '';
  }

  function skipToFinale() {
    cleanupTour();
    // Jump straight to the finale modal — they must see the "share your link" reality check
    showFinaleMockModal();
  }

  function showStep() {
    cleanupTour();

    if (step >= steps.length) {
      localStorage.setItem('settingsTourDone', '1');
      localStorage.removeItem('settingsTourStep');
      return;
    }

    const s = steps[step];

    // Skip revenue steps if revenue isn't enabled for this hotel
    if (s.tab === 'revenue' && !revenueEnabled) {
      step++;
      localStorage.setItem('settingsTourStep', String(step));
      showStep();
      return;
    }

    // Switch tab if this step requires a different tab
    if (s.tab && s.tab !== currentFilter) {
      const tabBtn = document.querySelector(`.tab[data-nav-filter="${s.tab}"]`) || document.querySelector(`.mobile-nav-item[data-nav-filter="${s.tab}"]`);
      if (tabBtn) setFilter(s.tab, tabBtn);
      // For custom modals, show immediately after tab switch (no need to wait for elements)
      if (s.customModal) {
        setTimeout(() => { showStepContent(s); }, 150);
      } else {
        // Wait longer for tab content to fully render (especially async tabs like availability/revenue)
        setTimeout(() => { showStepContent(s); }, 800);
      }
      return;
    }
    // Small delay even on same tab to let DOM settle
    setTimeout(() => { showStepContent(s); }, 100);
  }

  function showStepContent(s) {
    // Home-screen install pitch — shown first so they immediately get the value
    if (s.customModal === 'homescreen') {
      showHomescreenMockModal();
      return;
    }
    // Custom modal for bookings tab — show a mock booking card example
    if (s.customModal === true || s.customModal === 'bookings') {
      showBookingsMockModal();
      return;
    }
    // Custom modal for availability tab — multi-page walkthrough
    if (s.customModal === 'availability') {
      showAvailabilityMockModal();
      return;
    }
    // Finale modal — tour complete, clear next action
    if (s.customModal === 'finale') {
      showFinaleMockModal();
      return;
    }

    // If step needs to wait for element to become visible (e.g. async-loaded content)
    if (s.waitForVisible) {
      const targets = s.target.split(',').map(t => t.trim());
      let attempts = 0;
      const maxAttempts = 20; // 20 * 200ms = 4 seconds max wait
      const pollForVisible = () => {
        attempts++;
        let el = null;
        for (const t of targets) {
          el = document.querySelector(t);
          if (el && el.offsetParent !== null) break;
          el = null;
        }
        if (el) {
          showStepForElement(el, s);
        } else if (attempts < maxAttempts) {
          setTimeout(pollForVisible, 200);
        } else {
          // Give up, skip this step
          step++;
          localStorage.setItem('settingsTourStep', String(step));
          showStep();
        }
      };
      pollForVisible();
      return;
    }

    // Try multiple selectors (comma-separated)
    let el = null;
    const targets = s.target.split(',').map(t => t.trim());
    for (const t of targets) {
      el = document.querySelector(t);
      // Skip elements that are hidden/display:none — BUT allow if openAccordion will reveal it
      if (el && !s.openAccordion && el.offsetParent === null && getComputedStyle(el).position !== 'fixed') {
        el = null;
        continue;
      }
      if (el) break;
    }
    if (!el) { step++; localStorage.setItem('settingsTourStep', String(step)); showStep(); return; }

    showStepForElement(el, s);
  }

  function showStepForElement(el, s) {

    // Open accordion if needed — find the accordion-body that contains this element
    if (s.openAccordion) {
      const acc = el.closest('.accordion-body');
      if (acc && acc.style.display === 'none') {
        acc.style.display = 'block';
        const arrow = acc.previousElementSibling?.querySelector('.accordion-arrow');
        if (arrow) arrow.style.transform = 'rotate(90deg)';
      }
    }

    // If targetParent, highlight the parent card instead
    if (s.targetParent) {
      el = el.closest('.booking-card') || el.closest('.accordion-body') || el;
    }

    // Add dark overlay + lock scroll
    const blurOverlay = document.createElement('div');
    blurOverlay.id = 'tourBlurOverlay';
    blurOverlay.style.cssText = 'position:fixed;inset:0;z-index:99998;background:rgba(0,0,0,0.6);';
    document.body.appendChild(blurOverlay);
    document.body.style.overflow = 'hidden';

    // Highlight the target element — preserve original position
    if (!el.dataset.tourOrigPosition) el.dataset.tourOrigPosition = el.style.position || '';
    el.style.position = el.style.position || 'relative';
    el.style.zIndex = '99999';
    el.style.isolation = 'isolate';
    el.style.boxShadow = '0 0 0 4px #2E7D5B, 0 0 20px rgba(46,125,91,0.3)';
    el.setAttribute('data-tour-highlighted', '1');

    // Scroll element into view and wait for scroll to finish before positioning tooltip
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });

    // Use a longer delay to ensure scroll completes, then measure position
    setTimeout(() => { positionTooltip(el, s); }, 500);
  }

  function positionTooltip(el, s) {
    const rect = el.getBoundingClientRect();
    const tooltip = document.createElement('div');
    tooltip.id = 'tourTooltip';

    const spaceBelow = window.innerHeight - rect.bottom;
    const spaceAbove = rect.top;
    const tooltipMaxWidth = Math.min(280, window.innerWidth - 32);

    // Calculate horizontal center aligned with the element
    const elCenterX = rect.left + rect.width / 2;
    const tooltipLeft = Math.max(16, Math.min(elCenterX - tooltipMaxWidth / 2, window.innerWidth - tooltipMaxWidth - 16));
    // Arrow offset from left edge of tooltip to point at element center
    const arrowLeft = Math.max(20, Math.min(elCenterX - tooltipLeft, tooltipMaxWidth - 20));

    const skipHtml = `<div style="margin-top:8px;"><button id="tourSkipBtn" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:11px;font-family:inherit;cursor:pointer;padding:4px 8px;">Skip tour</button></div>`;

    // Determine position: use override if specified, otherwise auto-detect
    const position = s.tooltipPosition || (spaceBelow > 130 ? 'below' : spaceAbove > 130 ? 'above' : 'center');

    if (position === 'below') {
      // Position below the element
      tooltip.style.cssText = `position:fixed;z-index:100000;left:${tooltipLeft}px;top:${rect.bottom + 12}px;max-width:${tooltipMaxWidth}px;width:${tooltipMaxWidth}px;`;
      tooltip.innerHTML = `
        <div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid #1a1a2e;margin-left:${arrowLeft - 8}px;"></div>
        <div style="background:#1a1a2e;border-radius:10px;padding:14px 18px;color:white;font-size:13px;line-height:1.5;font-weight:500;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.25);">
          <p style="margin:0 0 12px;">${s.text}</p>
          <button id="tourNextBtn" style="padding:8px 20px;border-radius:6px;border:none;background:#2E7D5B;color:white;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">${step < steps.length - 1 ? 'Next \u2192' : 'Got it!'}</button>
          ${skipHtml}
        </div>`;
    } else if (position === 'above') {
      // Position above the element
      tooltip.style.cssText = `position:fixed;z-index:100000;left:${tooltipLeft}px;bottom:${window.innerHeight - rect.top + 12}px;max-width:${tooltipMaxWidth}px;width:${tooltipMaxWidth}px;`;
      tooltip.innerHTML = `
        <div style="background:#1a1a2e;border-radius:10px;padding:14px 18px;color:white;font-size:13px;line-height:1.5;font-weight:500;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.25);">
          <p style="margin:0 0 12px;">${s.text}</p>
          <button id="tourNextBtn" style="padding:8px 20px;border-radius:6px;border:none;background:#2E7D5B;color:white;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">${step < steps.length - 1 ? 'Next \u2192' : 'Got it!'}</button>
          ${skipHtml}
        </div>
        <div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #1a1a2e;margin-left:${arrowLeft - 8}px;"></div>`;
    } else {
      // Fallback: center on screen
      tooltip.style.cssText = `position:fixed;z-index:100000;left:50%;top:50%;transform:translate(-50%,-50%);max-width:${tooltipMaxWidth}px;width:${tooltipMaxWidth}px;`;
      tooltip.innerHTML = `
        <div style="background:#1a1a2e;border-radius:10px;padding:14px 18px;color:white;font-size:13px;line-height:1.5;font-weight:500;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.25);">
          <p style="margin:0 0 12px;">${s.text}</p>
          <button id="tourNextBtn" style="padding:8px 20px;border-radius:6px;border:none;background:#2E7D5B;color:white;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">${step < steps.length - 1 ? 'Next \u2192' : 'Got it!'}</button>
          ${skipHtml}
        </div>`;
    }
    document.body.appendChild(tooltip);

    document.getElementById('tourNextBtn').onclick = () => {
      cleanupTour();
      step++;
      localStorage.setItem('settingsTourStep', String(step));
      showStep();
    };

    document.getElementById('tourSkipBtn').onclick = () => {
      skipToFinale();
    };
  }

function getAmenityIcon(amenity) {
  const a = amenity.toLowerCase();
  if (a.includes('wifi')) return '<i data-lucide="wifi" style="width:14px;height:14px;"></i>';
  if (a.includes('tv') || a.includes('television')) return '<i data-lucide="tv" style="width:14px;height:14px;"></i>';
  if (a.includes('fridge') || a.includes('refrigerator')) return '<i data-lucide="thermometer-snowflake" style="width:14px;height:14px;"></i>';
  if (a.includes('parking')) return '<i data-lucide="car" style="width:14px;height:14px;"></i>';
  if (a.includes('housekeeping') || a.includes('cleaning')) return '<i data-lucide="sparkles" style="width:14px;height:14px;"></i>';
  if (a.includes('bath') || a.includes('shower')) return '<i data-lucide="bath" style="width:14px;height:14px;"></i>';
  if (a.includes('work') || a.includes('desk')) return '<i data-lucide="laptop" style="width:14px;height:14px;"></i>';
  if (a.includes('pet') || a.includes('dog')) return '<i data-lucide="paw-print" style="width:14px;height:14px;"></i>';
  if (a.includes('pool')) return '<i data-lucide="waves" style="width:14px;height:14px;"></i>';
  if (a.includes('kitchen') || a.includes('microwave')) return '<i data-lucide="cooking-pot" style="width:14px;height:14px;"></i>';
  return '<i data-lucide="check" style="width:14px;height:14px;"></i>';
}

  { key: 'wifi', label: 'Free WiFi', icon: 'wifi' },
  { key: 'tv', label: 'Smart TV', icon: 'tv' },
  { key: 'fridge', label: 'Fridge', icon: 'thermometer-snowflake' },
  { key: 'parking', label: 'Free Parking', icon: 'car' },
  { key: 'housekeeping', label: 'Weekly Housekeeping', icon: 'sparkles' },
  { key: 'bath', label: 'Bath', icon: 'bath' },
  { key: 'workstation', label: 'Workstation', icon: 'laptop' },
  { key: 'pet', label: 'Pet Friendly', icon: 'paw-print' },
  { key: 'pool', label: 'Pool', icon: 'waves' },
  { key: 'kitchen', label: 'Kitchenette', icon: 'cooking-pot' },
  { key: 'ac', label: 'Air Conditioning', icon: 'wind' },
  { key: 'laundry', label: 'Laundry', icon: 'shirt' },
];

let amenityPickerRoomId = null;

function openAmenityPicker(roomId) {
  amenityPickerRoomId = roomId;
  const room = editRooms.find(r => r.id === roomId);
  const current = (room?.amenities || '').split('•').map(a => a.trim().toLowerCase()).filter(Boolean);
  
  let modal = document.getElementById('amenityPickerModal');
  if (!modal) {
    document.body.insertAdjacentHTML('beforeend', `
      <div id="amenityPickerModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:10000;align-items:center;justify-content:center;padding:20px;">
        <div style="background:white;border-radius:16px;padding:24px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);" onclick="event.stopPropagation()">
          <div style="font-size:16px;font-weight:700;margin-bottom:14px;">Select Amenities</div>
          <div id="amenityPickerGrid" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;"></div>
          <div style="margin-bottom:14px;">
            <input type="text" id="amenityCustomInput" placeholder="Or type a custom one..." style="width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:14px;outline:none;">
          </div>
          <div style="display:flex;gap:8px;">
            <button onclick="confirmAmenityPicker()" style="flex:1;padding:11px;border-radius:10px;border:none;background:#2E7D5B;color:white;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;">Done</button>
            <button onclick="closeAmenityPicker()" style="padding:11px 18px;border-radius:10px;border:1.5px solid #e5e7eb;background:none;font-family:inherit;font-size:14px;color:#6b7280;cursor:pointer;">Cancel</button>
          </div>
        </div>
      </div>
    `);
    document.getElementById('amenityPickerModal').addEventListener('click', closeAmenityPicker);
    modal = document.getElementById('amenityPickerModal');
  }

  // Render preset pills
  const grid = document.getElementById('amenityPickerGrid');
  grid.innerHTML = AMENITY_PRESETS.map(p => {
    const isSelected = current.some(c => c.includes(p.key));
    return `<button onclick="toggleAmenityPreset(this,'${p.key}')" data-key="${p.key}" style="display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;border:1.5px solid ${isSelected ? '#2E7D5B' : '#e5e7eb'};background:${isSelected ? '#E8F5EE' : 'white'};color:${isSelected ? '#2E7D5B' : '#1a1a2e'};font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;"><i data-lucide="${p.icon}" style="width:14px;height:14px;"></i> ${p.label}</button>`;
  }).join('');
  
  document.getElementById('amenityCustomInput').value = '';
  modal.style.display = 'flex';
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function toggleAmenityPreset(btn, key) {
  const isActive = btn.style.borderColor === 'rgb(46, 125, 91)';
  btn.style.borderColor = isActive ? '#e5e7eb' : '#2E7D5B';
  btn.style.background = isActive ? 'white' : '#E8F5EE';
  btn.style.color = isActive ? '#1a1a2e' : '#2E7D5B';
}

function closeAmenityPicker() {
  document.getElementById('amenityPickerModal').style.display = 'none';
  amenityPickerRoomId = null;
}

function confirmAmenityPicker() {
  const room = editRooms.find(r => r.id === amenityPickerRoomId);
  if (!room) { closeAmenityPicker(); return; }

  const grid = document.getElementById('amenityPickerGrid');
  const selected = [];
  grid.querySelectorAll('button').forEach(btn => {
    if (btn.style.background === 'rgb(232, 245, 238)') {
      const preset = AMENITY_PRESETS.find(p => p.key === btn.dataset.key);
      if (preset) selected.push(preset.label);
    }
  });

  const custom = document.getElementById('amenityCustomInput').value.trim();
  if (custom) selected.push(custom);

  room.amenities = selected.join(' • ');
  closeAmenityPicker();
  renderEditRooms();
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function addAmenityPrompt(roomId) { openAmenityPicker(roomId); }

function removeAmenity(roomId, amenity) {
  const room = editRooms.find(r => r.id === roomId);
  if (!room) return;
  const current = (room.amenities || '').split('•').map(a => a.trim()).filter(Boolean);
  room.amenities = current.filter(a => a !== amenity).join(' • ');
  renderEditRooms();
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

async function saveHotelInfo() {
  const name = document.getElementById('edit-hotel-name')?.value.trim();
  const subtitle = document.getElementById('edit-hotel-subtitle')?.value.trim();
  const address = document.getElementById('edit-hotel-address')?.value.trim();
  const phone = document.getElementById('edit-hotel-phone')?.value.trim();
  const cancellationPolicy = document.getElementById('edit-hotel-policy')?.value.trim();
  try {
    await api('POST', '/api/crm/hotel-info', { name, subtitle, address, phone, cancellationPolicy });
    toast('Hotel info saved!', 'success');
  } catch (e) {
    toast('Failed to save', 'error');
  }
}

async function saveRates() {
  const nightly = parseFloat(document.getElementById('edit-rate-nightly')?.value) || 69;
  const weekly = parseFloat(document.getElementById('edit-rate-weekly')?.value) || 299;
  const monthly = parseFloat(document.getElementById('edit-rate-monthly')?.value) || 999;
  try {
    await api('POST', '/api/crm/rates', { nightly, weekly, monthly });
    localStorage.setItem('ratesChanged', '1');
    advanceTourIfNeeded();
    toast('Rates saved!', 'success');
  } catch (e) {
    toast('Failed to save rates', 'error');
  }
}

async function changePin() {
  const newPin = document.getElementById('edit-new-pin')?.value.trim();
  if (!newPin || newPin.length < 4) {
    toast('PIN must be at least 4 characters', 'error');
    return;
  }
  try {
    await api('POST', '/api/crm/change-pin', { newPin });
    token = newPin;
    try { localStorage.setItem('crmToken', token); } catch(e) {}
    toast('PIN updated!', 'success');
    // Keep the new PIN visible in the input
  } catch (e) {
    toast('Failed to change PIN', 'error');
  }
}

function copyBookingLink(url) {
  navigator.clipboard.writeText(url).then(() => {
    toast('Booking link copied!', 'success');
  }).catch(() => {
    toast('Failed to copy', 'error');
  });
}

function toggleSection(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.accordion-arrow');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    if (arrow) arrow.style.transform = 'rotate(90deg)';

  if (!files.length) return;
  // Show loading on the room card
  const card = document.getElementById('edit-card-' + roomId);
  const imgContainer = card?.querySelector('div:first-child');
  if (imgContainer) {
    imgContainer.style.position = 'relative';
    imgContainer.insertAdjacentHTML('beforeend', '<div id="upload-spinner-' + roomId + '" style="position:absolute;inset:0;background:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;z-index:5;flex-direction:column;gap:6px;"><div style="width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;"></div><div id="upload-progress-' + roomId + '" style="font-size:12px;color:var(--text-muted);font-weight:600;">0 / ' + files.length + '</div></div>');
  }
  let uploaded = 0;
  for (const file of files) {
    const optimized = await optimizeRoomPhotoForUpload(file);
    const fd = new FormData();
    fd.append('image', optimized, optimized.name || 'room.webp');
    try {
      const res = await fetch(`/api/crm/rooms/${roomId}/images`, {
        method: 'POST',
        headers: { 'x-crm-token': token },
        body: fd,
      });
      const data = await res.json();
      if (data.success && data.image) {
        const room = editRooms.find(r => r.id === roomId);
        if (room) {
          if (!room.images) room.images = [];
          room.images.push(data.image);
          if (!room.imageUrl) room.imageUrl = data.image.url;
        }
        uploaded++;
      }

// Center-crop any uploaded image to a perfect square PNG before sending it up.
// Home-screen icons are ALWAYS square tiles — if the source is a portrait/landscape
// photo the OS stretches it (the "vertically squished" look). Cropping to square
// here means the file itself is square, so it renders correctly everywhere.
function squareCropImage(file, size = 512) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const side = Math.min(img.naturalWidth, img.naturalHeight);
        const sx = (img.naturalWidth - side) / 2;
        const sy = (img.naturalHeight - side) / 2;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
        URL.revokeObjectURL(url);
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('crop failed')), 'image/png', 0.92);
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('load failed')); };
    img.src = url;
  });
}

const APPS_PHONE_RADIUS = '32px';

// Cloudinary URL helpers
function appsCloudinaryImg(url, width) {
  return url.replace('/image/upload/', '/image/upload/f_auto,q_auto,w_' + (width || 400) + '/');
}
function appsPhoneImgStyle(extra) {
  return `border-radius:${APPS_PHONE_RADIUS};box-shadow:0 10px 36px rgba(0,0,0,0.22);${extra || ''}`;
}
// Full-res for lightbox (device pixel aware, max 1600px)
function appsCloudinaryFull(url) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.round(Math.min(window.screen.width * dpr, 1600));
  return url.replace('/image/upload/', `/image/upload/f_auto,q_auto:best,w_${w}/`);
}

// ── LIGHTBOX ──────────────────────────────────────────
// Single global lightbox for the Apps page.
// items: array of { type: 'image'|'video', src, alt, caption }
let _appsLbItems = [];
let _appsLbIdx   = 0;

function appsOpenLightbox(items, startIdx) {
  appsTourClose(false);
  _appsLbItems = items;
  _appsLbIdx   = startIdx || 0;
  let lb = document.getElementById('appsLightbox');
  if (!lb) {
    lb = document.createElement('div');
    lb.id = 'appsLightbox';
    lb.style.cssText = [
      'position:fixed;inset:0;z-index:102000;background:#000;',
      'display:flex;flex-direction:column;align-items:center;justify-content:flex-start;',
      'overscroll-behavior:contain;touch-action:pan-y;',
      'padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);',
    ].join('');
    document.body.appendChild(lb);
    document.body.style.overflow = 'hidden';
    // Keyboard
    lb._keyHandler = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') appsLbNav(1);
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') appsLbNav(-1);
      else if (e.key === 'Escape') appsCloseLightbox();
    };
    document.addEventListener('keydown', lb._keyHandler);
    // Swipe support
    let touchStartX = 0;
    lb.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
    lb.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) appsLbNav(dx < 0 ? 1 : -1);
    }, { passive: true });
  }
  document.body.style.overflow = 'hidden';
  appsLbRender();
}

function appsCloseLightbox() {
  const lb = document.getElementById('appsLightbox');
  if (!lb) return;
  document.removeEventListener('keydown', lb._keyHandler);
  lb.remove();
  document.body.style.overflow = '';
}

function appsLbNav(dir) {
  const total = _appsLbItems.length;
  if (total <= 1) return;
  _appsLbIdx = (_appsLbIdx + dir + total) % total;
  appsLbRender();
}

function appsLbRender() {
  const lb = document.getElementById('appsLightbox');
  if (!lb) return;
  const item    = _appsLbItems[_appsLbIdx];
  const total   = _appsLbItems.length;
  const isImg   = item.type !== 'video';
  const counter = total > 1 ? `${_appsLbIdx + 1} / ${total}` : '';

  const mediaHtml = isImg
    ? `<img src="${appsCloudinaryFull(item.src)}" alt="${item.alt || ''}"
          style="max-width:100%;max-height:calc(100dvh - 160px);width:auto;height:auto;display:block;object-fit:contain;${appsPhoneImgStyle()}"
          loading="eager" decoding="async">`
    : `<video autoplay loop muted playsinline webkit-playsinline
          style="max-width:100%;max-height:calc(100dvh - 160px);width:auto;height:auto;display:block;${appsPhoneImgStyle()}"
          ${item.poster ? `poster="${appsCloudinaryImg(item.poster, 400)}"` : ''}>
          <source src="${item.src}" type="video/mp4">
       </video>`;

  const prevBtn = total > 1
    ? `<button onclick="appsLbNav(-1)" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);">‹</button>` : '';
  const nextBtn = total > 1
    ? `<button onclick="appsLbNav(1)"  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);">›</button>` : '';

  const dotNav = total > 1 ? `<div style="display:flex;gap:7px;justify-content:center;margin-top:12px;">
    ${Array.from({length: total}, (_, i) =>
      `<div onclick="appsOpenLightbox(_appsLbItems,${i})" style="width:7px;height:7px;border-radius:50%;background:${i===_appsLbIdx ? '#fff' : 'rgba(255,255,255,0.35)'};cursor:pointer;transition:background 0.2s;"></div>`
    ).join('')}
  </div>` : '';

  lb.innerHTML = `
    <div style="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:max(12px,env(safe-area-inset-top)) 16px 12px;z-index:2;">
      <div style="font-size:12px;color:rgba(255,255,255,0.6);font-weight:600;">${counter}</div>
      <button onclick="appsCloseLightbox()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);">✕</button>
    </div>
    <div style="position:relative;width:100%;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:52px 16px 8px;box-sizing:border-box;">
      ${mediaHtml}
      ${prevBtn}${nextBtn}
    </div>
    <div style="flex-shrink:0;padding:8px 20px max(20px,env(safe-area-inset-bottom));text-align:center;width:100%;max-width:420px;margin:0 auto;box-sizing:border-box;">
      ${item.title ? `<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.35;">${item.title}</div>` : ''}
      ${item.caption ? `<div style="font-size:12px;color:rgba(255,255,255,0.65);line-height:1.55;margin-bottom:10px;">${item.caption}</div>` : ''}
      ${dotNav}
    </div>`;
}

async function loadGuestInstallStats() {
  const el = document.getElementById('guestInstallStats');
  if (!el) return;
  try {
    const data = await api('GET', '/api/crm/guest-install-stats');
    if (!data.success) throw new Error(data.message || 'Failed');
    const t = data.totals || {};
    const rate = data.installRatePercent != null ? data.installRatePercent : 0;
    const rows = Object.entries(data.byTouchpoint || {})
      .filter(function(entry) { return (entry[1].views || entry[1].installed); })
      .sort(function(a, b) { return (b[1].installed || 0) - (a[1].installed || 0); })
      .slice(0, 5);
    const rowHtml = rows.length ? rows.map(function(entry) {
      const label = entry[0].replace(/-/g, ' ');
      const s = entry[1];
      return '<div style="display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);">'
        + '<span style="color:var(--text);font-weight:600;text-transform:capitalize;">' + label + '</span>'
        + '<span style="color:var(--text-muted);white-space:nowrap;">' + (s.views || 0) + ' views · ' + (s.installed || 0) + ' installed</span>'
        + '</div>';
    }).join('') : '<div style="font-size:12px;color:var(--text-muted);">No install activity yet — try the check-in QR at the desk.</div>';

    el.innerHTML = ''
      + '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:8px;">Guest installs — last 30 days</div>'
      + '<div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">'
      + '<div style="flex:1;min-width:80px;background:var(--bg);border-radius:10px;padding:10px;text-align:center;">'
      + '<div style="font-size:20px;font-weight:800;color:var(--text);">' + rate + '%</div>'
      + '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">of bookings installed</div></div>'
      + '<div style="flex:1;min-width:80px;background:var(--bg);border-radius:10px;padding:10px;text-align:center;">'
      + '<div style="font-size:20px;font-weight:800;color:var(--text);">' + (data.installedBookings || 0) + '</div>'
      + '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">confirmed installs</div></div>'
      + '<div style="flex:1;min-width:80px;background:var(--bg);border-radius:10px;padding:10px;text-align:center;">'
      + '<div style="font-size:20px;font-weight:800;color:var(--text);">' + (t.views || 0) + '</div>'
      + '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">install page views</div></div>'
      + '</div>'
      + '<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">By touchpoint</div>'
      + rowHtml;
  } catch (e) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);">Install stats unavailable right now.</div>';
  }
}

let _appsTourSteps = [];
let _appsTourIdx = 0;

function appsTourClose(markDone) {
  const lb = document.getElementById('appsTourLightbox');
  if (lb) {
    if (lb._swipeStart) lb.removeEventListener('touchstart', lb._swipeStart);
    if (lb._swipeEnd) lb.removeEventListener('touchend', lb._swipeEnd);
    lb.remove();
  }
  document.body.style.overflow = '';
  if (markDone) localStorage.setItem('appsTourDone', '1');
}

function appsTourNav(dir) {
  const next = _appsTourIdx + dir;
  if (next < 0 || next >= _appsTourSteps.length) return;
  _appsTourIdx = next;
  appsTourRender();
}

function appsTourRender() {
  const lb = document.getElementById('appsTourLightbox');
  if (!lb) return;
  const step = _appsTourSteps[_appsTourIdx];
  const total = _appsTourSteps.length;
  const isLast = _appsTourIdx >= total - 1;
  const counter = `${_appsTourIdx + 1} / ${total}`;
  const btnLabel = isLast ? 'Got it — show me' : 'Next →';

  const dots = Array.from({ length: total }, (_, i) =>
    `<div style="width:7px;height:7px;border-radius:50%;background:${i === _appsTourIdx ? '#fff' : 'rgba(255,255,255,0.35)'};"></div>`
  ).join('');

  let mediaHtml = '';
  if (step.type === 'cta') {
    mediaHtml = `<div style="width:100%;max-width:320px;padding:0 8px;box-sizing:border-box;">${step.ctaHtml}</div>`;
  } else if (step.type === 'video') {

  } else {
    mediaHtml = `<img src="${step.src}" alt="${step.alt || ''}" loading="eager" decoding="async"
      style="max-width:100%;max-height:min(50dvh,440px);width:auto;height:auto;display:block;object-fit:contain;${appsPhoneImgStyle()}">`;
  }

  lb.innerHTML = `
    <div style="flex-shrink:0;width:100%;display:flex;align-items:center;justify-content:space-between;padding:max(10px,env(safe-area-inset-top)) 16px 10px;box-sizing:border-box;">

      <button type="button" id="appsTourSkipBtn" style="background:rgba(255,255,255,0.12);border:none;color:rgba(255,255,255,0.8);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;padding:8px 14px;border-radius:20px;">Skip</button>

    <div style="flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;padding:0 16px;box-sizing:border-box;overflow:hidden;">

      ${step.caption ? `<div style="font-size:13px;color:rgba(255,255,255,0.7);line-height:1.55;margin-bottom:14px;">${step.caption}</div>` : ''}
      <button type="button" id="appsTourNextBtn" style="width:100%;padding:14px;border-radius:12px;border:none;background:#2E7D5B;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;">${btnLabel}</button>
      <div style="display:flex;gap:6px;justify-content:center;">${dots}</div>
    </div>`;

  document.getElementById('appsTourNextBtn').onclick = () => {

          <div style="font-size:11px;font-weight:800;color:#4CAF7D;margin-bottom:4px;">STEP 1</div>
          <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;">Put Front Desk on your phone</div>
          <p style="font-size:12px;color:rgba(255,255,255,0.65);margin:0;line-height:1.5;">Tap <strong>Put Front Desk on my phone</strong> at the top when you close this.</p>
        </div>
        <div style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px;text-align:left;">
          <div style="font-size:11px;font-weight:800;color:#4CAF7D;margin-bottom:8px;">STEP 2</div>
          <div style="display:flex;align-items:center;gap:12px;">
            ${iconEl}
            <div>
              <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;">Upload your hotel logo</div>
              <p style="font-size:12px;color:rgba(255,255,255,0.65);margin:0;line-height:1.45;">So guests see <strong>${shortName}</strong> — not a random letter.</p>
            </div>
          </div>
        </div>`,
    },
  ];

  _appsTourIdx = 0;
  appsCloseLightbox();
  appsTourClose(false);

  const lb = document.createElement('div');
  lb.id = 'appsTourLightbox';
  lb.style.cssText = [
    'position:fixed;inset:0;z-index:102001;background:#000;',
    'display:flex;flex-direction:column;',
    'overscroll-behavior:contain;touch-action:pan-y;',
    'padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);',
  ].join('');
  let touchStartX = 0;
  lb._swipeStart = (e) => { touchStartX = e.changedTouches[0].clientX; };
  lb._swipeEnd = (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) appsTourNav(dx < 0 ? 1 : -1);
  };
  lb.addEventListener('touchstart', lb._swipeStart, { passive: true });
  lb.addEventListener('touchend', lb._swipeEnd, { passive: true });
  document.body.appendChild(lb);
  document.body.style.overflow = 'hidden';
  appsTourRender();
}


// ── INIT ───────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/frontdesk-sw.js').catch(() => {});
document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
bootCrmApp();
if ('requestIdleCallback' in window) {
  requestIdleCallback(() => { loadAppsModule().catch(() => {}); }, { timeout: 4000 });
} else {
  setTimeout(() => { loadAppsModule().catch(() => {}); }, 2000);
}
setInterval(refreshCurrentView, 30000);
(function(){
  function loadTelemetry(){
    const s = document.createElement('script');
    s.src = '/marketel-telemetry.js';
    s.defer = true;
    document.body.appendChild(s);
  }
  if ('requestIdleCallback' in window) requestIdleCallback(loadTelemetry, { timeout: 8000 });
  else setTimeout(loadTelemetry, 4000);
})();
</script>
