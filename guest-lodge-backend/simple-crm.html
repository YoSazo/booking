<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketel · Front Desk</title>
  <link rel="manifest" href="/manifest-simple-crm.json">
  <meta name="theme-color" content="#EEF2EF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #2E7D5B; --green-light: #4CAF7D; --green-pale: #E8F5EE;
      --green-mint: #C8EDD9; --bg: #EEF2EF; --white: #FFFFFF;
      --text: #1A2B22; --text-muted: #6B7D72; --border: #D8E4DC;
      --red: #E05252; --amber: #F59E0B;
      --shadow: 0 2px 12px rgba(46,125,91,0.10);
      --shadow-lg: 0 8px 32px rgba(46,125,91,0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* ── LOGIN ── */
    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a2b22 0%, #2E7D5B 100%);
    }
    .login-card {
      background: white; border-radius: 20px; padding: 40px 36px; width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .login-logo-icon { height: 48px; width: auto; }
    .login-logo-text { height: 28px; width: auto; }
    .login-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .login-input {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: 12px; font-family: inherit; font-size: 18px; text-align: center;
      letter-spacing: 4px; outline: none; margin-bottom: 12px; color: var(--text);
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--green); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--green); color: white;
      border: none; border-radius: 12px; font-family: inherit; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .login-btn:hover { background: #245f46; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 20px; }

    /* ── HEADER ── */
    .header {
      background: var(--white); border-bottom: 1.5px solid var(--border);
      padding: 8px 16px; min-height: 58px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 8px rgba(46,125,91,0.07);
      gap: 8px; flex-wrap: wrap;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; color: var(--text); flex-shrink: 0; }
    .header-logo-icon { height: 32px; width: auto; }
    .header-logo-text { height: 20px; width: auto; }
    .header-logo-suffix { margin-left: 2px; color: var(--text-muted); font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stat-pill {
      background: var(--green-pale); border-radius: 20px; padding: 4px 12px;
      font-size: 12px; font-weight: 600; color: var(--green); display: flex; align-items: center; gap: 4px;
    }
    .refresh-btn {
      background: var(--green-pale); border: 1.5px solid var(--border); border-radius: 8px;
      padding: 5px 12px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--green); cursor: pointer; transition: all 0.15s;
    }
    .refresh-btn:hover { background: var(--green); color: white; border-color: var(--green); }

    /* ── LAYOUT ── */
    .container { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

    /* TABS */
    .tabs-container {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 5px;
      position: relative;
      width: fit-content;
    }

    .tabs-slider {
      position: absolute;
      top: 5px;
      left: 5px;
      height: calc(100% - 10px);
      background: var(--white);
      border-radius: 11px;
      box-shadow: 0 2px 8px rgba(46,125,91,0.13), 0 1px 3px rgba(0,0,0,0.07);
      transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 0;
      will-change: transform, width;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: none;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.22s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
      border-radius: 11px;
      white-space: nowrap;
      user-select: none;
    }

    .tab:hover {
      color: var(--text);
      background: none;
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: transparent;
    }

    .tab-badge {
      background: var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      transition: background 0.22s ease, color 0.22s ease, transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab.active .tab-badge {
      background: var(--green-pale);
      color: var(--green);
      transform: scale(1.08);
    }

    /* Tab ripple on click */
    .tab::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 11px;
      background: var(--green);
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.15s, transform 0.15s;
      z-index: -1;
      pointer-events: none;
    }

    .tab:active::after {
      opacity: 0.07;
      transform: scale(1);
    }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .count-badge {
      background: var(--green); color: white;
      padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }

    /* ── BOOKING CARD ── */
    .booking-card {
      background: var(--white); border: 2px solid var(--border);
      border-radius: 20px; overflow: hidden;
      box-shadow: var(--shadow); margin-bottom: 14px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .booking-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .card-accent { height: 5px; background: var(--green); }
    .card-accent.declined { background: var(--amber); }

    .card-inner { padding: 20px 22px; }

    /* TOP ROW */
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 17px; }
    .guest-info { display: flex; flex-direction: column; gap: 4px; }
    .guest-name { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .guest-time { font-size: 15px; color: var(--text-muted); font-weight: 500; }

    .card-amount { 
      font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 700;
      color: var(--green); text-align: right; flex-shrink: 0; margin-left: 17px;
    }

    /* META ROW */
    .card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 17px; align-items: center; }
    .meta-chip {
      display: flex; align-items: center; gap: 4px; background: var(--bg);
      border-radius: 10px; padding: 4px 11px; font-size: 15px; color: var(--text-muted); font-weight: 500;
    }
    .declined-chip {
      background: #FEF3C7; color: #92400E; border-radius: 10px;
      padding: 4px 11px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .pay-chip {
      background: #DBEAFE; color: #1E40AF; border-radius: 10px;
      padding: 4px 11px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }

    /* DATES */
    .card-dates {
      display: flex; gap: 0; margin-bottom: 17px;
      background: var(--bg); border-radius: 14px; overflow: hidden;
      border: 2px solid var(--border);
    }
    .date-block {
      flex: 1; padding: 11px 17px; display: flex; flex-direction: column; gap: 3px;
    }
    .date-block + .date-block { border-left: 2px solid var(--border); }
    .date-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: var(--text-muted); }
    .date-value { font-size: 18px; font-weight: 600; color: var(--text); }

    /* CONTACT ROW */
    .card-contact { display: flex; align-items: center; justify-content: space-between; margin-bottom: 17px; gap: 14px; }
    .contact-details { display: flex; flex-direction: column; gap: 3px; }
    .contact-phone { font-size: 25px; font-weight: 700; color: var(--green); font-family: 'DM Mono', monospace; }
    .contact-email { font-size: 15px; color: var(--text-muted); }

    .phone-call-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--green); color: white;
      border: none; border-radius: 14px; padding: 13px 22px;
      font-family: inherit; font-size: 18px; font-weight: 700;
      cursor: pointer; text-decoration: none; transition: all 0.15s;
      flex-shrink: 0;
    }
    .phone-call-btn:hover { background: #245f46; transform: scale(1.03); }

    /* FOOTER */
    .card-footer { display: flex; gap: 11px; padding-top: 17px; border-top: 1.4px solid var(--border); }
    .btn {
      flex: 1; padding: 13px 17px; border-radius: 14px; font-family: inherit;
      font-size: 17px; font-weight: 600; cursor: pointer; border: 2px solid transparent;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-confirm { background: var(--green); color: white; }
    .btn-confirm:hover { background: #245f46; }
    .btn-note { background: var(--white); color: var(--text); border-color: var(--border); }
    .btn-note:hover { border-color: var(--green); color: var(--green); background: var(--green-pale); }

    /* ── STATES ── */
    .empty-state {
      text-align: center; padding: 64px 20px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-sub { font-size: 13px; color: var(--text-muted); }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; font-size: 14px; color: var(--text-muted); gap: 10px;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    /* Notes Section */
    .card-notes {
      margin-top: 12px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .notes-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .notes-count {
      font-size: 11px;
      background: #e5e7eb;
      color: #6b7280;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .notes-content {
      font-size: 13px;
      color: #374151;
      line-height: 1.5;
      white-space: pre-wrap;
      max-height: 100px;
      overflow-y: auto;
    }
    .notes-empty {
      font-size: 12px;
      color: #9ca3af;
      font-style: italic;
    }

    /* Notes Modal */
    .notes-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .notes-modal {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: modalSlideUp 0.2s ease-out;
    }
    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .notes-modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .notes-modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }
    .notes-modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .notes-modal-close:hover {
      background: #e5e7eb;
      color: #111827;
    }
    .notes-modal-body {
      padding: 24px;
    }
    .notes-input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    .notes-input {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: #111827;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    .notes-input:focus {
      border-color: #2E7D5B;
    }
    .notes-modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .notes-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      font-family: inherit;
    }
    .notes-btn-cancel {
      background: #f3f4f6;
      color: #6b7280;
    }
    .notes-btn-cancel:hover {
      background: #e5e7eb;
    }
    .notes-btn-save {
      background: #2E7D5B;
      color: white;
    }
    .notes-btn-save:hover {
      background: #245f46;
    }

    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 7px; }
    .toast {
      background: var(--text); color: white; border-radius: 11px; padding: 11px 16px;
      font-size: 12px; font-weight: 600; box-shadow: var(--shadow-lg);
      display: flex; align-items: center; gap: 7px;
      animation: slideInR 0.2s ease, fadeOut 0.3s ease 2.7s forwards;
    }
    @keyframes slideInR { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeOut { to{opacity:0;transform:translateX(20px)} }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    .availability-view { margin-top: 8px; display: flex; flex-direction: column; gap: 14px; }
    .availability-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .availability-card {
      background: var(--white); border: 2px solid var(--border); border-radius: 16px;
      padding: 14px; box-shadow: var(--shadow);
    }
    .availability-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .availability-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .availability-input, .availability-select {
      flex: 1; min-width: 120px; border: 1.5px solid var(--border);
      border-radius: 10px; padding: 9px 10px; font-family: inherit; color: var(--text);
      background: var(--white);
    }
    .availability-btn {
      border: 1.5px solid var(--green); background: var(--green); color: white;
      border-radius: 10px; padding: 9px 12px; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .availability-btn.alt { background: var(--white); color: var(--green); }
    .availability-toggle {
      display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted);
      margin: 4px 0 8px;
    }
    .availability-help { font-size: 12px; color: var(--text-muted); }
    .availability-table-wrap { overflow-x: auto; border: 1.5px solid var(--border); border-radius: 12px; }
    .availability-table { width: 100%; border-collapse: collapse; min-width: 720px; background: var(--white); }
    .availability-table th, .availability-table td {
      padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 13px; text-align: left;
    }
    .availability-table th { background: var(--bg); font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); }
    .availability-pill {
      display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700;
      background: var(--green-pale); color: var(--green);
    }
    .availability-pill.low { background: #FEF3C7; color: #92400E; }
    .availability-pill.closed { background: #FEE2E2; color: #991B1B; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .header { padding: 6px 12px; }
      .header-right { gap: 6px; }
      .stat-pill { display: none !important; }
      .refresh-btn { padding: 5px 8px; font-size: 11px; }
      .container { padding: 16px 12px; }
      .card-inner { padding: 12px 14px; }
      .contact-phone { font-size: 15px; }
      .guest-name { font-size: 20px; }
      .card-amount { font-size: 20px; }
      .date-value { font-size: 15px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="/marketellogo.svg" alt="" class="login-logo-icon">
      <img src="/marketel.svg" alt="Marketel" class="login-logo-text">
    </div>
    <p>Front Desk — Enter your PIN to continue</p>
    <input class="login-input" type="password" id="pinInput" placeholder="••••••" maxlength="20"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <header class="header">
    <div class="header-logo">
      <img src="/marketellogo.svg" alt="" class="header-logo-icon">
      <img src="/marketel.svg" alt="Marketel" class="header-logo-text">
      <span class="header-logo-suffix">Front Desk</span>
    </div>
    <div class="header-right">
      <div id="statNew" class="stat-pill">📥 <strong id="statCount">0</strong> Needs Call</div>
      <button class="refresh-btn" onclick="addDummyBookings()">➕ Test Bookings</button>
      <button class="refresh-btn" id="btnNotify" onclick="enableNotifications()">🔔 Notifications</button>
      <button class="refresh-btn" onclick="loadBookings()">↻ Refresh</button>
    </div>
  </header>

  <div class="container">
    <div class="tabs-container">
      <div class="tabs-slider" id="tabsSlider"></div>
      <button class="tab active" onclick="setFilter('needs-call', this)">
        📞 Needs Call <span class="tab-badge" id="countNeedsCalled">0</span>
      </button>
      <button class="tab" onclick="setFilter('called', this)">
        ✅ Called <span class="tab-badge" id="countCalled">0</span>
      </button>
    </div>
    <div id="bookingsList">
      <div class="loading"><div class="spinner"></div> Loading bookings…</div>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<!-- NOTES MODAL -->
<div class="notes-modal-overlay" id="notesModal" onclick="closeNotesModal(event)">
  <div class="notes-modal" onclick="event.stopPropagation()">
    <div class="notes-modal-header">
      <div class="notes-modal-title">Add Note</div>
      <button class="notes-modal-close" onclick="closeNotesModal()">×</button>
    </div>
    <div class="notes-modal-body">
      <label class="notes-input-label">Note</label>
      <textarea class="notes-input" id="noteInput" placeholder="Add details about the booking, guest requests, or call notes..."></textarea>
    </div>
    <div class="notes-modal-footer">
      <button class="notes-btn notes-btn-cancel" onclick="closeNotesModal()">Cancel</button>
      <button class="notes-btn notes-btn-save" onclick="saveNote()">Save Note</button>
    </div>
  </div>
</div>

<script>
let token = '';
let bookings = [];
let currentFilter = 'needs-call';
let manualAvailability = { rooms: [], overrides: {} };
let manualSelectedRoom = '';

try { token = localStorage.getItem('crmToken') || ''; } catch(e) {}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toIsoDate(dateLike) {
  const d = new Date(dateLike);
  if (Number.isNaN(d.getTime())) return '';
  return d.toISOString().slice(0, 10);
}

function addDaysIso(days) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function enumerateDates(startIso, endIso, maxDays = 180) {
  if (!startIso || !endIso || endIso < startIso) return [];
  const out = [];
  let cursor = new Date(`${startIso}T00:00:00.000Z`);
  const end = new Date(`${endIso}T00:00:00.000Z`);
  while (cursor <= end && out.length < maxDays) {
    out.push(cursor.toISOString().slice(0, 10));
    cursor = new Date(cursor.getTime() + 86400000);
  }
  return out;
}

function ensureAvailabilityUi() {
  const tabs = document.querySelector('.tabs-container');
  if (tabs && !document.getElementById('countRooms')) {

    btn.className = 'tab';

  }

  const container = document.querySelector('.container');
  if (container && !document.getElementById('availabilityView')) {
    container.insertAdjacentHTML('beforeend', `
      <div id="availabilityView" class="availability-view" style="display:none">
        <div class="availability-grid">
          <div class="availability-card">
            <div class="availability-title">Room Types</div>
            <div class="availability-row">

              <input id="roomTypeUnitsInput" class="availability-input" type="number" min="0" step="1" placeholder="Total units">
            </div>
            <div class="availability-row">
              <button class="availability-btn" onclick="saveRoomType()">Save Room Type</button>
            </div>
            <div class="availability-help">Set how many rooms exist for each room type.</div>
          </div>
          <div class="availability-card">
            <div class="availability-title">Date Range Override</div>
            <div class="availability-row">
              <select id="availabilityRoomSelect" class="availability-select" onchange="onAvailabilityRoomChange()"></select>
            </div>
            <div class="availability-row">
              <input id="availabilityStartDate" class="availability-input" type="date">
              <input id="availabilityEndDate" class="availability-input" type="date">
            </div>
            <div class="availability-row">
              <input id="availabilityUnitsInput" class="availability-input" type="number" min="0" step="1" placeholder="Available units override">
            </div>
            <label class="availability-toggle">
              <input id="availabilityClosedInput" type="checkbox">
              Mark dates as closed (sold out)
            </label>
            <div class="availability-row">
              <button class="availability-btn" onclick="applyAvailabilityRange()">Apply Range</button>
              <button class="availability-btn alt" onclick="clearAvailabilityRange()">Clear Range</button>
            </div>
            <div class="availability-help">Override availability for short closures, outages, or manual holds.</div>
          </div>
        </div>
        <div class="availability-card">
          <div class="availability-title">21-Day Front Desk Preview</div>
          <div id="availabilityTableWrap" class="availability-table-wrap"></div>
        </div>
      </div>
    `);
  }

  const startEl = document.getElementById('availabilityStartDate');
  const endEl = document.getElementById('availabilityEndDate');
  if (startEl && !startEl.value) startEl.value = addDaysIso(0);
  if (endEl && !endEl.value) endEl.value = addDaysIso(20);
}

// ── LOGIN ──────────────────────────────────────────────
async function doLogin() {
  const pin = document.getElementById('pinInput').value.trim();
  const err = document.getElementById('loginError');
  err.textContent = '';
  if (!pin) { err.textContent = 'Please enter PIN'; return; }
  
  // Verify PIN with server first
  try {
    const res = await fetch('/api/crm/verify', { headers: { 'x-crm-token': pin } });
    const json = await res.json().catch(() => ({}));
    if (res.ok && json.success) {
      token = pin;
      try { localStorage.setItem('crmToken', token); } catch(e) {}
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      ensureAvailabilityUi();
      loadManualAvailability();
      loadBookings();
    } else {
      err.textContent = 'Wrong PIN';
    }
  } catch (e) {
    err.textContent = 'Connection failed';
  }
}

// ── API ────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'x-crm-token': token } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (res.status === 401) { showLogin(); throw new Error('Unauthorized'); }
  return res.json();
}

function showLogin() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  token = '';
  try { localStorage.removeItem('crmToken'); } catch(e) {}
}

// ── LOAD ───────────────────────────────────────────────
async function loadBookings() {
  try {
    const data = await api('GET', '/api/crm/bookings');
    if (!data.success) throw new Error(data.message);
    bookings = data.data || [];
    
    // Update counts
    const needsCalls = bookings.filter(b => b.callStatus === 'not-called');
    const called = bookings.filter(b => b.callStatus === 'called');
    document.getElementById('countNeedsCalled').textContent = needsCalls.length;
    document.getElementById('countCalled').textContent = called.length;
    document.getElementById('statCount').textContent = needsCalls.length;
    
    // Render based on current filter
    applyFilter();
  } catch(e) {
    if (e.message === 'Unauthorized') return;
    document.getElementById('bookingsList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">Could not load bookings</div>
        <div class="empty-sub">${esc(e.message)}</div>
      </div>`;
  }
}

// ── RENDER ─────────────────────────────────────────────
function renderBookings(list) {
  const el = document.getElementById('bookingsList');

  if (list.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✅</div>
        <div class="empty-text">All caught up!</div>
        <div class="empty-sub">No bookings need a call right now.</div>
      </div>`;
    return;
  }

  el.innerHTML = list.map(b => {
    const isDeclined = b.notes && b.notes.includes('PAYMENT DECLINED');
    const ci = b.checkinDate ? new Date(b.checkinDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
    const co = b.checkoutDate ? new Date(b.checkoutDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
    const ago = timeAgo(b.createdAt);

    return `
    <div class="booking-card">
      <div class="card-accent ${isDeclined ? 'declined' : ''}"></div>
      <div class="card-inner">

        <div class="card-top">
          <div class="guest-info">
            <div class="guest-name">${esc(b.guestFirstName)} ${esc(b.guestLastName)}</div>
            <div class="guest-time">${ago}</div>
          </div>
          <div class="card-amount">$${Number(b.grandTotal).toFixed(2)}</div>
        </div>

        <div class="card-meta">
          <div class="meta-chip">🛏 ${esc(b.roomName || 'Room')}</div>
          <div class="meta-chip">🌙 ${b.nights} night${b.nights !== 1 ? 's' : ''}</div>
          ${isDeclined ? '<div class="declined-chip">⚠️ Card declined</div>' : '<div class="pay-chip">💳 Pay at check-in</div>'}
        </div>

        <div class="card-dates">
          <div class="date-block">
            <div class="date-label">Check-in</div>
            <div class="date-value">${ci}</div>
          </div>
          <div class="date-block">
            <div class="date-label">Check-out</div>
            <div class="date-value">${co}</div>
          </div>
          <div class="date-block">
            <div class="date-label">Guests</div>
            <div class="date-value">${b.guests || 1} guest${(b.guests || 1) !== 1 ? 's' : ''}</div>
          </div>
        </div>

        <div class="card-contact">
          <div class="contact-details">
            <div class="contact-phone">${esc(b.guestPhone)}</div>
            <div class="contact-email">${esc(b.guestEmail)}</div>
          </div>
        </div>

        ${b.notes ? `
        <div class="card-notes">
          <div class="notes-header">
            <div class="notes-title">Notes</div>
          </div>
          <div class="notes-content">${esc(b.notes)}</div>
        </div>
        ` : ''}

        <div class="card-footer">
          <button class="btn btn-confirm" onclick="markConfirmed('${b.id}')">✓ Mark Called</button>
          <button class="btn btn-note" onclick="addNote('${b.id}', ${esc(JSON.stringify(b.notes || ''))})">📝 ${b.notes ? 'Edit' : 'Add'} Note</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── FILTER TABS ────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  moveSlider(btn);
  if (filter === 'availability') {
    loadManualAvailability().then(applyFilter).catch(() => applyFilter());
    return;
  }
  applyFilter();
}

function moveSlider(activeTab) {
  const slider = document.getElementById('tabsSlider');
  if (!slider || !activeTab) return;
  slider.style.width = activeTab.offsetWidth + 'px';
  slider.style.transform = `translateX(${activeTab.offsetLeft - 5}px)`;
}

// Call on load to position slider under the default active tab
document.addEventListener('DOMContentLoaded', () => {
  ensureAvailabilityUi();
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) moveSlider(activeTab);
});

function applyFilter() {
  const bookingsEl = document.getElementById('bookingsList');
  const availabilityEl = document.getElementById('availabilityView');

  if (currentFilter === 'availability') {
    if (bookingsEl) bookingsEl.style.display = 'none';
    if (availabilityEl) availabilityEl.style.display = 'flex';
    renderAvailabilityView();
    return;
  }

  if (bookingsEl) bookingsEl.style.display = '';
  if (availabilityEl) availabilityEl.style.display = 'none';
  const filtered = currentFilter === 'needs-call' 
    ? bookings.filter(b => b.callStatus === 'not-called')
    : bookings.filter(b => b.callStatus === 'called');
  renderBookings(filtered);
}

async function loadManualAvailability() {
  try {
    const data = await api('GET', '/api/crm/manual-availability');
    if (!data.success) throw new Error(data.message || 'Failed to load manual availability');
    manualAvailability = data.data || { rooms: [], overrides: {} };
    if (!Array.isArray(manualAvailability.rooms)) manualAvailability.rooms = [];
    if (!manualAvailability.overrides || typeof manualAvailability.overrides !== 'object') {
      manualAvailability.overrides = {};
    }
    if (!manualSelectedRoom && manualAvailability.rooms.length) {
      manualSelectedRoom = manualAvailability.rooms[0].name;
    }
    refreshRoomBadge();
    populateAvailabilityRoomSelect();
  } catch (e) {
    toast('Could not load manual availability', 'error');
  }
}

function roomDateKey(roomName, day) {
  return `${roomName}|${day}`;
}

function refreshRoomBadge() {
  const badge = document.getElementById('countRooms');
  if (badge) badge.textContent = manualAvailability.rooms.length;
}

function populateAvailabilityRoomSelect() {
  const select = document.getElementById('availabilityRoomSelect');
  if (!select) return;
  const rooms = manualAvailability.rooms || [];
  if (!rooms.length) {
    select.innerHTML = '<option value="">No room types yet</option>';
    manualSelectedRoom = '';
    return;
  }

  if (!manualSelectedRoom || !rooms.some(r => r.name === manualSelectedRoom)) {
    manualSelectedRoom = rooms[0].name;
  }

  select.innerHTML = rooms.map(r => `<option value="${esc(r.name)}">${esc(r.name)} (${Number(r.totalUnits || 0)} total)</option>`).join('');
  select.value = manualSelectedRoom;
}

function bookingsByRoomDate() {
  const counts = {};
  for (const b of bookings) {
    if (b.paymentDeclined) continue;
    const roomName = String(b.roomName || '').trim();
    if (!roomName) continue;
    const ci = toIsoDate(b.checkinDate);
    const co = toIsoDate(b.checkoutDate);
    if (!ci || !co || co <= ci) continue;
    const days = enumerateDates(ci, toIsoDate(new Date(new Date(`${co}T00:00:00.000Z`).getTime() - 86400000)));
    for (const day of days) {
      const key = roomDateKey(roomName, day);
      counts[key] = (counts[key] || 0) + 1;
    }
  }
  return counts;
}

function availabilityFor(room, day, bookedMap) {
  const baseUnits = Math.max(0, Number(room.totalUnits || 0));
  const booked = bookedMap[roomDateKey(room.name, day)] || 0;
  const override = manualAvailability.overrides[roomDateKey(room.name, day)];

  if (override?.closed) return { mode: 'closed', value: 0, booked, baseUnits };
  if (override && override.availableUnits !== null && override.availableUnits !== undefined && override.availableUnits !== '') {
    return { mode: 'override', value: Math.max(0, Number(override.availableUnits) || 0), booked, baseUnits };
  }
  return { mode: 'base', value: Math.max(0, baseUnits - booked), booked, baseUnits };
}

function renderAvailabilityView() {
  ensureAvailabilityUi();
  populateAvailabilityRoomSelect();
  renderAvailabilityTable();
}

function renderAvailabilityTable() {
  const wrap = document.getElementById('availabilityTableWrap');
  if (!wrap) return;
  if (!manualSelectedRoom) {
    wrap.innerHTML = '<div class="availability-help" style="padding:12px;">Add at least one room type to start manual availability.</div>';
    return;
  }

  const room = (manualAvailability.rooms || []).find(r => r.name === manualSelectedRoom);
  if (!room) {
    wrap.innerHTML = '<div class="availability-help" style="padding:12px;">Selected room type was not found.</div>';
    return;
  }

  const bookedMap = bookingsByRoomDate();
  const start = addDaysIso(0);
  const end = addDaysIso(20);
  const days = enumerateDates(start, end);

  const rows = days.map(day => {
    const result = availabilityFor(room, day, bookedMap);
    const d = new Date(`${day}T00:00:00.000Z`);
    const friendly = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const badgeClass = result.mode === 'closed' ? 'availability-pill closed' : result.value <= 1 ? 'availability-pill low' : 'availability-pill';
    const modeText = result.mode === 'closed' ? 'Closed' : result.mode === 'override' ? 'Override' : 'Auto';

    return `
      <tr>
        <td>${esc(friendly)}</td>
        <td>${result.baseUnits}</td>
        <td>${result.booked}</td>
        <td><span class="${badgeClass}">${result.value}</span></td>
        <td>${modeText}</td>
      </tr>
    `;
  }).join('');

  wrap.innerHTML = `
    <table class="availability-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Total Units</th>
          <th>Booked</th>
          <th>Available</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function onAvailabilityRoomChange() {
  const select = document.getElementById('availabilityRoomSelect');
  manualSelectedRoom = select ? select.value : '';
  renderAvailabilityTable();
}

async function saveRoomType() {
  const nameEl = document.getElementById('roomTypeNameInput');
  const unitsEl = document.getElementById('roomTypeUnitsInput');
  if (!nameEl || !unitsEl) return;
  const roomName = nameEl.value.trim();
  const totalUnits = Math.max(0, parseInt(unitsEl.value, 10) || 0);
  if (!roomName) {
    toast('Room name is required', 'error');
    return;
  }

  try {
    const data = await api('POST', '/api/crm/manual-availability/rooms', { roomName, totalUnits });
    if (!data.success) throw new Error(data.message || 'Failed to save room type');
    manualAvailability = data.data || manualAvailability;
    manualSelectedRoom = roomName;
    nameEl.value = '';
    unitsEl.value = '';
    refreshRoomBadge();
    populateAvailabilityRoomSelect();
    renderAvailabilityTable();
    toast('Room type saved', 'success');
  } catch (e) {
    toast('Failed to save room type', 'error');
  }
}

async function applyAvailabilityRange() {
  const roomName = (document.getElementById('availabilityRoomSelect') || {}).value || '';
  const startDate = (document.getElementById('availabilityStartDate') || {}).value || '';
  const endDate = (document.getElementById('availabilityEndDate') || {}).value || '';
  const unitsRaw = (document.getElementById('availabilityUnitsInput') || {}).value;
  const closed = !!((document.getElementById('availabilityClosedInput') || {}).checked);

  if (!roomName || !startDate || !endDate) {
    toast('Room and date range are required', 'error');
    return;
  }

  const payload = { roomName, startDate, endDate, closed };
  if (unitsRaw !== '' && unitsRaw !== null && unitsRaw !== undefined) {
    payload.availableUnits = Math.max(0, parseInt(unitsRaw, 10) || 0);
  }

  try {
    const data = await api('POST', '/api/crm/manual-availability/range', payload);
    if (!data.success) throw new Error(data.message || 'Failed to apply override');
    manualAvailability = data.data || manualAvailability;
    renderAvailabilityTable();
    toast(`Override applied (${data.affectedDays || 0} days)`, 'success');
  } catch (e) {
    toast('Failed to apply override', 'error');
  }
}

async function clearAvailabilityRange() {
  const roomName = (document.getElementById('availabilityRoomSelect') || {}).value || '';
  const startDate = (document.getElementById('availabilityStartDate') || {}).value || '';
  const endDate = (document.getElementById('availabilityEndDate') || {}).value || '';
  if (!roomName || !startDate || !endDate) {
    toast('Room and date range are required', 'error');
    return;
  }

  try {
    const data = await api('POST', '/api/crm/manual-availability/range', { roomName, startDate, endDate, clear: true });
    if (!data.success) throw new Error(data.message || 'Failed to clear override');
    manualAvailability = data.data || manualAvailability;
    renderAvailabilityTable();
    toast(`Range cleared (${data.affectedDays || 0} days)`, 'success');
  } catch (e) {
    toast('Failed to clear range', 'error');
  }
}

// ── ACTIONS ────────────────────────────────────────────
async function markConfirmed(id) {
  try {
    await api('POST', `/api/crm/bookings/${id}/confirm`);
    bookings = bookings.map(b => b.id === id ? { ...b, callStatus: 'called' } : b);
    
    // Update counts
    const needsCalls = bookings.filter(b => b.callStatus === 'not-called');
    const called = bookings.filter(b => b.callStatus === 'called');
    document.getElementById('countNeedsCalled').textContent = needsCalls.length;
    document.getElementById('countCalled').textContent = called.length;
    document.getElementById('statCount').textContent = needsCalls.length;
    
    applyFilter();
    toast('Marked as called', 'success');
  } catch(e) { toast('Failed to update', 'error'); }
}

// ── NOTES MODAL ────────────────────────────────────────
let currentNoteBookingId = null;

function addNote(id, existingNote = '') {
  currentNoteBookingId = id;
  const modal = document.getElementById('notesModal');
  const input = document.getElementById('noteInput');
  input.value = existingNote;
  modal.style.display = 'flex';
  setTimeout(() => input.focus(), 100);
}

function closeNotesModal(event) {
  if (event && event.target !== event.currentTarget) return;
  const modal = document.getElementById('notesModal');
  modal.style.display = 'none';
  currentNoteBookingId = null;
  document.getElementById('noteInput').value = '';
}

async function saveNote() {
  const note = document.getElementById('noteInput').value.trim();
  if (!note) {
    toast('Please enter a note', 'error');
    return;
  }
  
  try {
    await api('POST', `/api/crm/bookings/${currentNoteBookingId}/note`, { note });
    toast('Note saved', 'success');
    closeNotesModal();
    loadBookings();
  } catch(e) {
    toast('Failed to save note', 'error');
  }
}

// Close modal on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('notesModal');
    if (modal.style.display === 'flex') {
      closeNotesModal();
    }
  }
});

// ── ADD DUMMY BOOKINGS ─────────────────────────────────
async function addDummyBookings() {
  if (!confirm('Add 4 test bookings (1 with payment declined)?')) return;
  try {
    const data = await api('POST', '/api/crm/add-dummy-bookings');
    if (data.success) {
      toast(`Added ${data.count} test bookings`, 'success');
      loadBookings();
    } else {
      toast('Failed to add test bookings', 'error');
    }
  } catch(e) {
    toast('Error adding test bookings', 'error');
  }
}

// ── NOTIFICATIONS ──────────────────────────────────────
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const output = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) output[i] = rawData.charCodeAt(i);
  return output;
}

async function enableNotifications() {
  if (!token) { toast('Sign in first', 'error'); return; }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { toast('Notifications blocked', 'error'); return; }
    const keyRes = await fetch('/api/push/vapid-public');
    const keyData = await keyRes.json().catch(() => ({}));
    if (!keyData.publicKey) { toast('Push not configured', 'error'); return; }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(keyData.publicKey)
    });
    const bufToB64 = buf => btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
    await api('POST', '/api/push/subscribe', {
      endpoint: sub.endpoint,
      p256dh: sub.getKey('p256dh') ? bufToB64(sub.getKey('p256dh')) : '',
      auth: sub.getKey('auth') ? bufToB64(sub.getKey('auth')) : '',
      source: 'simple-crm'
    });
    toast('Notifications enabled', 'success');
    document.getElementById('btnNotify').textContent = '🔔 On';
  } catch(e) { toast('Failed: ' + (e.message || e), 'error'); }
}

// ── HELPERS ────────────────────────────────────────────
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function toast(msg, type = '') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = `${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'} ${msg}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

// ── INIT ───────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
document.getElementById('pinInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

if (token) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  ensureAvailabilityUi();
  loadManualAvailability();
  loadBookings();
}

setInterval(loadBookings, 30000);
