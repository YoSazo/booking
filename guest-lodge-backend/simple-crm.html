<!DOCTYPE html>
<!-- SOURCE OF TRUTH for Front Desk. Run `npm run build:frontdesk` after edits. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Marketel · Front Desk</title>
  <link rel="manifest" href="/manifest-simple-crm.json">
  <meta name="theme-color" content="#EEF2EF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Front Desk">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    :root {
      --green: #2E7D5B; --green-light: #4CAF7D; --green-pale: #E8F5EE;
      --green-mint: #C8EDD9; --bg: #EEF2EF; --white: #FFFFFF;
      --text: #1A2B22; --text-muted: #6B7D72; --border: #D8E4DC;
      --red: #E05252; --amber: #F59E0B;
      --shadow: 0 2px 12px rgba(46,125,91,0.10);
      --shadow-lg: 0 8px 32px rgba(46,125,91,0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    /* Prevent iOS zoom on input focus (exclude WYSIWYG preview inputs) */
    input, textarea, select { font-size: 16px !important; }
    #edit-hotel-name { font-size: 24px !important; }
    #edit-hotel-subtitle { font-size: 14px !important; }
    #edit-hotel-address { font-size: 13px !important; }
    #edit-hotel-phone { font-size: 13px !important; }
    #edit-hotel-phone::placeholder { color: #999 !important; opacity: 1; }
    #edit-hotel-name::placeholder, #edit-hotel-subtitle::placeholder, #edit-hotel-address::placeholder { color: #999 !important; opacity: 1; }
    #edit-hotel-policy { font-size: 11px !important; }

    /* ── LOGIN ── */
    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a2b22 0%, #2E7D5B 100%);
    }
    .login-card {
      background: white; border-radius: 20px; padding: 40px 36px; width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .status-card {
      width: min(420px, calc(100vw - 32px));
      padding: 40px 32px;
    }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .login-logo-icon { height: 48px; width: auto; }
    .login-logo-text { height: 28px; width: auto; }
    .login-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .status-title {
      font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 12px;
    }
    .status-message {
      font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 0;
    }
    .status-spinner-wrap {
      display: flex; align-items: center; justify-content: center; margin: 18px 0 8px;
    }
    .status-spinner {
      width: 28px; height: 28px; border-width: 3px;
    }
    .status-debug {
      margin-top: 18px; padding: 12px 14px; border-radius: 12px; background: var(--bg);
      color: var(--text-muted); font-size: 12px; line-height: 1.5; text-align: left;
      word-break: break-word; display: none;
    }
    .status-actions { margin-top: 18px; }
    .login-input {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: 12px; font-family: inherit; font-size: 18px; text-align: center;
      letter-spacing: 4px; outline: none; margin-bottom: 12px; color: var(--text);
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--green); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--green); color: white;
      border: none; border-radius: 12px; font-family: inherit; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .login-btn:hover { background: #245f46; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 20px; }

    /* ── HEADER ── */
    .header {
      background: var(--white); border-bottom: 1.5px solid var(--border);
      padding: 8px 16px; min-height: 58px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 8px rgba(46,125,91,0.07);
      gap: 8px; flex-wrap: wrap;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; color: var(--text); flex-shrink: 0; }
    .header-logo-icon { height: 32px; width: auto; }
    .header-logo-text { height: 20px; width: auto; }
    .header-logo-suffix { margin-left: 2px; color: var(--text-muted); font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stat-pill {
      background: var(--green-pale); border-radius: 20px; padding: 4px 12px;
      font-size: 12px; font-weight: 600; color: var(--green); display: flex; align-items: center; gap: 4px;
    }
    .refresh-btn {
      background: var(--green-pale); border: 1.5px solid var(--border); border-radius: 8px;
      padding: 5px 12px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--green); cursor: pointer; transition: all 0.15s;
    }
    .refresh-btn:hover { background: var(--green); color: white; border-color: var(--green); }
    .refresh-btn.notify-on {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .refresh-btn.notify-off {
      background: #f2f4f3;
      border-color: var(--border);
      color: var(--text-muted);
    }
    .refresh-btn.notify-off:hover {
      background: var(--green-pale);
      border-color: var(--green);
      color: var(--green);
    }

    /* ── LAYOUT ── */
    .container { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

    /* TABS */
    .tabs-container {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 5px;
      position: relative;
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    .tabs-container::-webkit-scrollbar { display: none; }

    .tabs-slider {
      position: absolute;
      top: 5px;
      left: 5px;
      height: calc(100% - 10px);
      background: var(--white);
      border-radius: 11px;
      box-shadow: 0 2px 8px rgba(46,125,91,0.13), 0 1px 3px rgba(0,0,0,0.07);
      transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 0;
      will-change: transform, width;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: none;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.22s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
      border-radius: 11px;
      white-space: nowrap;
      user-select: none;
    }

    .tab:hover {
      color: var(--text);
      background: none;
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: transparent;
    }

    .tab-badge {
      background: var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      transition: background 0.22s ease, color 0.22s ease, transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab.active .tab-badge {
      background: var(--green-pale);
      color: var(--green);
      transform: scale(1.08);
    }

    /* Tab ripple on click */
    .tab::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 11px;
      background: var(--green);
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.15s, transform 0.15s;
      z-index: -1;
      pointer-events: none;
    }

    .tab:active::after {
      opacity: 0.07;
      transform: scale(1);
    }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .count-badge {
      background: var(--green); color: white;
      padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }

    /* ── BOOKING CARD ── */
    .booking-card {
      background: var(--white); border: 2px solid var(--border);
      border-radius: 20px; overflow: hidden;
      box-shadow: var(--shadow); margin-bottom: 14px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .booking-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .card-accent { height: 5px; background: var(--green); }
    .card-accent.declined { background: var(--amber); }

    .card-inner { padding: 20px 22px; }

    /* TOP ROW */
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 17px; }
    .guest-info { display: flex; flex-direction: column; gap: 4px; }
    .guest-name { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .guest-time { font-size: 15px; color: var(--text-muted); font-weight: 500; }

    .card-amount { 
      font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 700;
      color: var(--green); text-align: right; flex-shrink: 0; margin-left: 17px;
    }

    /* META ROW */
    .card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 17px; align-items: center; }
    .meta-chip {
      display: flex; align-items: center; gap: 4px; background: var(--bg);
      border-radius: 10px; padding: 4px 11px; font-size: 15px; color: var(--text-muted); font-weight: 500;
    }
    .declined-chip {
      background: #FEF3C7; color: #92400E; border-radius: 10px;
      padding: 4px 11px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .pay-chip {
      background: #DBEAFE; color: #1E40AF; border-radius: 10px;
      padding: 4px 11px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }

    /* DATES */
    .card-dates {
      display: flex; gap: 0; margin-bottom: 17px;
      background: var(--bg); border-radius: 14px; overflow: hidden;
      border: 2px solid var(--border);
    }
    .date-block {
      flex: 1; padding: 11px 17px; display: flex; flex-direction: column; gap: 3px;
    }
    .date-block + .date-block { border-left: 2px solid var(--border); }
    .date-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: var(--text-muted); }
    .date-value { font-size: 18px; font-weight: 600; color: var(--text); }

    /* CONTACT ROW */
    .card-contact { display: flex; align-items: center; justify-content: space-between; margin-bottom: 17px; gap: 14px; }
    .contact-details { display: flex; flex-direction: column; gap: 3px; }
    .contact-phone { font-size: 25px; font-weight: 700; color: var(--green); font-family: 'DM Mono', monospace; }
    .contact-email { font-size: 15px; color: var(--text-muted); }

    .phone-call-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--green); color: white;
      border: none; border-radius: 14px; padding: 13px 22px;
      font-family: inherit; font-size: 18px; font-weight: 700;
      cursor: pointer; text-decoration: none; transition: all 0.15s;
      flex-shrink: 0;
    }
    .phone-call-btn:hover { background: #245f46; transform: scale(1.03); }

    /* FOOTER */
    .card-footer { display: flex; gap: 11px; padding-top: 17px; border-top: 1.4px solid var(--border); }
    .btn {
      flex: 1; padding: 13px 17px; border-radius: 14px; font-family: inherit;
      font-size: 17px; font-weight: 600; cursor: pointer; border: 2px solid transparent;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-confirm { background: var(--green); color: white; }
    .btn-confirm:hover { background: #245f46; }
    .btn-note { background: var(--white); color: var(--text); border-color: var(--border); }
    .btn-note:hover { border-color: var(--green); color: var(--green); background: var(--green-pale); }
    .btn-note-quiet {
      color: var(--text-muted);
      opacity: 0.8;
    }
    .btn-note-quiet:hover {
      opacity: 1;
      border-color: var(--border);
      color: var(--text);
      background: var(--bg);
    }

    /* ── STATES ── */
    .empty-state {
      text-align: center; padding: 64px 20px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-sub { font-size: 13px; color: var(--text-muted); }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; font-size: 14px; color: var(--text-muted); gap: 10px;
    }
    .availability-day-saving-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.94);
      border-radius: inherit;
    }
    .availability-day-saving-overlay[hidden] { display: none; }
    .availability-day-saving-inner {
      height: auto;
      flex-direction: column;
      gap: 12px;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    /* Notes Section */
    .card-notes {
      margin-top: 12px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .notes-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .notes-count {
      font-size: 11px;
      background: #e5e7eb;
      color: #6b7280;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .notes-content {
      font-size: 13px;
      color: #374151;
      line-height: 1.5;
      white-space: pre-wrap;
      max-height: 100px;
      overflow-y: auto;
    }
    .notes-empty {
      font-size: 12px;
      color: #9ca3af;
      font-style: italic;
    }

    /* Notes Modal */
    .notes-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .notes-modal {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: modalSlideUp 0.2s ease-out;
    }
    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .notes-modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .notes-modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }
    .notes-modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .notes-modal-close:hover {
      background: #e5e7eb;
      color: #111827;
    }
    .notes-modal-body {
      padding: 24px;
    }
    .notes-input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    .notes-input {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: #111827;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    .notes-input:focus {
      border-color: #2E7D5B;
    }
    .notes-modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .notes-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      font-family: inherit;
    }
    .notes-btn-cancel {
      background: #f3f4f6;
      color: #6b7280;
    }
    .notes-btn-cancel:hover {
      background: #e5e7eb;
    }
    .notes-btn-save {
      background: #2E7D5B;
      color: white;
    }
    .notes-btn-save:hover {
      background: #245f46;
    }

    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 7px; }
    .toast {
      background: var(--text); color: white; border-radius: 11px; padding: 11px 16px;
      font-size: 12px; font-weight: 600; box-shadow: var(--shadow-lg);
      display: flex; align-items: center; gap: 7px;
      animation: slideInR 0.2s ease, fadeOut 0.3s ease 2.7s forwards;
    }
    @keyframes slideInR { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeOut { to{opacity:0;transform:translateX(20px)} }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    .availability-view { margin-top: 8px; display: flex; flex-direction: column; gap: 12px; }
    .rooms-shell { display: flex; flex-direction: column; gap: 12px; }
    .room-pill-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .room-pill-wrap { display: inline-flex; align-items: center; gap: 6px; }
    .room-pill {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .room-pill:hover { border-color: var(--green); color: var(--green); }
    .room-pill.active { background: var(--green); border-color: var(--green); color: #fff; }
    .room-pill-action {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .room-pill-action:hover { border-color: var(--green); color: var(--green); }
    .room-pill-action.danger:hover { border-color: var(--red); color: var(--red); }
    .room-pill-add {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .room-pill-add:hover { border-color: var(--green); color: var(--green); }
    .room-mobile-actions {
      display: none;
      gap: 8px;
      margin-top: 12px;
    }
    .room-mobile-action-btn {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: var(--white);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .room-mobile-action-btn:hover { border-color: var(--green); color: var(--green); }
    .room-mobile-action-btn.danger:hover { border-color: var(--red); color: var(--red); }

    .availability-card {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .availability-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .availability-help { font-size: 12px; color: var(--text-muted); }
    .availability-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 30px 10px;
      font-size: 14px;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .cal-month-label { font-size: 15px; font-weight: 700; color: var(--text); }
    .cal-nav { display: flex; gap: 6px; }
    .cal-nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      transition: all .15s;
    }
    .cal-nav-btn:hover { border-color: var(--green); color: var(--green); }

let lucideLoadPromise = null;
function ensureLucideLoaded() {
  if (typeof lucide !== 'undefined') return Promise.resolve();

  lucideLoadPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js';
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('lucide load failed'));
    document.head.appendChild(s);
  });
  return lucideLoadPromise;
}

async function optimizeRoomPhotoForUpload(file) {
  if (!file || !file.type.startsWith('image/')) return file;
  if (file.type === 'image/webp' && file.size < 400000) return file;
  try {
    const bitmap = await createImageBitmap(file);
    const maxW = 1600;
    const maxH = 1200;
    let w = bitmap.width;
    let h = bitmap.height;
    const scale = Math.min(1, maxW / w, maxH / h);
    w = Math.round(w * scale);
    h = Math.round(h * scale);
    const canvas = document.createElement('canvas');
    canvas.width = w;
    canvas.height = h;
    canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
    bitmap.close();
    const blob = await new Promise((resolve, reject) => {
      canvas.toBlob((b) => (b ? resolve(b) : reject(new Error('encode failed'))), 'image/webp', 0.82);
    });
    const base = (file.name || 'room-photo').replace(/\.[^.]+$/, '') || 'room-photo';
    return new File([blob], base + '.webp', { type: 'image/webp' });
  } catch (_) {
    return file;
  }
}

function isIosDevice() {
  const ua = navigator.userAgent || '';
  return /iphone|ipad|ipod/i.test(ua) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}
function isStandaloneApp() {
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
    window.navigator.standalone === true;
}
function pushSupported() {
  return ('serviceWorker' in navigator) && ('PushManager' in window) && ('Notification' in window);
}

// Point the page's manifest at this hotel's dynamic Front Desk manifest so the
// installed app is branded as their hotel (name + icon). Also refresh the
// iOS-specific tags (apple-touch-icon + title) because iOS reads THOSE from the
// DOM at "Add to Home Screen" time and largely ignores manifest icons — and it
// only accepts PNG, never SVG, so a custom uploaded icon (photo/PNG) or our
// PNG fallback is what makes the home-screen icon render instead of blank.
function updateFrontdeskManifestLink() {
  if (!activeHotelId) return;
  const link = document.querySelector('link[rel="manifest"]');
  if (link) {
    link.href = '/api/hotel/' + encodeURIComponent(activeHotelId) + '/frontdesk-manifest.webmanifest';
  }
  try {
    // The Front Desk ALWAYS uses the Marketel logo — it's the owner's back-office
    // app and must look distinct from the hotel's guest booking engine (which uses
    // the custom uploaded icon). So we never swap in activeHotelAppIcon here.
    let appleLink = document.querySelector('link[rel="apple-touch-icon"]');
    if (!appleLink) {
      appleLink = document.createElement('link');
      appleLink.rel = 'apple-touch-icon';
      document.head.appendChild(appleLink);
    }
    appleLink.href = '/apple-touch-icon.png';
    // Home-screen label should be short — just the hotel name (iOS shows the
    // app full-screen so "Front Desk" context is obvious once it's open).
    const titleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
    if (titleMeta) titleMeta.content = activeHotelName || 'Front Desk';
  } catch (_) {}
}
try { token = localStorage.getItem('crmToken') || ''; } catch(e) {}

// Auto-login from ?pin= URL param (coming from setup wizard)
try {
  const _urlPin = new URLSearchParams(window.location.search).get('pin');
  if (_urlPin) {
    token = _urlPin;
    localStorage.setItem('crmToken', token);
    // Clean URL but keep hotelId if present
    const _cleanUrl = new URL(window.location);
    _cleanUrl.searchParams.delete('pin');
    window.history.replaceState({}, '', _cleanUrl);
  }
} catch(e) {}

// Auto-login from ?magic= token (magic link email)
let _magicLoginPending = false;
try {
  const _magicToken = new URLSearchParams(window.location.search).get('magic');
  if (_magicToken) {
    _magicLoginPending = true;
    fetch('/api/auth/verify-magic?token=' + encodeURIComponent(_magicToken))
      .then(r => r.json())
      .then(data => {
        if (data.success && data.pin) {
          token = data.pin;
          localStorage.setItem('crmToken', token);
          const _cleanUrl = new URL(window.location);
          _cleanUrl.searchParams.delete('magic');
          window.history.replaceState({}, '', _cleanUrl);
          // Reload to trigger normal boot with the new token
          window.location.reload();
        } else {
          _magicLoginPending = false;
          alert('Login link expired or invalid. Please request a new one.');
          const _cleanUrl = new URL(window.location);
          _cleanUrl.searchParams.delete('magic');
          window.history.replaceState({}, '', _cleanUrl);
        }
      })
      .catch(() => { _magicLoginPending = false; });
  }
} catch(e) {}

function getContextParam(name) {
  try {
    const params = new URLSearchParams(window.location.search || '');
    return String(params.get(name) || '').trim();
  } catch (e) {
    return '';
  }
}

function getDetectedHostname() {
  return (window.location && window.location.hostname) ? String(window.location.hostname).toLowerCase() : '';

function setNotificationButtonState(enabled) {
  const btn = document.getElementById('btnNotify');
  if (!btn) return;
  btn.classList.toggle('notify-on', !!enabled);
  btn.classList.toggle('notify-off', !enabled);
  btn.setAttribute('aria-pressed', enabled ? 'true' : 'false');
  btn.textContent = enabled ? 'Notifications: On' : 'Notifications: Off';
}

async function syncNotificationButtonState() {
  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    setNotificationButtonState(false);
    return;
  }
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    const enabled = Notification.permission === 'granted' && !!sub;
    setNotificationButtonState(enabled);
  } catch (e) {
    setNotificationButtonState(false);
  }
}

function resolveLegacyCrmHotelId() {
  const overrideHotelId = getContextParam('hotelId');
  if (overrideHotelId) return overrideHotelId;

  const host = getDetectedHostname();
  if (host && CRM_HOTEL_BY_HOST[host]) return CRM_HOTEL_BY_HOST[host];
  if (!host || host === 'localhost' || host === '127.0.0.1' || host.endsWith('.onrender.com') || host.endsWith('.vercel.app')) {
    return 'guest-lodge-minot';
  }
  return '';
}

function applyLegacyHotelContext(hotelId, reason = '') {
  const cleanHotelId = String(hotelId || '').trim();
  if (!cleanHotelId) return false;
  activeHotelId = cleanHotelId;
  activeHotelName = CRM_HOTEL_LABELS[cleanHotelId] || cleanHotelId;
  activeHotelDomain = getDetectedHostname();
  activeHotelContext = {
    hotelId: cleanHotelId,
    domain: activeHotelDomain || '',
    config: {
      id: cleanHotelId,
      name: activeHotelName,
      source: 'legacy-fallback',
    },
  };
  updateHotelChrome();
  if (reason && window.console && typeof window.console.warn === 'function') {
    window.console.warn('Falling back to legacy CRM hotel resolution.', { hotelId: cleanHotelId, reason });
  }
  return true;
}

function buildHotelContextUrl() {
  const url = new URL('/api/hotel-context', window.location.origin);
  const overrideHotelId = getContextParam('hotelId');
  const overrideDomain = getContextParam('domain');
  if (overrideHotelId) url.searchParams.set('hotelId', overrideHotelId);
  // Always pass the current hostname so the backend can resolve the hotel
  // even if x-forwarded-host is not set by the proxy
  const domain = overrideDomain || getDetectedHostname();
  if (domain) url.searchParams.set('domain', domain);
  return url.toString();
}

  const message = (error && error.message) ? String(error.message) : 'Could not load hotel context.';
  const debug = formatContextDebugLines([
    `Detected host: ${host}`,
    domain && domain !== host ? `Resolved domain: ${domain}` : '',
    activeHotelId ? `Hotel ID: ${activeHotelId}` : '',

  if (!status) {

      title: 'Network error',
      message: 'Could not reach the server to resolve this hotel. Check the network connection and try again.',
      debug,
      showRetry: true,
    });
    return;

  showBootState({
    title: status === 404 ? 'Hotel not linked'
      : status === 403 ? 'Hotel inactive'
      : 'Hotel context error',
    message,
    debug,
    showRetry: true,
  });
}

async function loadHotelContext() {
  const res = await fetch(buildHotelContextUrl(), { headers: { 'Accept': 'application/json' } });
  const json = await res.json().catch(() => ({}));
  if (!res.ok || !json.success) {
    const err = new Error(json.message || `Failed to load hotel context (${res.status})`);
    err.status = res.status;
    err.domain = (json && json.domain) || getDetectedHostname();
    throw err;
  }

  const data = json.data || {};
  const config = data.config || {};
  if (!data.hotelId) {
    const err = new Error('Hotel context response is missing hotelId.');
    err.status = 500;
    throw err;
  }

  activeHotelId = String(data.hotelId || '').trim();
  activeHotelName = String(config.name || data.hotelId || '').trim();
  activeHotelAppIcon = String(config.appIconUrl || '').trim();
  activeHotelDomain = String(data.domain || getDetectedHostname() || '').trim();
  activeHotelContext = data;
  updateHotelChrome();
  return data;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toIsoDate(dateLike) {
  if (!dateLike) return '';
  if (typeof dateLike === 'string' && dateLike.length >= 10) {
    if (dateLike.includes('T')) return dateLike.split('T')[0];
    return dateLike.slice(0, 10);
  }
  const d = new Date(dateLike);
  if (Number.isNaN(d.getTime())) return '';
  // Ensure we use the local date values to prevent UTC-shifting the day
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function addDaysIso(days) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function enumerateDates(startIso, endIso, maxDays = 180) {
  if (!startIso || !endIso || endIso < startIso) return [];
  const out = [];
  let cursor = new Date(`${startIso}T00:00:00.000Z`);
  const end = new Date(`${endIso}T00:00:00.000Z`);
  while (cursor <= end && out.length < maxDays) {
    out.push(cursor.toISOString().slice(0, 10));
    cursor = new Date(cursor.getTime() + 86400000);
  }
  return out;
}

function formatCurrencyCompact(value) {
  const amount = Number(value || 0);
  const abs = Math.abs(amount);
  if (abs >= 1000) {
    const compact = (amount / 1000).toFixed(abs >= 100000 ? 0 : 1).replace(/\.0$/, '');
    return `$${compact}k`;
  }
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    maximumFractionDigits: 0,
  }).format(amount);
}

  syncRevenueUi();

  const contentEl = document.getElementById('revenueContent');

  periodButtons.forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.period === revenuePeriod);
  });

        statusEl.innerHTML = '<div class="loading"><div class="logo-sprite-bounce"></div> Loading revenue...</div>';

async function loadRevenueData(force = false) {
  if (!revenueEnabled) return;
  revenuePeriod = normalizeRevenuePeriod(revenuePeriod);

  const cached = revenueCache[revenuePeriod];
  if (cached && !force) {
    revenueError = '';
    renderRevenueView();
    return;
  }

  revenueLoading = true;
  revenueError = '';
  renderRevenueView();

  try {
    const data = await api('GET', `/api/crm/revenue?period=${encodeURIComponent(revenuePeriod)}`);
    if (!data.success) throw new Error(data.message || 'Failed to load revenue');
    revenueCache[revenuePeriod] = data.data || {};
  } catch (e) {
    revenueError = e.message || 'Failed to load revenue';
  } finally {
    revenueLoading = false;
    renderRevenueView();
  }
}

async function verifyCrmToken(pin) {
  if (!activeHotelId) throw new Error('Hotel context is not ready yet.');
  const res = await fetch(`/api/crm/verify?hotelId=${encodeURIComponent(activeHotelId)}`, {
    headers: { 'x-crm-token': pin }
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok || !json.success) {
    throw new Error(json.message || (res.status === 401 ? 'Wrong PIN' : 'Could not verify access'));
  }
  return json;
}

async function startCrmApp(verification) {
  currentHotelPms = String((verification && verification.pms) || '').toLowerCase();
  revenueEnabled = !!(verification && verification.isManualPms);
  revenueCache = {};
  revenueLoading = false;
  revenueError = '';
  ensureAvailabilityUi();
  syncNotificationButtonState();
  syncRevenueUi();
  document.getElementById('bootScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Track subscription status globally for banner visibility
  hotelSubscribed = !!(verification && verification.subscribed);

  // Show/hide Go Live banner based on subscription status
  const banner = document.getElementById('goLiveBanner');
  if (banner) {
    // Only show on bookings tab, after tour is done, when not subscribed
    const tourDone = localStorage.getItem('settingsTourDone');
    const showBanner = !hotelSubscribed && tourDone && currentFilter === 'bookings';
    banner.style.display = showBanner ? 'block' : 'none';
    if (showBanner) {
      banner.innerHTML = `
        <div style="background:linear-gradient(135deg,#1a2b22 0%,#2E7D5B 100%);border-radius:16px;padding:20px;margin-bottom:14px;text-align:center;">
          <div style="font-size:14px;font-weight:700;color:white;margin-bottom:6px;">🔒 Your page is inactive</div>
          <p style="font-size:12px;color:rgba(255,255,255,0.8);margin:0 0 14px;line-height:1.5;">Guests can see your booking page but can't complete a reservation yet.</p>
          <button onclick="goLive()" style="width:100%;max-width:260px;padding:12px;border-radius:10px;border:none;background:white;color:#1a5c3f;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;">Activate — $99/mo →</button>
          <div style="font-size:10px;color:rgba(255,255,255,0.6);margin-top:8px;">Cancel anytime · No contracts</div>
        </div>`;
    }
  }

  const realignActiveTab = () => {
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) moveSlider(activeTab);
  };
  requestAnimationFrame(realignActiveTab);
  setTimeout(realignActiveTab, 120);

  initMobileBottomNav();
  updateMobileRevenueNavVisibility();
  syncMobileNavActive(currentFilter);
  ensureLucideLoaded().then(() => {
    refreshMobileBottomNavIcons();
    requestAnimationFrame(refreshMobileBottomNavIcons);
  }).catch(() => {});

  // If coming from setup (has welcome param) or returning from preview (has tab param), open Settings
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('welcome') || urlParams.get('tab') === 'settings') {
    currentFilter = 'settings';
    const cleanUrl = new URL(window.location);
    cleanUrl.searchParams.delete('welcome');
    cleanUrl.searchParams.delete('tab');
    window.history.replaceState({}, '', cleanUrl);
  } else if (urlParams.get('tab') === 'bookings') {
    // Deep link from a guest-message push notification.
    currentFilter = 'bookings';
    const cleanUrl = new URL(window.location);
    cleanUrl.searchParams.delete('tab');
    window.history.replaceState({}, '', cleanUrl);
  }

  await Promise.allSettled([
    loadManualAvailability(),
    loadBookings({ deferMessages: true }),
  ]);

  refreshMobileBottomNavIcons();

  // Sync tab chrome if we deep-linked straight to Bookings (e.g. from a push).
  if (currentFilter === 'bookings') {
    setFilter('bookings', document.querySelector('.tab[data-nav-filter="bookings"]'));
  }

  // If redirected here with ?action=go-live, trigger Stripe checkout immediately
  if (urlParams.get('action') === 'go-live') {
    window.history.replaceState({}, '', window.location.pathname);
    goLive();
  }

  // Just came back from a successful payment — reassure them about what happens next
  if (urlParams.get('activated') === '1') {
    const cleanUrl = new URL(window.location);
    cleanUrl.searchParams.delete('activated');
    window.history.replaceState({}, '', cleanUrl);
    hotelSubscribed = true;
    const _goLiveBanner = document.getElementById('goLiveBanner');
    if (_goLiveBanner) { _goLiveBanner.style.display = 'none'; _goLiveBanner.innerHTML = ''; }
    showActivatedModal();
  }

  // Show welcome modal on first visit (skip questionnaire, go straight to tour)
  if (!localStorage.getItem('onboardingDone') && urlParams.has('welcome')) {
    localStorage.setItem('onboardingDone', '1');
    showWelcomeModal();
  } else {
    // Returning user — mark onboarding and tour as done so they never fire
    localStorage.setItem('onboardingDone', '1');
    localStorage.setItem('settingsTourDone', '1');
  }

  // First time opening the INSTALLED app → offer to turn on booking alerts.
  maybePromptInstalledNotifications();
}

async function doLogin() {
  const pin = document.getElementById('pinInput').value.trim();
  const err = document.getElementById('loginError');
  err.textContent = '';
  if (!activeHotelId) { err.textContent = 'Hotel context is still loading'; return; }
  if (!pin) { err.textContent = 'Please enter PIN'; return; }
  
  // Verify PIN with server first
  try {
    const verification = await verifyCrmToken(pin);
    token = pin;
    try { localStorage.setItem('crmToken', token); } catch(e) {}
    await startCrmApp(verification);
  } catch (e) {
    err.textContent = e.message === 'Wrong PIN' ? 'Wrong PIN' : (e.message || 'Connection failed');
  }
}

function showMagicLinkForm(e) {
  e.preventDefault();
  document.getElementById('magicLinkForm').style.display = 'block';
  e.target.style.display = 'none';
}

async function sendMagicLink() {
  const email = document.getElementById('magicLinkEmail').value.trim();
  const msg = document.getElementById('magicLinkMsg');
  if (!email) { msg.textContent = 'Please enter your email'; return; }
  msg.textContent = 'Sending…';
  try {
    const res = await fetch('/api/auth/magic-link', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      msg.textContent = data.message || 'No account found with that email.';
      msg.style.color = '#E05252';
      return;
    }
  } catch (e) {
    msg.textContent = 'Something went wrong. Try again.';
    msg.style.color = '#E05252';
    return;
  }
  msg.textContent = "Check your email — we sent you a login link.";
  msg.style.color = '#2E7D5B';
}

// ── API ────────────────────────────────────────────────
async function api(method, path, body) {
  if (!activeHotelId) throw new Error('Hotel context is not loaded.');
  const url = new URL(path, window.location.origin);
  if (!url.searchParams.get('hotelId')) {
    url.searchParams.set('hotelId', activeHotelId);
  }

  const opts = { method, headers: { 'Content-Type': 'application/json', 'x-crm-token': token } };
  const normalizedMethod = String(method || 'GET').toUpperCase();
  if (body || (normalizedMethod !== 'GET' && normalizedMethod !== 'HEAD')) {
    const payload = (body && typeof body === 'object' && !Array.isArray(body)) ? { ...body } : (body || {});
    if (payload.hotelId === undefined) payload.hotelId = activeHotelId;
    opts.body = JSON.stringify(payload);
  }
  const res = await fetch(url.pathname + url.search, opts);
  if (res.status === 401) { showLogin(); throw new Error('Unauthorized'); }
  return res.json();
}

function showLogin() {
  document.getElementById('bootScreen').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  token = '';
  currentHotelPms = '';
  revenueEnabled = false;
  revenueCache = {};
  revenueLoading = false;
  revenueError = '';
  syncRevenueUi();
  try { localStorage.removeItem('crmToken'); } catch(e) {}
}

async function bootCrmApp() {
  if (bootInFlight) return;
  bootInFlight = true;
  activeHotelId = '';
  activeHotelName = '';
  activeHotelDomain = '';
  activeHotelContext = null;
  updateHotelChrome();
  showBootState({
    title: 'Connecting to hotel...',
    message: 'Checking this domain and loading front desk context.',
    debug: formatContextDebugLines([`Detected host: ${getDetectedHostname() || 'unknown'}`]),
    showRetry: false,
  });

  try {
    await loadHotelContext();
    if (token) {
      try {
        const verification = await verifyCrmToken(token);
        await startCrmApp(verification);
        return;
      } catch (e) {
        showLogin();
        return;
      }
    }
    showLogin();
  } catch (e) {
    const legacyHotelId = resolveLegacyCrmHotelId();
    if (legacyHotelId && applyLegacyHotelContext(legacyHotelId, e && e.message ? e.message : 'hotel-context-load-failed')) {
      if (token) {
        try {
          const verification = await verifyCrmToken(token);
          await startCrmApp(verification);
          return;
        } catch (verifyError) {
          showLogin();
          return;
        }
      }
      showLogin();
      return;
    }
    showHotelContextError(e);
  } finally {
    bootInFlight = false;
  }
}

// ── LOAD ───────────────────────────────────────────────
async function loadBookings(opts = {}) {
  try {
    const data = await api('GET', '/api/crm/bookings');
    if (!data.success) throw new Error(data.message);
    bookings = data.data || [];
    if (currentFilter !== 'revenue') revenueCache = {};
    
    // Update counts
    const needsCalls = bookings.filter(b => b.callStatus === 'not-called');
    document.getElementById('countNeedsCalled').textContent = bookings.length;
    document.getElementById('statCount').textContent = needsCalls.length;
    
    // Render based on current filter
    applyFilter();
    if (opts.deferMessages) scheduleDeferredMessagesLoad();
    else loadMessages();
  } catch(e) {
    if (e.message === 'Unauthorized') return;
    document.getElementById('bookingsList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
      <div class="empty-text">Could not load bookings</div>
      <div class="empty-sub">${esc(e.message)}</div>
      </div>`;
  }
}

// ── GUEST MESSAGES ─────────────────────────────────────
async function loadMessageBadges() {
  try {
    const data = await api('GET', '/api/crm/messages/unread-count');
    if (!data.success) return;
    messageUnreadCount = Number(data.unread) || 0;
    updateMessageBadges();
  } catch (e) { /* non-fatal */ }
}

async function loadMessages() {
  try {
    const data = await api('GET', '/api/crm/messages');
    if (!data.success) return;
    guestMessages = data.messages || [];
    messageUnreadCount = 0;
    updateMessageBadges();
    if (currentFilter === 'bookings') renderMessages();
  } catch (e) { /* non-fatal */ }
}

function updateMessageBadges() {
  const unread = guestMessages.length
    ? guestMessages.filter(m => !m.read && (m.sender || 'guest') !== 'hotel').length
    : messageUnreadCount;
  const badge = document.getElementById('msgUnreadBadge');
  if (badge) {
    badge.textContent = unread;
    badge.style.display = unread > 0 ? '' : 'none';
  }
  const dot = document.getElementById('msgUnreadDot');
  if (dot) dot.style.display = unread > 0 ? '' : 'none';
}

function timeAgo(iso) {
  const then = new Date(iso).getTime();
  if (!then) return '';
  const diff = Math.max(0, Date.now() - then);
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return new Date(iso).toLocaleDateString();
}

function buildMessageThreads() {
  const threads = {};
  guestMessages.forEach(m => {
    const key = m.reservationCode || m.id;
    if (!threads[key]) {
      threads[key] = {
        key,
        code: m.reservationCode,
        guestName: m.guestName,
        roomName: m.roomName,
        guestPhone: m.guestPhone,
        guestEmail: m.guestEmail,
        msgs: [],
      };
    }
    threads[key].msgs.push(m);
  });
  return Object.values(threads).sort((a, b) => {
    const aUnread = a.msgs.some(m => !m.read && (m.sender || 'guest') === 'guest');
    const bUnread = b.msgs.some(m => !m.read && (m.sender || 'guest') === 'guest');
    if (aUnread && !bUnread) return -1;
    if (!aUnread && bUnread) return 1;
    const aLatest = new Date(Math.max(...a.msgs.map(m => new Date(m.createdAt))));
    const bLatest = new Date(Math.max(...b.msgs.map(m => new Date(m.createdAt))));
    return bLatest - aLatest;
  });
}

function pickDefaultMessageThread(threadList) {
  if (!threadList.length) return '';
  const unread = threadList.find(t => t.msgs.some(m => !m.read && (m.sender || 'guest') === 'guest'));
  return (unread || threadList[0]).key;
}

function toggleMessagesInbox() {
  messagesInboxOpen = !messagesInboxOpen;
  if (messagesInboxOpen && !selectedMessageThread) {
    selectedMessageThread = pickDefaultMessageThread(buildMessageThreads());
  }
  renderMessages();
}

function setMessageThread(key) {
  selectedMessageThread = key || '';
  renderMessages();
}

          ${esc(thread.guestName || 'Guest')}
          ${thread.roomName ? `<span style="font-weight:500;color:#6b7280;font-size:12px;">· ${esc(thread.roomName)}</span>` : ''}

function renderMessages() {
  const panel = document.getElementById('messagesPanel');
  if (!panel) return;

  const threadList = buildMessageThreads();
  if (threadList.length === 0) { panel.innerHTML = ''; return; }

  const threadKeys = new Set(threadList.map(t => t.key));
  if (!selectedMessageThread || !threadKeys.has(selectedMessageThread)) {
    selectedMessageThread = pickDefaultMessageThread(threadList);
  }

  const unreadCount = guestMessages.filter(m => !m.read && (m.sender || 'guest') === 'guest').length;
  const activeThread = threadList.find(t => t.key === selectedMessageThread) || threadList[0];

  const threadOptions = threadList.map(thread => {
    const hasUnread = thread.msgs.some(m => !m.read && (m.sender || 'guest') === 'guest');
    const sorted = thread.msgs.slice().sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    const latest = sorted[sorted.length - 1];
    const preview = latest?.body
      ? latest.body.replace(/\s+/g, ' ').trim().slice(0, 48) + (latest.body.length > 48 ? '…' : '')
      : (latest?.requests?.length ? latest.requests.join(', ') : 'Request');
    const label = [
      thread.guestName || 'Guest',
      thread.roomName || '',
      hasUnread ? '· new' : '',
      '·',
      timeAgo(latest?.createdAt),
      '—',
      preview,
    ].filter(Boolean).join(' ');
    return `<option value="${esc(thread.key)}"${thread.key === selectedMessageThread ? ' selected' : ''}>${esc(label)}</option>`;
  }).join('');

  const inboxBody = messagesInboxOpen ? `
    <div style="padding:0 16px 16px;border-top:1px solid #e6e9e7;">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px;">
        <label style="flex:1;min-width:200px;display:block;">
          <span style="display:block;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;">Booking conversation</span>
          <select onchange="setMessageThread(this.value)" style="width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #d1d5db;background:#fff;font-family:inherit;font-size:13px;font-weight:600;color:#1a1a1a;cursor:pointer;">
            ${threadOptions}
          </select>
        </label>
        ${unreadCount > 0 ? `<button onclick="markAllMessagesRead()" style="align-self:flex-end;padding:8px 12px;border-radius:8px;border:1px solid #d7dde3;background:#fff;color:#6b7280;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">Mark all read</button>` : ''}
      </div>
      ${renderMessageThreadDetail(activeThread)}
    </div>` : '';

  panel.innerHTML = `
    <div style="background:#fff;border:1px solid #e6e9e7;border-radius:16px;margin-bottom:14px;overflow:hidden;">
      <button type="button" onclick="toggleMessagesInbox()" style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;border:none;background:transparent;font-family:inherit;cursor:pointer;text-align:left;">
        <div style="display:flex;align-items:center;gap:8px;min-width:0;">
          <span style="font-size:15px;font-weight:800;color:#1a1a1a;white-space:nowrap;">💬 Guest messages</span>
          <span style="font-size:12px;font-weight:600;color:#6b7280;white-space:nowrap;">${threadList.length} booking${threadList.length === 1 ? '' : 's'}</span>
          ${unreadCount > 0 ? `<span style="background:#e0245e;color:#fff;border-radius:999px;font-size:11px;font-weight:700;padding:2px 8px;white-space:nowrap;">${unreadCount} new</span>` : ''}
        </div>
        <span style="font-size:18px;color:#9ca3af;flex-shrink:0;transition:transform 0.2s;transform:rotate(${messagesInboxOpen ? '90deg' : '0deg'});">›</span>
      </button>
      ${inboxBody}
    </div>`;
}

async function markMessageRead(id) {
  const msg = guestMessages.find(m => m.id === id);
  if (msg) msg.read = true;
  updateMessageBadges();
  renderMessages();
  try { await api('POST', `/api/crm/messages/${encodeURIComponent(id)}/read`); }
  catch (e) { /* optimistic; ignore */ }
}

async function markAllMessagesRead() {
  guestMessages.forEach(m => { m.read = true; });
  updateMessageBadges();
  renderMessages();
  try { await api('POST', '/api/crm/messages/read-all'); }
  catch (e) { /* optimistic; ignore */ }
}

async function replyToThread(reservationCode, inputId) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const body = input.value.trim();
  if (!body) return;
  input.disabled = true;
  try {
    const data = await api('POST', `/api/crm/messages/${encodeURIComponent(reservationCode)}/reply`, { body });
    if (data.success && data.message) {
      // Add the reply to our local messages array so it renders immediately
      guestMessages.push({
        id: data.message.id,
        reservationCode,
        guestName: guestMessages.find(m => m.reservationCode === reservationCode)?.guestName || 'Guest',
        body: data.message.body,
        sender: 'hotel',
        createdAt: data.message.createdAt,
        read: true,
        requests: [],
      });
      input.value = '';
      renderMessages();
    }
  } catch (e) {
    console.error('Reply failed:', e);
  }
  input.disabled = false;
}

async function refreshCurrentView() {
  if (!token || !activeHotelId || document.getElementById('app').style.display === 'none') return;
  // Don't auto-refresh when user is on Edit tab (causes disruptive reload)
  if (currentFilter === 'settings') return;
  if (currentFilter === 'apps') {
    loadAppsModule().then(() => loadGuestInstallStats()).catch(() => {});
    return;
  }
  const tasks = [loadBookings()];
  if (currentFilter === 'availability') {
    tasks.push(loadManualAvailability());
  }
  if (currentFilter === 'revenue' && revenueEnabled) {
    tasks.push(loadRevenueData(true));
  }
  await Promise.allSettled(tasks);
}

const BOOKING_VIRTUAL_THRESHOLD = 25;
let bookingsVirtualList = [];
let bookingsVirtualRaf = 0;

        </div>
        <div class="card-dates">
          <div class="date-block">
            <div class="date-label">Check-in</div>
            <div class="date-value">${ci}</div>
          </div>
          <div class="date-block">
            <div class="date-label">Check-out</div>

          </div>

            <div class="contact-email">${esc(b.guestEmail)}</div>

          <button class="${noteBtnClass}" onclick="addNote('${b.id}', ${esc(JSON.stringify(b.notes || ''))})">📝 ${b.notes ? 'Edit' : 'Add'} Note</button>
        </div>
      </div>
    </div>`;
}

function ensureBookingsVirtualScroll() {
  const el = document.getElementById('bookingsList');
  if (!el || el.dataset.virtualBound === '1') return;
  el.dataset.virtualBound = '1';
  el.classList.add('bookings-virtual');
  el.addEventListener('scroll', () => {
    if (bookingsVirtualRaf) return;
    bookingsVirtualRaf = requestAnimationFrame(() => {
      bookingsVirtualRaf = 0;
      renderBookingsWindow();
    });
  }, { passive: true });
}

function renderBookingsWindow() {
  const el = document.getElementById('bookingsList');
  const list = bookingsVirtualList;
  if (!el || !list.length) return;
  const scrollTop = el.scrollTop || 0;
  const viewHeight = el.clientHeight || window.innerHeight;
  const start = Math.max(0, Math.floor(scrollTop / BOOKING_CARD_EST_HEIGHT) - 2);
  const end = Math.min(list.length, Math.ceil((scrollTop + viewHeight) / BOOKING_CARD_EST_HEIGHT) + 2);
  const topPad = start * BOOKING_CARD_EST_HEIGHT;
  const bottomPad = Math.max(0, (list.length - end) * BOOKING_CARD_EST_HEIGHT);
  el.innerHTML = `<div style="height:${topPad}px" aria-hidden="true"></div>`
    + list.slice(start, end).map(bookingCardHtml).join('')
    + `<div style="height:${bottomPad}px" aria-hidden="true"></div>`;
}

                <div style="font-size:14px;font-weight:600;color:#1a1a2e;">Add a photo to your room</div>
                <div style="font-size:12px;color:#6b7280;">Guests book more when they see photos</div>
              </div>
            </button>
            <button onclick="checklistGoToRates()" style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:white;border-radius:12px;border:1.5px solid ${localStorage.getItem('ratesChanged') ? '#2E7D5B' : '#e5e7eb'};cursor:pointer;text-align:left;font-family:inherit;width:100%;">
              ${checkIcon(!!localStorage.getItem('ratesChanged'))}
              <div>
                <div style="font-size:14px;font-weight:600;color:#1a1a2e;">Change your rates</div>
                <div style="font-size:12px;color:#6b7280;">Set your nightly, weekly, and monthly pricing</div>
              </div>
            </button>
            <button onclick="copyBookingLinkFromChecklist()" style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:white;border-radius:12px;border:1.5px solid ${hasSharedLink ? '#2E7D5B' : '#e5e7eb'};cursor:pointer;text-align:left;font-family:inherit;width:100%;">

                <div style="font-size:14px;font-weight:600;color:#1a1a2e;">Share your booking link</div>

function refreshMobileBottomNavIcons() {
  if (typeof lucide === 'undefined' || typeof lucide.createIcons !== 'function') {
    ensureLucideLoaded().then(() => refreshMobileBottomNavIcons()).catch(() => {});
    return;
  }
  const root = document.getElementById('mobileBottomNav');
  if (!root || !root.querySelector('i[data-lucide]')) return;
  try {
    lucide.createIcons();
  } catch (e) { /* ignore */ }
}

function syncMobileNavActive(filter) {
  const nav = document.getElementById('mobileBottomNav');
  if (!nav) return;
  nav.querySelectorAll('.mobile-nav-item').forEach((n) => {
    const f = n.getAttribute('data-nav-filter');
    if (f === 'revenue' && n.classList.contains('mobile-nav-item--hidden')) {
      n.classList.remove('active');
      n.removeAttribute('aria-current');
      return;
    }
    const match = f === filter;
    n.classList.toggle('active', match);
    if (match) n.setAttribute('aria-current', 'page');
    else n.removeAttribute('aria-current');
  });
}

function updateMobileRevenueNavVisibility() {
  const el = document.getElementById('mobileNavRevenueBtn');
  if (!el) return;
  el.classList.toggle('mobile-nav-item--hidden', !revenueEnabled);
}

function initMobileBottomNav() {
  const nav = document.getElementById('mobileBottomNav');
  if (!nav || nav.dataset.bound === '1') return;
  nav.dataset.bound = '1';
  nav.addEventListener('click', (e) => {
    const item = e.target.closest('.mobile-nav-item');
    if (!item || item.classList.contains('mobile-nav-item--hidden')) return;
    const filter = item.getAttribute('data-nav-filter');
    if (!filter) return;
    if (filter === 'revenue' && !revenueEnabled) return;
    setFilter(filter, item);
  });

  // Mobile keeps a single Bookings bucket.
  if (window.matchMedia && window.matchMedia('(max-width: 600px)').matches && (currentFilter === 'needs-call' || currentFilter === 'called')) {
    const bookingsBtn = nav.querySelector('.mobile-nav-item[data-nav-filter="bookings"]');
    setFilter('bookings', bookingsBtn);
  }
}

function setFilter(filter, btn) {
  if (filter === 'revenue' && !revenueEnabled) return;
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  let tabBtn = null;
  if (btn && btn.classList && btn.classList.contains('tab')) {
    tabBtn = btn;
  } else {
    tabBtn = document.querySelector(`.tab[data-nav-filter="${filter}"]`);
  }
  if (tabBtn) {
    tabBtn.classList.add('active');
    moveSlider(tabBtn);
  }
  syncMobileNavActive(filter);
  if (filter === 'availability') {
    // Show the tab immediately with a loading state
    applyFilter();
    const calWrap = document.getElementById('availabilityCalendarWrap');
    const noRoom = document.getElementById('availabilityNoRoom');
    if (calWrap) calWrap.style.display = 'none';
    if (noRoom) { noRoom.style.display = 'block'; noRoom.innerHTML = '<div class="loading"><div class="logo-sprite-bounce"></div> Loading availability…</div>'; }
    loadManualAvailability().then(() => { renderAvailabilityView(); }).catch(() => { renderAvailabilityView(); });
    return;
  }
  if (filter === 'revenue') {
    applyFilter();
    loadRevenueData();
    return;
  }
  applyFilter();
}

function moveSlider(activeTab) {
  if (window.matchMedia && window.matchMedia('(max-width: 600px)').matches) return;
  const slider = document.getElementById('tabsSlider');
  const tabs = activeTab ? activeTab.closest('.tabs-container') : null;
  if (!slider || !activeTab || !tabs) return;

  const tabRect = activeTab.getBoundingClientRect();
  const tabsRect = tabs.getBoundingClientRect();
  const cs = getComputedStyle(tabs);
  const borderLeft = parseFloat(cs.borderLeftWidth) || 0;
  const padLeft = parseFloat(cs.paddingLeft) || 0;
  // Slider is `left: Npx` from the padding edge; delta from border box must subtract border + padding.
  const left = tabRect.left - tabsRect.left + tabs.scrollLeft - borderLeft - padLeft;

  slider.style.width = `${Math.round(tabRect.width)}px`;
  slider.style.transform = `translateX(${Math.round(left)}px)`;
}

// Call on load to position slider under the default active tab
document.addEventListener('DOMContentLoaded', () => {
  ensureAvailabilityUi();
  syncRevenueUi();
  initMobileBottomNav();
  updateMobileRevenueNavVisibility();
  syncMobileNavActive(currentFilter);
  refreshMobileBottomNavIcons();
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) moveSlider(activeTab);

  const tabs = document.querySelector('.tabs-container');
  if (tabs) {
    tabs.addEventListener('scroll', () => {
      const current = document.querySelector('.tab.active');
      if (current) moveSlider(current);
    }, { passive: true });
  }

  window.addEventListener('resize', () => {
    const current = document.querySelector('.tab.active');
    if (current) moveSlider(current);
    if (window.matchMedia && window.matchMedia('(max-width: 600px)').matches && (currentFilter === 'needs-call' || currentFilter === 'called')) {
      const bookingsBtn = document.querySelector('.mobile-nav-item[data-nav-filter="bookings"]');
      setFilter('bookings', bookingsBtn);
      return;
    }
    syncMobileNavActive(currentFilter);
  });

  window.addEventListener('load', refreshMobileBottomNavIcons, { once: true });
});

async function loadManualAvailability() {
  try {
    const data = await api('GET', '/api/crm/manual-availability');
    if (!data.success) throw new Error(data.message || 'Failed to load manual availability');
    manualAvailability = data.data || { rooms: [], overrides: {} };
    if (!Array.isArray(manualAvailability.rooms)) manualAvailability.rooms = [];
    if (!manualAvailability.overrides || typeof manualAvailability.overrides !== 'object') {
      manualAvailability.overrides = {};
    }
    if (!manualSelectedRoom && manualAvailability.rooms.length) {
      manualSelectedRoom = manualAvailability.rooms[0].name;
    }
    refreshRoomBadge();
    renderAvailabilityView();
  } catch (e) {
    toast('Could not load manual availability', 'error');
  }
}

function roomDateKey(roomName, day) {
  return `${String(roomName || '').trim()}|${day}`;
}

function refreshRoomBadge() {
  const badge = document.getElementById('countRooms');
  if (badge) badge.textContent = manualAvailability.rooms.length;
}

function getManualRoomByName(name) {
  return (manualAvailability.rooms || []).find(r => r.name === name) || null;
}

function setActiveManualRoom(name) {
  const room = getManualRoomByName(name);
  if (!room) return;
  manualSelectedRoom = room.name;
  renderAvailabilityView();
}

function renderRoomPills() {
  const bar = document.getElementById('roomsPillBar');
  if (!bar) return;
  const rooms = manualAvailability.rooms || [];

  bar.innerHTML = '';
  rooms.forEach((room) => {
    const wrap = document.createElement('div');
    wrap.className = 'room-pill-wrap';

    const pill = document.createElement('button');
    pill.type = 'button';
    pill.className = `room-pill ${manualSelectedRoom === room.name ? 'active' : ''}`;
    pill.textContent = `${room.name} (${Math.max(0, parseInt(room.totalUnits, 10) || 0)})`;
    pill.addEventListener('click', () => setActiveManualRoom(room.name));

    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'room-pill-action';
    editBtn.title = `Edit ${room.name}`;
    editBtn.setAttribute('aria-label', `Edit ${room.name}`);
    editBtn.textContent = '✎';
    editBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openRoomsEditModal(room.name);
    });

    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'room-pill-action danger';
    delBtn.title = `Delete ${room.name}`;
    delBtn.setAttribute('aria-label', `Delete ${room.name}`);
    delBtn.textContent = '🗑';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteRoomType(room.name);
    });

    wrap.appendChild(pill);
    wrap.appendChild(editBtn);
    wrap.appendChild(delBtn);
    bar.appendChild(wrap);
  });

  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.className = 'room-pill-add';
  addBtn.textContent = '+ Add room type';
  addBtn.addEventListener('click', openRoomsAddModal);
  // Only show if no rooms exist yet (otherwise use Edit tab)
  if (bar.querySelectorAll('.room-pill').length === 0) {
    bar.appendChild(addBtn);
  }
}

function renderMobileRoomActions() {
  const row = document.getElementById('roomMobileActions');
  const editBtn = document.getElementById('roomMobileEditBtn');
  const delBtn = document.getElementById('roomMobileDeleteBtn');
  const room = getManualRoomByName(manualSelectedRoom);

}

function openRoomsAddModal() {
  const modal = document.getElementById('roomsAddModalBg');

function bookingsByRoomDate() {
  const counts = {};
  for (const b of bookings) {
    if (b.paymentDeclined) continue;
    const roomName = String(b.roomName || '').trim();
    if (!roomName) continue;
    const ci = toIsoDate(b.checkinDate);
    const co = toIsoDate(b.checkoutDate);
    if (!ci || !co || co <= ci) continue;
    const endDateObj = new Date(new Date(`${co}T00:00:00.000Z`).getTime() - 86400000);
    const days = enumerateDates(ci, endDateObj.toISOString().slice(0, 10));
    for (const day of days) {
      const key = roomDateKey(roomName, day);
      counts[key] = (counts[key] || 0) + 1;
    }
  }
  return counts;
}

function availabilityForDay(room, dayIso, bookedMap) {
  const baseUnits = Math.max(0, Number(room.totalUnits || 0));
  const booked = bookedMap[roomDateKey(room.name, dayIso)] || 0;
  const override = manualAvailability.overrides[roomDateKey(room.name, dayIso)];

  if (override?.closed) {
    return { status: 'closed', value: 0, booked, baseUnits, mode: 'closed' };
  }

  let value = Math.max(0, baseUnits - booked);
  let mode = 'auto';
  if (override && override.availableUnits !== null && override.availableUnits !== undefined && override.availableUnits !== '') {
    value = Math.max(0, Number(override.availableUnits) || 0);
    mode = 'override';
  }

  let status = 'open';
  if (value <= 0) status = 'full';
  else if (value < baseUnits) status = 'partial';

  return { status, value, booked, baseUnits, mode };
}

function renderAvailabilityView() {
  ensureAvailabilityUi();
  renderRoomPills();

  const rooms = manualAvailability.rooms || [];
  if (!manualSelectedRoom && rooms.length) {
    manualSelectedRoom = rooms[0].name;
  }
  if (manualSelectedRoom && !rooms.some(r => r.name === manualSelectedRoom)) {
    manualSelectedRoom = rooms.length ? rooms[0].name : '';
  }
  renderMobileRoomActions();

  const noRoom = document.getElementById('availabilityNoRoom');
  const calWrap = document.getElementById('availabilityCalendarWrap');
  const activeLabel = document.getElementById('availabilityActiveRoomLabel');

  if (!manualSelectedRoom) {
    if (noRoom) noRoom.style.display = 'block';
    if (calWrap) calWrap.style.display = 'none';
    if (activeLabel) activeLabel.textContent = 'Select a room type first.';
    closeAvailabilityDayPopover();
    return;
  }

  if (noRoom) noRoom.style.display = 'none';
  if (calWrap) calWrap.style.display = 'block';
  const room = getManualRoomByName(manualSelectedRoom);
  if (activeLabel && room) {
    activeLabel.textContent = `Editing: ${room.name} (${Math.max(0, Number(room.totalUnits || 0))} total units)`;

}

function renderAvailabilityCalendar() {
  const room = getManualRoomByName(manualSelectedRoom);
  const grid = document.getElementById('availabilityCalendarGrid');
  const monthLabel = document.getElementById('availabilityMonthLabel');
  if (!room || !grid || !monthLabel) return;

  monthLabel.textContent = `${AVAIL_MONTHS[availabilityMonth]} ${availabilityYear}`;
  grid.innerHTML = '';
  AVAIL_DOW.forEach((dow) => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = dow;
    grid.appendChild(el);
  });

  const firstDay = new Date(availabilityYear, availabilityMonth, 1).getDay();
  const daysInMonth = new Date(availabilityYear, availabilityMonth + 1, 0).getDate();
  const today = new Date();
  const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  const bookedMap = bookingsByRoomDate();

  for (let i = 0; i < firstDay; i += 1) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d += 1) {
    const date = new Date(availabilityYear, availabilityMonth, d);
    const iso = toIsoDate(date);
    const isPast = date.getTime() < todayMidnight;
    const isToday = date.getTime() === todayMidnight;

    const result = availabilityForDay(room, iso, bookedMap);
    const dayEl = document.createElement('div');
    dayEl.className = `cal-day ${result.status}${isPast ? ' past' : ''}${isToday ? ' today' : ''}`;

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = String(d);

    const avail = document.createElement('div');
    avail.className = 'day-avail';
    avail.textContent = result.status === 'closed' ? '--' : String(result.value);

    dayEl.appendChild(num);
    dayEl.appendChild(avail);
    if (!isPast) {
      dayEl.addEventListener('click', (event) => openAvailabilityDayPopover(event, iso));
    }
    grid.appendChild(dayEl);
  }
}

function changeAvailabilityMonth(delta) {
  availabilityMonth += delta;
  if (availabilityMonth > 11) {
    availabilityMonth = 0;
    availabilityYear += 1;
  }
  if (availabilityMonth < 0) {
    availabilityMonth = 11;
    availabilityYear -= 1;
  }
  closeAvailabilityDayPopover();
  renderAvailabilityCalendar();
}

  countEl.textContent = String(result.status === 'closed' ? result.baseUnits : result.value);
  if (closedInput) closedInput.checked = result.status === 'closed';

  const thumb = document.getElementById('availabilityClosedToggleThumb');
  const stepDown = document.getElementById('availabilityStepDownBtn');
  const stepUp = document.getElementById('availabilityStepUpBtn');

  if (stepUp) { stepUp.disabled = isClosed; stepUp.style.opacity = isClosed ? '0.35' : '1'; stepUp.style.pointerEvents = isClosed ? 'none' : ''; }

  if (backdrop) backdrop.classList.add('open');

  pop.style.position = 'fixed';
  pop.style.left = '50%';
  pop.style.top = '50%';
  pop.style.transform = 'translate(-50%, -50%)';
  pop.style.width = '260px';
  pop.style.maxWidth = 'calc(100vw - 32px)';
  pop.style.bottom = '';
  pop.style.right = '';
  pop.style.display = 'block';
  pop.style.zIndex = '262';

  pop.style.boxShadow = '0 20px 60px rgba(0,0,0,0.2)';

  setAvailabilityDaySaving(false);

  pop.classList.add('open');
  pop.setAttribute('aria-hidden', 'false');
  if (event) event.stopPropagation();

function setAvailabilityDaySaving(saving) {
  availabilityDaySaving = !!saving;
  const overlay = document.getElementById('availabilityDaySavingOverlay');
  const saveBtn = document.getElementById('availabilityDaySaveBtn');
  const closeBtn = document.getElementById('availabilityDayCloseBtn');
  const stepDown = document.getElementById('availabilityStepDownBtn');
  const stepUp = document.getElementById('availabilityStepUpBtn');
  const closedToggle = document.getElementById('availabilityClosedToggleBtn');
  if (overlay) {
    overlay.hidden = !saving;
    overlay.setAttribute('aria-hidden', saving ? 'false' : 'true');
  }
  [saveBtn, closeBtn, stepDown, stepUp, closedToggle].forEach((el) => {
    if (!el) return;
    el.disabled = saving;
    el.style.pointerEvents = saving ? 'none' : '';
    el.style.opacity = saving ? '0.45' : '';
  });
  if (!saving) {
    const closedInput = document.getElementById('availabilityDayClosedInput');
    const isClosed = !!(closedInput && closedInput.checked);
    if (stepDown) {
      stepDown.style.opacity = isClosed ? '0.35' : '';
      stepDown.style.pointerEvents = isClosed ? 'none' : '';
    }
    if (stepUp) {
      stepUp.style.opacity = isClosed ? '0.35' : '';
      stepUp.style.pointerEvents = isClosed ? 'none' : '';
    }
    if (closedToggle) closedToggle.style.opacity = '';
    if (saveBtn) saveBtn.style.opacity = '';
    if (closeBtn) closeBtn.style.opacity = '';
  }
}

function stepAvailabilityDay(delta) {
  if (!availabilityEditingDay) return;
  const room = getManualRoomByName(manualSelectedRoom);
  const countEl = document.getElementById('availabilityDayCount');
  const closedInput = document.getElementById('availabilityDayClosedInput');
  if (!room || !countEl || !closedInput || closedInput.checked) return;
  const cur = parseInt(countEl.textContent, 10) || 0;
  const maxUnits = Math.max(0, parseInt(room.totalUnits, 10) || 0);
  const next = Math.max(0, Math.min(maxUnits, cur + delta));
  countEl.textContent = String(next);
}

function toggleAvailabilityDayClosed() {

  // Update visual state

  if (stepDown) { stepDown.disabled = isClosed; stepDown.style.opacity = isClosed ? '0.35' : '1'; stepDown.style.pointerEvents = isClosed ? 'none' : ''; }

  const payload = {
    roomName: manualSelectedRoom,
    startDate: availabilityEditingDay,
    endDate: availabilityEditingDay,
    closed: !!closedInput.checked,
  };
  if (!closedInput.checked) {
    payload.availableUnits = Math.max(0, parseInt(countEl.textContent, 10) || 0);
  }

  setAvailabilityDaySaving(true);
  try {
    const data = await api('POST', '/api/crm/manual-availability/range', payload);

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const output = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) output[i] = rawData.charCodeAt(i);
  return output;
}

async function enableNotifications() {
  if (!token) { toast('Sign in first', 'error'); return; }
  if (typeof Notification === 'undefined' || !('serviceWorker' in navigator) || !('PushManager' in window)) {
    toast('Notifications not supported on this device', 'error');
    return;
  }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      setNotificationButtonState(false);
      toast('Notifications blocked', 'error');
      return;
    }
    const keyRes = await fetch('/api/push/vapid-public');
    const keyData = await keyRes.json().catch(() => ({}));
    if (!keyData.publicKey) { toast('Push not configured', 'error'); return; }
    // Register from /frontdesk-sw.js (a dedicated path) and race `ready` against a
    // timeout so a failed SW load surfaces an error instead of hanging forever.
    try { await navigator.serviceWorker.register('/frontdesk-sw.js'); } catch (_) {}
    const reg = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, rej) => setTimeout(() => rej(new Error('Service worker unavailable')), 8000)),
    ]);
    const sub = await Promise.race([
      reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(keyData.publicKey)
      }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('Subscription timed out')), 15000)),
    ]);
    const bufToB64 = buf => btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
    await api('POST', '/api/push/subscribe', {
      endpoint: sub.endpoint,
      p256dh: sub.getKey('p256dh') ? bufToB64(sub.getKey('p256dh')) : '',
      auth: sub.getKey('auth') ? bufToB64(sub.getKey('auth')) : '',
      source: 'simple-crm'
    });
    toast('Notifications enabled', 'success');
    setNotificationButtonState(true);
  } catch(e) {
    setNotificationButtonState(false);
    toast('Failed: ' + (e.message || e), 'error');
  }
}

function buildGuestInstallUrlForQr(reservationCode, ref) {

  if (!domain) return '';
  const params = new URLSearchParams({ ref: ref || 'frontdesk-qr-generic' });

  return 'https://' + domain + '/install?' + params.toString();

function showCheckinQrOverlay(preselectedCode) {
  const hName = activeHotelName || 'Your Hotel';
  const domain = activeHotelDomain || '';
  if (!domain) { toast('Your booking domain is still loading', 'error'); return; }

  const existing = document.getElementById('checkinQrOverlay');
  if (existing) existing.remove();

  let selectedCode = preselectedCode || '';
  let mode = selectedCode ? 'guest' : 'generic';

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dayAfterTomorrow = new Date(today);
  dayAfterTomorrow.setDate(dayAfterTomorrow.getDate() + 2);

  const arrivals = (bookings || []).filter(function(b) {
    if (b.paymentDeclined) return false;
    if (!b.checkinDate) return false;
    const ci = new Date(b.checkinDate);
    ci.setHours(0, 0, 0, 0);
    return ci >= today && ci <= dayAfterTomorrow;
  });

  const overlay = document.createElement('div');
  overlay.id = 'checkinQrOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:102500;background:#0a0f0d;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(16px,env(safe-area-inset-top)) 20px max(24px,env(safe-area-inset-bottom));box-sizing:border-box;';

  function escAttr(s) { return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

  function render() {
    const ref = mode === 'guest' && selectedCode ? 'frontdesk-qr-guest' : 'frontdesk-qr-generic';
    const url = buildGuestInstallUrlForQr(mode === 'guest' ? selectedCode : '', ref);
    const qr = url ? 'https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=10&data=' + encodeURIComponent(url) : '';

    const guestOptions = arrivals.map(function(b) {
      const code = getBookingReservationCode(b);

    document.getElementById('checkinQrClose').onclick = closeCheckinQrOverlay;
