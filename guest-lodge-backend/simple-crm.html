function bookingsByRoomDate() {
  const counts = {};
  for (const b of bookings) {
    if (b.paymentDeclined) continue;
    const roomName = String(b.roomName || '').trim();
    if (!roomName) continue;
    const ci = toIsoDate(b.checkinDate);
    const co = toIsoDate(b.checkoutDate);
    if (!ci || !co || co <= ci) continue;
    const endDateObj = new Date(new Date(`${co}T00:00:00.000Z`).getTime() - 86400000);
    const days = enumerateDates(ci, endDateObj.toISOString().slice(0, 10));
    for (const day of days) {
      const key = roomDateKey(roomName, day);
      counts[key] = (counts[key] || 0) + 1;
    }
  }
  return counts;
}

function availabilityForDay(room, dayIso, bookedMap) {
  const baseUnits = Math.max(0, Number(room.totalUnits || 0));
  const booked = bookedMap[roomDateKey(room.name, dayIso)] || 0;
  const override = manualAvailability.overrides[roomDateKey(room.name, dayIso)];

  if (override?.closed) {
    return { status: 'closed', value: 0, booked, baseUnits, mode: 'closed' };
  }

  let value = Math.max(0, baseUnits - booked);
  let mode = 'auto';
  if (override && override.availableUnits !== null && override.availableUnits !== undefined && override.availableUnits !== '') {
    value = Math.max(0, Number(override.availableUnits) || 0);
    mode = 'override';
  }

  let status = 'open';
  if (value <= 0) status = 'full';
  else if (value < baseUnits) status = 'partial';

  return { status, value, booked, baseUnits, mode };
}

function renderAvailabilityView() {
  ensureAvailabilityUi();
  renderRoomPills();

  const rooms = manualAvailability.rooms || [];
  if (!manualSelectedRoom && rooms.length) {
    manualSelectedRoom = rooms[0].name;
  }
  if (manualSelectedRoom && !rooms.some(r => r.name === manualSelectedRoom)) {
    manualSelectedRoom = rooms.length ? rooms[0].name : '';
  }
  renderMobileRoomActions();

  const noRoom = document.getElementById('availabilityNoRoom');
  const calWrap = document.getElementById('availabilityCalendarWrap');
  const activeLabel = document.getElementById('availabilityActiveRoomLabel');

  if (!manualSelectedRoom) {
    renderAvailabilityEmptyState();
    if (calWrap) calWrap.style.display = 'none';
    if (activeLabel) activeLabel.textContent = 'Add an inventory room to open the calendar.';
    closeAvailabilityDayPopover();
    return;
  }

  if (noRoom) noRoom.style.display = 'none';
  if (calWrap) calWrap.style.display = 'block';
  const room = getManualRoomByName(manualSelectedRoom);
  if (activeLabel && room) {
    activeLabel.textContent = `Editing: ${room.name} (${Math.max(0, Number(room.totalUnits || 0))} total units)`;
  }

  renderAvailabilityCalendar();
}

function renderAvailabilityCalendar() {
  const room = getManualRoomByName(manualSelectedRoom);
  const grid = document.getElementById('availabilityCalendarGrid');
  const monthLabel = document.getElementById('availabilityMonthLabel');
  if (!room || !grid || !monthLabel) return;

  monthLabel.textContent = `${AVAIL_MONTHS[availabilityMonth]} ${availabilityYear}`;
  grid.innerHTML = '';
  AVAIL_DOW.forEach((dow) => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = dow;
    grid.appendChild(el);
  });

  const firstDay = new Date(availabilityYear, availabilityMonth, 1).getDay();
  const daysInMonth = new Date(availabilityYear, availabilityMonth + 1, 0).getDate();
  const today = new Date();
  const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  const bookedMap = bookingsByRoomDate();

  for (let i = 0; i < firstDay; i += 1) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d += 1) {
    const date = new Date(availabilityYear, availabilityMonth, d);
    const iso = toIsoDate(date);
    const isPast = date.getTime() < todayMidnight;
    const isToday = date.getTime() === todayMidnight;

    const result = availabilityForDay(room, iso, bookedMap);
    const dayEl = document.createElement('div');
    dayEl.className = `cal-day ${result.status}${isPast ? ' past' : ''}${isToday ? ' today' : ''}`;

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = String(d);

    const avail = document.createElement('div');
    avail.className = 'day-avail';
    avail.textContent = result.status === 'closed' ? '--' : String(result.value);

    dayEl.appendChild(num);
    dayEl.appendChild(avail);
    if (!isPast) {
      dayEl.addEventListener('click', (event) => openAvailabilityDayPopover(event, iso));
    }
    grid.appendChild(dayEl);
  }
}

function changeAvailabilityMonth(delta) {
  availabilityMonth += delta;
  if (availabilityMonth > 11) {
    availabilityMonth = 0;
    availabilityYear += 1;
  }
  if (availabilityMonth < 0) {
    availabilityMonth = 11;
    availabilityYear -= 1;
  }
  closeAvailabilityDayPopover();
  renderAvailabilityCalendar();
}

function openAvailabilityDayPopover(event, dayIso) {
  const room = getManualRoomByName(manualSelectedRoom);
  const pop = document.getElementById('availabilityDayPopover');
  const backdrop = document.getElementById('availabilitySheetBackdrop');
  const title = document.getElementById('availabilityDayPopoverTitle');
  const countEl = document.getElementById('availabilityDayCount');
  const closedInput = document.getElementById('availabilityDayClosedInput');
  if (!room || !pop || !title || !countEl) return;

  availabilityEditingDay = dayIso;
  const bookedMap = bookingsByRoomDate();
  const result = availabilityForDay(room, dayIso, bookedMap);
  const date = new Date(`${dayIso}T00:00:00`);
  title.textContent = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  countEl.textContent = String(result.status === 'closed' ? result.baseUnits : result.value);
  if (closedInput) closedInput.checked = result.status === 'closed';

  // Sync toggle visual state
  const isClosed = result.status === 'closed';
  const track = document.getElementById('availabilityClosedToggleTrack');
  const thumb = document.getElementById('availabilityClosedToggleThumb');
  const stepDown = document.getElementById('availabilityStepDownBtn');
  const stepUp = document.getElementById('availabilityStepUpBtn');
  if (track) track.style.background = isClosed ? '#E05252' : '#D8E4DC';
  if (thumb) thumb.style.left = isClosed ? '18px' : '2px';
  if (countEl) countEl.style.opacity = isClosed ? '0.35' : '1';
  if (stepDown) { stepDown.disabled = isClosed; stepDown.style.opacity = isClosed ? '0.35' : '1'; stepDown.style.pointerEvents = isClosed ? 'none' : ''; }
  if (stepUp) { stepUp.disabled = isClosed; stepUp.style.opacity = isClosed ? '0.35' : '1'; stepUp.style.pointerEvents = isClosed ? 'none' : ''; }

  if (backdrop) backdrop.classList.add('open');

  // Always center the popover as a floating modal
  pop.style.position = 'fixed';
  pop.style.left = '50%';
  pop.style.top = '50%';
  pop.style.transform = 'translate(-50%, -50%)';
  pop.style.width = '260px';
  pop.style.maxWidth = 'calc(100vw - 32px)';
  pop.style.bottom = '';
  pop.style.right = '';
  pop.style.display = 'block';
  pop.style.zIndex = '262';
  pop.style.background = 'var(--white)';
  pop.style.borderRadius = '16px';
  pop.style.border = '1.5px solid var(--border)';
  pop.style.boxShadow = '0 20px 60px rgba(0,0,0,0.2)';

  setAvailabilityDaySaving(false);

  pop.classList.add('open');
  pop.setAttribute('aria-hidden', 'false');
  if (event) event.stopPropagation();
}

function setAvailabilityDaySaving(saving) {
  availabilityDaySaving = !!saving;
  const overlay = document.getElementById('availabilityDaySavingOverlay');
  const saveBtn = document.getElementById('availabilityDaySaveBtn');
  const closeBtn = document.getElementById('availabilityDayCloseBtn');
  const stepDown = document.getElementById('availabilityStepDownBtn');
  const stepUp = document.getElementById('availabilityStepUpBtn');
  const closedToggle = document.getElementById('availabilityClosedToggleBtn');
  if (overlay) {
    overlay.hidden = !saving;
    overlay.setAttribute('aria-hidden', saving ? 'false' : 'true');
  }
  [saveBtn, closeBtn, stepDown, stepUp, closedToggle].forEach((el) => {
    if (!el) return;
    el.disabled = saving;
    el.style.pointerEvents = saving ? 'none' : '';
    el.style.opacity = saving ? '0.45' : '';
  });
  if (!saving) {
    const closedInput = document.getElementById('availabilityDayClosedInput');
    const isClosed = !!(closedInput && closedInput.checked);
    if (stepDown) {
      stepDown.style.opacity = isClosed ? '0.35' : '';
      stepDown.style.pointerEvents = isClosed ? 'none' : '';
    }
    if (stepUp) {
      stepUp.style.opacity = isClosed ? '0.35' : '';
      stepUp.style.pointerEvents = isClosed ? 'none' : '';
    }
    if (closedToggle) closedToggle.style.opacity = '';
    if (saveBtn) saveBtn.style.opacity = '';
    if (closeBtn) closeBtn.style.opacity = '';
  }
}

function closeAvailabilityDayPopover() {
  if (availabilityDaySaving) return;

function stepAvailabilityDay(delta) {
  if (!availabilityEditingDay) return;
  const room = getManualRoomByName(manualSelectedRoom);
  const countEl = document.getElementById('availabilityDayCount');
  const closedInput = document.getElementById('availabilityDayClosedInput');
  if (!room || !countEl || !closedInput || closedInput.checked) return;
  const cur = parseInt(countEl.textContent, 10) || 0;
  const maxUnits = Math.max(0, parseInt(room.totalUnits, 10) || 0);
  const next = Math.max(0, Math.min(maxUnits, cur + delta));
  countEl.textContent = String(next);
}

function toggleAvailabilityDayClosed() {
  const closedInput = document.getElementById('availabilityDayClosedInput');
  const countEl = document.getElementById('availabilityDayCount');
  const stepDown = document.getElementById('availabilityStepDownBtn');
  const stepUp = document.getElementById('availabilityStepUpBtn');
  const track = document.getElementById('availabilityClosedToggleTrack');
  const thumb = document.getElementById('availabilityClosedToggleThumb');
  if (!closedInput || !countEl) return;

  // Toggle the checkbox
  closedInput.checked = !closedInput.checked;
  const isClosed = closedInput.checked;

  // Update visual state
  countEl.style.opacity = isClosed ? '0.35' : '1';
  if (stepDown) { stepDown.disabled = isClosed; stepDown.style.opacity = isClosed ? '0.35' : '1'; stepDown.style.pointerEvents = isClosed ? 'none' : ''; }
  if (stepUp) { stepUp.disabled = isClosed; stepUp.style.opacity = isClosed ? '0.35' : '1'; stepUp.style.pointerEvents = isClosed ? 'none' : ''; }

  // Update toggle track/thumb visual
  if (track) track.style.background = isClosed ? '#E05252' : '#D8E4DC';
  if (thumb) thumb.style.left = isClosed ? '18px' : '2px';
}

async function saveAvailabilityDay() {
  if (availabilityDaySaving || !availabilityEditingDay || !manualSelectedRoom) return;
  const closedInput = document.getElementById('availabilityDayClosedInput');
  const countEl = document.getElementById('availabilityDayCount');
  if (!closedInput || !countEl) return;

  const payload = {
    roomName: manualSelectedRoom,
    startDate: availabilityEditingDay,
    endDate: availabilityEditingDay,
    closed: !!closedInput.checked,
  };
  if (!closedInput.checked) {
    payload.availableUnits = Math.max(0, parseInt(countEl.textContent, 10) || 0);
  }

  setAvailabilityDaySaving(true);
  try {
    const data = await api('POST', '/api/crm/manual-availability/range', payload);
    if (!data.success) throw new Error(data.message || 'Failed to save day');
    manualAvailability = data.data || manualAvailability;
    availabilityDaySaving = false;
    closeAvailabilityDayPopover();
    renderAvailabilityCalendar();
    toast('Day updated', 'success');
  } catch (e) {
    setAvailabilityDaySaving(false);
    toast('Failed to update availability', 'error');
  }
}

    closeAvailabilityDayPopover();
    closeRoomsDeleteModal();

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const output = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) output[i] = rawData.charCodeAt(i);
  return output;
}

async function enableNotifications() {
  if (!token) { toast('Sign in first', 'error'); return; }
  if (typeof Notification === 'undefined' || !('serviceWorker' in navigator) || !('PushManager' in window)) {
    toast('Notifications not supported on this device', 'error');
    return;
  }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      setNotificationButtonState(false);
      toast('Notifications blocked', 'error');
      return;
    }
    const keyRes = await fetch('/api/push/vapid-public');
    const keyData = await keyRes.json().catch(() => ({}));
    if (!keyData.publicKey) { toast('Push not configured', 'error'); return; }
    // Register from /frontdesk-sw.js (a dedicated path) and race `ready` against a
    // timeout so a failed SW load surfaces an error instead of hanging forever.
    try { await navigator.serviceWorker.register('/frontdesk-sw.js'); } catch (_) {}
    const reg = await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_, rej) => setTimeout(() => rej(new Error('Service worker unavailable')), 8000)),
    ]);
    const sub = await Promise.race([
      reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(keyData.publicKey)
      }),
      new Promise((_, rej) => setTimeout(() => rej(new Error('Subscription timed out')), 15000)),
    ]);
    const bufToB64 = buf => btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
    await api('POST', '/api/push/subscribe', {
      endpoint: sub.endpoint,
      p256dh: sub.getKey('p256dh') ? bufToB64(sub.getKey('p256dh')) : '',
      auth: sub.getKey('auth') ? bufToB64(sub.getKey('auth')) : '',
      source: 'simple-crm'
    });
    toast('Notifications enabled', 'success');
    setNotificationButtonState(true);
  } catch(e) {
    setNotificationButtonState(false);
    toast('Failed: ' + (e.message || e), 'error');
  }
}

async function sendGuestBroadcast() {
  if (!guestPushSubscriberCount) {
    toast('No guests have notifications on yet — show your QR at check-in first', 'error');
    return;
  }
  const titleEl = document.getElementById('guest-broadcast-title');

  const resultEl = document.getElementById('guest-broadcast-result');
  const title = titleEl?.value.trim();

  if (!title || !body) {
    toast('Enter a title and what you want to notify them about', 'error');
    return;
  }
  const btn = document.getElementById('guest-broadcast-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Notifying…'; }
  if (resultEl) resultEl.textContent = '';
  try {
    const data = await api('POST', '/api/crm/guest-broadcast', { title, body });
    if (data.success) {
      const msg = data.sent > 0
        ? `Notified ${data.sent} guest${data.sent === 1 ? '' : 's'}`
        : 'No guests to notify yet';
      if (resultEl) resultEl.textContent = msg;
      toast(msg, data.sent > 0 ? 'success' : '');
      if (bodyEl) bodyEl.value = '';
    } else {
      toast(data.message || 'Broadcast failed', 'error');
    }
  } catch (e) {
    toast('Broadcast failed', 'error');
  } finally {
    if (btn) btn.textContent = 'Send notification';
    applyGuestBroadcastAudienceUi();
  }
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function toast(msg, type = '') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = `${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'} ${msg}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

    if (rateInput || attempts > 20) {
      clearInterval(poll);
      if (!rateInput) return;

      if (accordionBody && accordionBody.style.display === 'none') {
        accordionBody.style.display = 'block';
        const arrow = accordionBody.previousElementSibling?.querySelector('.accordion-arrow');
        if (arrow) arrow.style.transform = 'rotate(90deg)';
      }

      // Now scroll and show pointer
      setTimeout(() => {
        rateInput.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // Fixed delay to let scroll finish
        setTimeout(() => {
          const prev = document.getElementById('checklistPointer');
          if (prev) prev.remove();

          const rect = rateInput.getBoundingClientRect();
          const pointer = document.createElement('div');
          pointer.id = 'checklistPointer';
          pointer.style.cssText = `position:fixed;z-index:100000;left:50%;transform:translateX(-50%);top:${rect.bottom + 12}px;max-width:240px;width:calc(100% - 40px);`;

function getCrmAuthToken() {
  const t = String(token || localStorage.getItem('crmToken') || '').trim();
  if (t) token = t;
  return t;
}

async function postRoomImageUpload(roomId, file) {
  const authToken = getCrmAuthToken();
  if (!authToken) throw new Error('Not logged in');
  const optimized = await optimizeRoomPhotoForUpload(file);
  const uploadForm = new FormData();
  uploadForm.append('image', optimized, optimized.name || 'room.webp');
  const qs = new URLSearchParams();
  if (activeHotelId) qs.set('hotelId', activeHotelId);
  qs.set('token', authToken);
  const res = await fetch(`/api/crm/rooms/${roomId}/images?${qs}`, {
    method: 'POST',
    headers: { 'x-crm-token': authToken },
    body: uploadForm,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || !data.success) {
    throw new Error(data.message || data.error || `Upload failed (${res.status})`);
  }
  return data;
}

async function settingsUploadPhoto(event, roomId) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    await postRoomImageUpload(roomId, file);
    toast('Photo uploaded!', 'success');
    loadSettings();
  } catch (e) {
    toast(e.message || 'Upload failed', 'error');
  }
}

async function settingsChangePin() {

async function settingsSendSupport() {

// Single rule: when a checklist action completes, advance the tour past that step
function advanceTourIfNeeded() {
  if (localStorage.getItem('settingsTourDone')) return;
  const step = parseInt(localStorage.getItem('settingsTourStep') || '0');
  const hasPhoto = editRooms.some(r => r.images && r.images.length > 0);
  const hasRates = !!localStorage.getItem('ratesChanged');
  const hasLink = !!localStorage.getItem('linkCopied');

  // Steps: 0=header info, 1=photo, 2=rates, 3=copy link
  if (step === 1 && hasPhoto) localStorage.setItem('settingsTourStep', '2');
  if (step === 2 && hasRates) localStorage.setItem('settingsTourStep', '3');
  if (step === 3 && hasLink) localStorage.setItem('settingsTourStep', '4');

  // Remove active tour tooltip and overlay if stale
  const tooltip = document.getElementById('tourTooltip');
  if (tooltip) tooltip.remove();
  const overlay = document.getElementById('tourBlurOverlay');
  if (overlay) overlay.remove();
  document.querySelectorAll('[data-tour-highlighted]').forEach(el => {
    el.style.position = el.dataset.tourOrigPosition || '';
    el.style.zIndex = '';
    el.style.isolation = '';
    el.style.boxShadow = '';
    el.removeAttribute('data-tour-highlighted');
    delete el.dataset.tourOrigPosition;
  });
  document.body.style.overflow = '';
}

function startPostActivationTabTour() {
  if (localStorage.getItem('postActivationTourDone')) {
    finishPostActivationTour();
    return;
  }
  cleanupPostActivationTourUi();

  const steps = [
    {
      tab: 'bookings',
      navFilter: 'bookings',
      text: '<strong>Bookings</strong> — live reservations land here. You\'ll get a push alert for each new one.',
    },
    {
      tab: 'apps',
      navFilter: 'apps',
      text: '<strong>Phones</strong> — put your guest booking app on their home screen and send install reminders.',
    },
  ];

  let stepIdx = 0;

  function showStep() {
    cleanupPostActivationTourUi();
    if (stepIdx >= steps.length) {
      finishPostActivationTour();
      return;
    }

    const s = steps[stepIdx];
    const tabBtn = document.querySelector(`.tab[data-nav-filter="${s.navFilter}"]`)
      || document.querySelector(`.mobile-nav-item[data-nav-filter="${s.navFilter}"]`);
    if (tabBtn) setFilter(s.tab, tabBtn);

    overlay.id = 'postActivationTourOverlay';

    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';

    setTimeout(() => {
      const target = document.querySelector(`.tab[data-nav-filter="${s.navFilter}"]`)
        || document.querySelector(`.mobile-nav-item[data-nav-filter="${s.navFilter}"]`);
      if (target) {
        target.setAttribute('data-post-activation-highlight', '1');
        target.style.position = 'relative';
        target.style.zIndex = '100003';
        target.style.boxShadow = '0 0 0 3px #fff, 0 0 0 6px #2E7D5B';
        target.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }

      const rect = target ? target.getBoundingClientRect() : { left: 24, bottom: 80, width: 200 };
      const tooltip = document.createElement('div');
      tooltip.id = 'postActivationTourTooltip';
      const tooltipW = Math.min(300, window.innerWidth - 32);
      const left = Math.max(16, Math.min(rect.left + rect.width / 2 - tooltipW / 2, window.innerWidth - tooltipW - 16));
      const top = Math.min(rect.bottom + 14, window.innerHeight - 180);
      tooltip.style.cssText = `position:fixed;z-index:100004;left:${left}px;top:${top}px;max-width:${tooltipW}px;width:${tooltipW}px;`;
      const isLast = stepIdx >= steps.length - 1;
      tooltip.innerHTML = `
        <div style="background:#1a1a2e;border-radius:12px;padding:16px 18px;color:#fff;font-size:13px;line-height:1.55;box-shadow:0 8px 32px rgba(0,0,0,0.35);">

        </div>`;
      document.body.appendChild(tooltip);

      document.getElementById('postActivationTourNext').onclick = () => {
        stepIdx += 1;
        showStep();
      };
      document.getElementById('postActivationTourSkip').onclick = () => {
        finishPostActivationTour();
      };
    }, s.tab === 'apps' ? 80 : 0);
  }

  showStep();
}

function maybePromptInstalledNotifications() {
  try {

function ensureTourBlurOverlay() {

function cleanupSettingsTourUi() {
  const prev = document.getElementById('tourTooltip');
  if (prev) prev.remove();
  const prevOverlay = document.getElementById('tourBlurOverlay');
  if (prevOverlay) prevOverlay.remove();
  document.querySelectorAll('[data-tour-highlighted]').forEach(el => {
    el.style.position = el.dataset.tourOrigPosition || '';
    el.style.zIndex = '';
    el.style.isolation = '';
    el.style.boxShadow = '';
    el.removeAttribute('data-tour-highlighted');
    delete el.dataset.tourOrigPosition;
  });
  const goLiveBanner = document.getElementById('goLiveBanner');
  if (goLiveBanner && goLiveBanner.dataset.tourHidden) {
    delete goLiveBanner.dataset.tourHidden;
    if (typeof updateGoLiveBanner === 'function') updateGoLiveBanner();
  }
  document.body.style.overflow = '';
}

function openTourAccordion(el, stepDef) {
  if (!stepDef.openAccordion) return;
  const card = stepDef.accordionCard
    ? document.querySelector(stepDef.accordionCard)
    : (el && el.closest ? el.closest('.booking-card') : null);
  if (!card) return;
  const acc = card.querySelector('.accordion-body');
  if (!acc) return;
  const hidden = acc.style.display === 'none' || getComputedStyle(acc).display === 'none';
  if (hidden) {
    acc.style.display = 'block';
    const arrow = card.querySelector('.accordion-arrow');
    if (arrow) arrow.style.transform = 'rotate(90deg)';
  }
}

function queryTourSelector(selectorList) {
  if (!selectorList) return null;
  for (const sel of String(selectorList).split(',').map(t => t.trim()).filter(Boolean)) {
    const el = document.querySelector(sel);
    if (el && el.isConnected) return el;
  }
  return null;
}

function resolveTourHighlightEl(el, stepDef) {
  if (stepDef.highlightSelector) {
    const highlighted = queryTourSelector(stepDef.highlightSelector);
    if (highlighted) return highlighted;
  }
  if (stepDef.highlightCard) {
    const card = stepDef.accordionCard
      ? document.querySelector(stepDef.accordionCard)
      : (el && el.closest ? el.closest('.booking-card') : null);
    if (card) return card;
  }
  if (stepDef.targetParent) {
    return el.closest('.booking-card') || el.closest('.accordion-body') || el;
  }
  return el;
}

function resolveLiveTourElement(el, stepDef) {
  if (!stepDef) return el;
  const selectors = String(stepDef.target || '').split(',').map(t => t.trim()).filter(Boolean);
  for (const sel of selectors) {
    const candidate = document.querySelector(sel);
    if (candidate && candidate.isConnected) return candidate;
  }
  if (stepDef.accordionCard) {
    const card = document.querySelector(stepDef.accordionCard);
    if (card && card.isConnected) return card;
  }
  return el && el.isConnected ? el : null;
}

function tourElementRect(el, allowPartial) {
  if (!el || !el.isConnected) return null;
  const rect = el.getBoundingClientRect();
  if (rect.width < 2 || rect.height < 2) return null;
  if (!allowPartial && (rect.bottom < 8 || rect.top > window.innerHeight - 8)) return null;
  return rect;
}

function tourAnchorRect(stepDef, highlightEl) {
  const anchor = queryTourSelector(stepDef.anchorSelector);
  if (anchor) {
    const r = tourElementRect(anchor, true);
    if (r) return r;
  }
  return tourElementRect(highlightEl, true);
}

function scrollTourTargetIntoView(el, stepDef) {
  const scrollSel = stepDef.scrollTarget || stepDef.accordionCard;
  const target = (scrollSel ? queryTourSelector(scrollSel) : null) || el;
  if (!target && !stepDef.scrollToTop) return Promise.resolve();

  const block = stepDef.scrollBlock || 'center';
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const behavior = (settingsTourActive || prefersReducedMotion) ? 'auto' : 'smooth';

  return new Promise((resolve) => {
    const applyPadding = () => {
      const padTop = stepDef.scrollPadTop ?? 80;
      const padBottom = stepDef.scrollPadBottom ?? 130;
      const measure = queryTourSelector(stepDef.anchorSelector)
        || (target && target.isConnected ? target : null)
        || (el && el.isConnected ? el : null);
      if (!measure) {
        resolve();
        return;
      }
      const rect = measure.getBoundingClientRect();
      if (rect.top < padTop) window.scrollBy({ top: rect.top - padTop, left: 0, behavior: 'auto' });
      if (rect.bottom > window.innerHeight - padBottom) {
        window.scrollBy({ top: rect.bottom - window.innerHeight + padBottom, left: 0, behavior: 'auto' });
      }
      requestAnimationFrame(() => requestAnimationFrame(resolve));
    };

    const scrollTargetIntoPlace = () => {
      if (target) target.scrollIntoView({ behavior: stepDef.scrollToTop ? 'auto' : behavior, block, inline: 'nearest' });
      applyPadding();
    };

    if (stepDef.scrollToTop) {
      window.scrollTo({ top: 0, left: 0, behavior });
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      if (stepDef.scrollToTopOnly) {
        requestAnimationFrame(() => requestAnimationFrame(resolve));
        return;
      }
      if (behavior === 'auto') {
        scrollTargetIntoPlace();
        return;
      }
      let settled = false;
      const finish = () => {
        if (settled) return;
        settled = true;
        window.removeEventListener('scrollend', onScrollEnd);
        clearTimeout(fallbackTimer);
        scrollTargetIntoPlace();
      };
      const onScrollEnd = () => finish();
      if ('onscrollend' in window) window.addEventListener('scrollend', onScrollEnd, { once: true });
      const fallbackTimer = setTimeout(finish, 520);
      return;
    }

    if (!target) {
      resolve();
      return;
    }

    target.scrollIntoView({ behavior, block, inline: 'nearest' });

    if (behavior === 'auto') {
      applyPadding();
      return;
    }

    let settled = false;
    const finish = () => {
      if (settled) return;
      settled = true;
      window.removeEventListener('scrollend', onScrollEnd);
      clearTimeout(fallbackTimer);
      applyPadding();
    };
    const onScrollEnd = () => finish();
    if ('onscrollend' in window) window.addEventListener('scrollend', onScrollEnd, { once: true });
    const fallbackTimer = setTimeout(finish, 620);
  });
}

function startSettingsTour() {
  // Only show once
  if (localStorage.getItem('settingsTourDone')) return;

  if (localStorage.getItem('settingsTourStep') === 'handoff') {
    localStorage.removeItem('settingsTourStep');
    showFinaleMockModal();
    return;
  }

  settingsTourActive = true;
  updateGoLiveBanner();
  seedTourRevenueShell();

  const settingsTab = document.querySelector('.tab[data-nav-filter="settings"]')
    || document.querySelector('.mobile-nav-item[data-nav-filter="settings"]');
  if (settingsTab) setFilter('settings', settingsTab);

  function kickEditPageLoadIfNeeded() {
    const ready = (typeof window.isEditPageDomReady === 'function' && window.isEditPageDomReady())
      || (typeof isEditPageDomReady === 'function' && isEditPageDomReady());
    if (ready) return;
    const needs = (typeof window.needsEditPageLoad === 'function' && window.needsEditPageLoad())
      || (typeof needsEditPageLoad === 'function' && needsEditPageLoad());
    if (!needs && !editRoomsLoadPromise) return;
    const invoke = (typeof window.invokeLoadEditRooms === 'function')
      ? window.invokeLoadEditRooms
      : (typeof invokeLoadEditRooms === 'function' ? invokeLoadEditRooms : null);
    if (invoke) void invoke();
  }
  kickEditPageLoadIfNeeded();

  const steps = [
    {
      target: '',
      text: '',
      openAccordion: false,
      tab: 'settings',
      customModal: 'homescreen'
    },
    {
      target: '#edit-hotel-phone',
      text: 'Tap any field here to edit your hotel info — name, address, phone.',
      openAccordion: false,
      tab: 'settings'
    },
    {
      target: '#editRoomsCards .booking-card > div:first-child',
      text: 'Add a photo of your room — guests book more when they see one.',
      openAccordion: false,
      tab: 'settings'
    },
    {
      target: '#tour-rates-card',
      highlightSelector: '#tour-rates-card',
      anchorSelector: '#tour-rates-header',
      scrollTarget: '#tour-rates-card',
      text: 'You can change your rates here — nightly, weekly, and monthly.',
      openAccordion: true,
      accordionCard: '#tour-rates-card',
      tab: 'settings',
      scrollBlock: 'center',
      scrollPadBottom: 280,
      tooltipAnchor: 'card-bottom'
    },
    {
      target: '#tour-copy-link-btn',
      text: 'This is your booking URL — the link guests use to book with you directly.',
      openAccordion: false,
      tab: 'settings',
      tooltipPosition: 'below'
    },
    {
      target: '#tour-preview-btn',
      text: 'Preview your booking engine to see exactly what your guests see.',
      openAccordion: false,
      tab: 'settings',
      tooltipPosition: 'below',
      scrollToTop: true,
      scrollToTopOnly: true
    },
    {
      target: '#tour-pin-card',
      highlightSelector: '#tour-pin-card',
      anchorSelector: '#tour-pin-header',
      scrollTarget: '#tour-pin-card',
      text: 'This is your login PIN — you\'ll need it to access this dashboard next time. You can change it here anytime.',
      openAccordion: true,
      accordionCard: '#tour-pin-card',
      tab: 'settings',
      tooltipAnchor: 'card-top',
      scrollBlock: 'center',
      scrollPadBottom: 200
    },
    {
      target: '#bookingsList',
      text: '',
      openAccordion: false,
      tab: 'bookings',
      customModal: true
    },
    {
      target: '#availabilityCalendarWrap',
      text: '',
      openAccordion: false,
      tab: 'availability',
      customModal: 'availability'
    },
    {
      target: '.revenue-savings-pill',
      text: 'See how much revenue your booking page generates and how much you\'re saving vs OTA commissions.',
      openAccordion: false,
      tab: 'revenue',
      waitForVisible: true
    },
    {
      target: '#paymentsExplainer',
      text: 'When guests book through your engine, their card is verified but never charged. This prevents no-shows — and you collect payment however you want when they physically check in.',
      openAccordion: false,
      tab: 'revenue',
      waitForVisible: true,
      tooltipPosition: 'above'
    },
    {
      target: '#tour-fd-install-btn, #tour-fd-installed-badge',
      text: 'No download — it lives on your home screen like any other app. Takes about 3 seconds. You\'ll get a buzz when guests book.',
      openAccordion: false,
      tab: 'apps',
      waitForVisible: true,
      tooltipPosition: 'below',
      scrollBlock: 'nearest'
    },
    {
      target: '#tour-guest-icon-btn',
      anchorSelector: '#tour-guest-icon-btn',
      scrollTarget: '#tour-guest-icon-section, #tour-fd-install-card',
      text: 'Guests can save your direct booking page to their home screen too — upload your logo so it stands out when they do.',
      openAccordion: false,
      tab: 'apps',
      waitForVisible: true,
      noHighlight: true,
      freezeTooltip: true,
      tooltipPosition: 'below',
      scrollBlock: 'center',
      scrollPadBottom: 260,
      scrollPadTop: 88
    }
  ];

  let step = parseInt(localStorage.getItem('settingsTourStep') || '0', 10);
  if (!Number.isFinite(step) || step < 0 || step >= steps.length) {
    step = 0;
    localStorage.removeItem('settingsTourStep');
  }

  function cleanupTour() {
    cleanupSettingsTourUi();
  }

  function skipToFinale() {
    cleanupTour();
    localStorage.removeItem('settingsTourStep');
    showFinaleMockModal();
  }

  function scheduleTourStepContent(stepDef) {
    if (stepDef.customModal) {
      showStepContent(stepDef);
      return;
    }
    requestAnimationFrame(() => showStepContent(stepDef));
  }

  function showStep() {
    cleanupTour();

    if (step >= steps.length) {
      localStorage.removeItem('settingsTourStep');
      showFinaleMockModal();
      return;
    }

    const s = steps[step];

    // Skip revenue steps if revenue isn't enabled for this hotel
    if (s.tab === 'revenue' && !revenueEnabled) {
      step++;
      localStorage.setItem('settingsTourStep', String(step));
      showStep();
      return;
    }

    // Dim immediately on highlight steps so there is no blank gap after modal transitions.
    if (!s.customModal) ensureTourBlurOverlay();

    // Switch tab if this step requires a different tab
    if (s.tab && s.tab !== currentFilter) {
      const tabBtn = document.querySelector(`.tab[data-nav-filter="${s.tab}"]`) || document.querySelector(`.mobile-nav-item[data-nav-filter="${s.tab}"]`);
      if (tabBtn) setFilter(s.tab, tabBtn);
      if (s.tab === 'apps') {
        const renderApps = (typeof ensureAppsViewRendered === 'function')
          ? ensureAppsViewRendered
          : window.ensureAppsViewRendered;
        if (typeof renderApps === 'function') renderApps(true);
      }
      scheduleTourStepContent(s);
      return;
    }
    scheduleTourStepContent(s);
  }

  function showStepContent(s) {
    // Home-screen install pitch — shown first so they immediately get the value
    if (s.customModal === 'homescreen') {
      showHomescreenMockModal();
      return;
    }
    // Custom modal for bookings tab — show a mock booking card example
    if (s.customModal === true || s.customModal === 'bookings') {
      showBookingsMockModal();
      return;
    }
    // Custom modal for availability tab — multi-page walkthrough
    if (s.customModal === 'availability') {
      showAvailabilityMockModal();
      return;
    }
    if (s.customModal === 'finale') {
      showFinaleMockModal();
      return;
    }

    // If step needs to wait for element to become visible (e.g. async-loaded content)
    if (s.waitForVisible) {
      const targets = s.target.split(',').map(t => t.trim());
      let attempts = 0;
      const maxAttempts = 30;
      ensureTourBlurOverlay();
      const pollMs = settingsTourActive ? 60 : 200;
      const pollForVisible = () => {
        attempts++;
        if (s.tab === 'apps') {
          const renderApps = (typeof ensureAppsViewRendered === 'function')
            ? ensureAppsViewRendered
            : window.ensureAppsViewRendered;
          if (typeof renderApps === 'function') renderApps(true);
        }
        let el = null;
        for (const t of targets) {
          el = document.querySelector(t);
          if (el) break;
        }
        if (el) {
          if (s.openAccordion) openTourAccordion(el, s);
          if (s.openAccordion || el.offsetParent !== null) {
            showStepForElement(el, s);
            return;
          }
        }
        if (attempts < maxAttempts) {
          setTimeout(pollForVisible, pollMs);
        } else {
          // Give up, skip this step
          step++;
          localStorage.setItem('settingsTourStep', String(step));
          showStep();
        }
      };
      pollForVisible();
      return;
    }

    function findTourTarget(stepDef) {
      const targets = stepDef.target.split(',').map(t => t.trim());
      for (const t of targets) {
        const candidate = document.querySelector(t);
        if (!candidate) continue;
        if (!stepDef.openAccordion && candidate.offsetParent === null && getComputedStyle(candidate).position !== 'fixed') {
          continue;
        }
        return candidate;
      }
      if (stepDef.accordionCard) {
        const card = document.querySelector(stepDef.accordionCard);
        if (card) return card;
      }
      return null;
    }

    function resolveTourTarget(stepDef, onFound) {
      const found = findTourTarget(stepDef);
      if (found) {
        onFound(found);
        return;
      }
      const needsEditPage = stepDef.tab === 'settings' && !stepDef.customModal && stepDef.target;
      const needsAppsPage = stepDef.tab === 'apps' && !stepDef.customModal && stepDef.target;
      if (!needsEditPage && !needsAppsPage) {
        step++;
        localStorage.setItem('settingsTourStep', String(step));
        showStep();
        return;
      }
      ensureTourBlurOverlay();
      let attempts = 0;
      if (needsEditPage) kickEditPageLoadIfNeeded();
      if (needsAppsPage) {
        const renderApps = (typeof ensureAppsViewRendered === 'function')
          ? ensureAppsViewRendered
          : window.ensureAppsViewRendered;
        if (typeof renderApps === 'function') renderApps(true);
      }
      const pollMs = settingsTourActive ? 60 : 250;
      const pollForTarget = () => {
        attempts++;
        if (needsAppsPage) {
          const renderApps = (typeof ensureAppsViewRendered === 'function')
            ? ensureAppsViewRendered
            : window.ensureAppsViewRendered;
          if (typeof renderApps === 'function') renderApps(true);
        }
        const el = findTourTarget(stepDef);
        if (el) {
          onFound(el);
          return;
        }
        kickEditPageLoadIfNeeded();
        if (needsAppsPage) {
          const renderApps = (typeof ensureAppsViewRendered === 'function')
            ? ensureAppsViewRendered
            : window.ensureAppsViewRendered;
          if (typeof renderApps === 'function') renderApps(true);
        }
        if (attempts < 48) {
          setTimeout(pollForTarget, pollMs);
        } else {
          step++;
          localStorage.setItem('settingsTourStep', String(step));
          showStep();
        }
      };
      pollForTarget();
    }

    resolveTourTarget(s, (el) => showStepForElement(el, s));
  }

  function showStepForElement(el, s) {
    openTourAccordion(el, s);
    el = resolveTourHighlightEl(el, s);
    if (!el || !el.isConnected) {
      el = resolveLiveTourElement(el, s);
      if (el) el = resolveTourHighlightEl(el, s);
    }
    if (!el) {
      step++;
      localStorage.setItem('settingsTourStep', String(step));
      showStep();
      return;
    }

    const goLiveBanner = document.getElementById('goLiveBanner');
    if (goLiveBanner && s.tab === 'settings') {
      goLiveBanner.dataset.tourHidden = '1';
      goLiveBanner.style.display = 'none';
    }

    const highlightEl = el;
    ensureTourBlurOverlay();
    void scrollTourTargetIntoView(highlightEl, s).then(() => {
      if (!highlightEl.isConnected) {
        step++;
        localStorage.setItem('settingsTourStep', String(step));
        showStep();
        return;
      }
      openTourAccordion(highlightEl, s);

      if (!s.noHighlight) {
        if (!highlightEl.dataset.tourOrigPosition) highlightEl.dataset.tourOrigPosition = highlightEl.style.position || '';
        highlightEl.style.position = highlightEl.style.position || 'relative';
        highlightEl.style.zIndex = '99999';
        highlightEl.style.isolation = 'isolate';
        highlightEl.style.boxShadow = '0 0 0 4px #2E7D5B, 0 0 20px rgba(46,125,91,0.3)';
        highlightEl.setAttribute('data-tour-highlighted', '1');
      }

      const placeTooltip = () => {
        const anchor = queryTourSelector(s.anchorSelector);
        const tipTarget = anchor || highlightEl;
        if (s.freezeTooltip) {
          const rect = tipTarget && tipTarget.isConnected ? tipTarget.getBoundingClientRect() : null;
          positionTooltip(tipTarget, s, rect && rect.width >= 2 ? rect : null);
          return;
        }
        const liveEl = resolveLiveTourElement(highlightEl, s);
        let tipEl = liveEl ? resolveTourHighlightEl(liveEl, s) : highlightEl;
        openTourAccordion(tipEl, s);
        const rect = s.tooltipAnchor ? null : tourAnchorRect(s, tipEl);
        positionTooltip(tipEl || highlightEl, s, rect);
      };

      if (s.freezeTooltip) {
        requestAnimationFrame(() => requestAnimationFrame(placeTooltip));
        return;
      }

      const positionAfterLayout = (attempt = 0) => {
        requestAnimationFrame(() => {
          if (s.tooltipAnchor) {
            placeTooltip();
            return;
          }
          const liveEl = resolveLiveTourElement(highlightEl, s);
          let tipEl = liveEl ? resolveTourHighlightEl(liveEl, s) : highlightEl;
          openTourAccordion(tipEl, s);
          const rect = tourAnchorRect(s, tipEl);
          if (!rect && attempt < 4) {
            requestAnimationFrame(() => positionAfterLayout(attempt + 1));
            return;
          }
          positionTooltip(tipEl || highlightEl, s, rect);
        });
      };
      positionAfterLayout(0);
    });
  }

  function positionTooltip(el, s, measuredRect) {
    const prev = document.getElementById('tourTooltip');
    if (prev) prev.remove();

    const tooltip = document.createElement('div');
    tooltip.id = 'tourTooltip';

    const skipHtml = `<div style="margin-top:8px;"><button id="tourSkipBtn" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:11px;font-family:inherit;cursor:pointer;padding:4px 8px;">Skip tour</button></div>`;
    const nextLabel = step < steps.length - 1 ? 'Next \u2192' : 'Got it!';
    const bodyHtml = `
      <div style="background:#1a1a2e;border-radius:10px;padding:14px 18px;color:white;font-size:13px;line-height:1.5;font-weight:500;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.25);">
        <p style="margin:0 0 12px;">${s.text}</p>
        <button id="tourNextBtn" style="padding:8px 20px;border-radius:6px;border:none;background:#2E7D5B;color:white;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">${nextLabel}</button>
        ${skipHtml}
      </div>`;

    if (s.tooltipAnchor === 'card-bottom' || s.tooltipAnchor === 'card-top') {
      const card = queryTourSelector(s.highlightSelector) || el;
      const header = queryTourSelector(s.anchorSelector);
      if (card) {
        const cardRect = card.getBoundingClientRect();
        const headerRect = header ? header.getBoundingClientRect() : null;
        const tooltipMaxWidth = Math.min(280, window.innerWidth - 32);
        const pointerX = cardRect.left + cardRect.width / 2;
        const tooltipLeft = Math.max(16, Math.min(pointerX - tooltipMaxWidth / 2, window.innerWidth - tooltipMaxWidth - 16));
        const arrowLeft = Math.max(20, Math.min(pointerX - tooltipLeft, tooltipMaxWidth - 20));
        const estTipHeight = 132;

        if (s.tooltipAnchor === 'card-bottom') {
          const spaceBelow = window.innerHeight - cardRect.bottom;
          const tooltipTop = Math.min(cardRect.bottom + 12, window.innerHeight - estTipHeight - 16);
          if (spaceBelow >= estTipHeight + 20) {
            tooltip.style.cssText = `position:fixed;z-index:100000;left:${tooltipLeft}px;top:${tooltipTop}px;max-width:${tooltipMaxWidth}px;width:${tooltipMaxWidth}px;`;
            tooltip.innerHTML = `
              <div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid #1a1a2e;margin-left:${arrowLeft - 8}px;"></div>
              ${bodyHtml}`;
          } else {
            const attachY = headerRect ? headerRect.top : cardRect.top;
            tooltip.style.cssText = `position:fixed;z-index:100000;left:${tooltipLeft}px;bottom:${window.innerHeight - attachY + 10}px;max-width:${tooltipMaxWidth}px;width:${tooltipMaxWidth}px;`;
            tooltip.innerHTML = `
              ${bodyHtml}
              <div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #1a1a2e;margin-left:${arrowLeft - 8}px;"></div>`;
          }
        } else {
          const attachY = cardRect.top;
          const spaceAbove = cardRect.top - 16;
          if (spaceAbove >= estTipHeight + 24) {
            tooltip.style.cssText = `position:fixed;z-index:100000;left:${tooltipLeft}px;bottom:${window.innerHeight - attachY + 10}px;max-width:${tooltipMaxWidth}px;width:${tooltipMaxWidth}px;`;
            tooltip.innerHTML = `
              ${bodyHtml}
              <div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #1a1a2e;margin-left:${arrowLeft - 8}px;"></div>`;
          } else {
            const tooltipTop = Math.min(cardRect.top + (headerRect ? headerRect.height : 48) + 12, window.innerHeight - estTipHeight - 16);
            tooltip.style.cssText = `position:fixed;z-index:100000;left:${tooltipLeft}px;top:${tooltipTop}px;max-width:${tooltipMaxWidth}px;width:${tooltipMaxWidth}px;`;
            tooltip.innerHTML = `
              <div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid #1a1a2e;margin-left:${arrowLeft - 8}px;"></div>
              ${bodyHtml}`;
          }
        }
        document.body.appendChild(tooltip);
        wireTourTooltipButtons();
        return;
      }
    }

    const rect = measuredRect || tourAnchorRect(s, el);

    if (!rect) {
      tooltip.style.cssText = 'position:fixed;z-index:100000;left:50%;top:50%;transform:translate(-50%,-50%);max-width:280px;width:calc(100% - 32px);';
      tooltip.innerHTML = bodyHtml;
      document.body.appendChild(tooltip);
      wireTourTooltipButtons();
      return;
    }

    const spaceBelow = window.innerHeight - rect.bottom;
    const spaceAbove = rect.top;
    const tooltipMaxWidth = Math.min(280, window.innerWidth - 32);
    const elCenterX = rect.left + rect.width / 2;
    const tooltipLeft = Math.max(16, Math.min(elCenterX - tooltipMaxWidth / 2, window.innerWidth - tooltipMaxWidth - 16));
    const arrowLeft = Math.max(20, Math.min(elCenterX - tooltipLeft, tooltipMaxWidth - 20));

    let position = s.tooltipPosition || (spaceBelow > 150 ? 'below' : spaceAbove > 150 ? 'above' : 'center');
    if (position === 'below' && spaceBelow < 130 && spaceAbove > spaceBelow) position = 'above';
    if (position === 'above' && spaceAbove < 130 && spaceBelow > spaceAbove) position = 'below';
    if (position === 'below' && rect.bottom + 150 > window.innerHeight) position = 'above';

    if (position === 'below') {
      const top = Math.min(rect.bottom + 8, window.innerHeight - 24);
      tooltip.style.cssText = `position:fixed;z-index:100000;left:${tooltipLeft}px;top:${top}px;max-width:${tooltipMaxWidth}px;width:${tooltipMaxWidth}px;`;
      tooltip.innerHTML = `
        <div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:8px solid #1a1a2e;margin-left:${arrowLeft - 8}px;"></div>

    } else if (position === 'above') {
      tooltip.style.cssText = `position:fixed;z-index:100000;left:${tooltipLeft}px;bottom:${Math.max(16, window.innerHeight - rect.top + 8)}px;max-width:${tooltipMaxWidth}px;width:${tooltipMaxWidth}px;`;

      tooltip.style.cssText = 'position:fixed;z-index:100000;left:50%;top:50%;transform:translate(-50%,-50%);max-width:280px;width:calc(100% - 32px);';

    document.body.appendChild(modal);

    // Add slide-up animation
    if (!document.getElementById('tourModalAnimStyle')) {
      const animStyle = document.createElement('style');
      animStyle.id = 'tourModalAnimStyle';
      animStyle.textContent = '@keyframes tourModalSlideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}';
      document.head.appendChild(animStyle);
    }

    document.getElementById('tourNextBtn').onclick = () => {
      cleanupTour();
      step++;
      localStorage.setItem('settingsTourStep', String(step));
      showStep();
    };

    document.getElementById('tourSkipBtn').onclick = () => {
      skipToFinale();
    };
  }

  showStep();
}

function confirmAmenityPicker() {
  const room = editRooms.find(r => r.id === amenityPickerRoomId);
  if (!room) { closeAmenityPicker(); return; }

  const grid = document.getElementById('amenityPickerGrid');
  const selected = [];
  grid.querySelectorAll('button').forEach(btn => {

      const preset = AMENITY_PRESETS.find(p => p.key === btn.dataset.key);
      if (preset) selected.push(preset.label);

  room.amenities = selected.join(' • ');
  closeAmenityPicker();
  renderEditRooms();
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

// Center-crop any uploaded image to a perfect square PNG before sending it up.
// Home-screen icons are ALWAYS square tiles — if the source is a portrait/landscape
// photo the OS stretches it (the "vertically squished" look). Cropping to square
// here means the file itself is square, so it renders correctly everywhere.
function squareCropImage(file, size = 512) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const side = Math.min(img.naturalWidth, img.naturalHeight);
        const sx = (img.naturalWidth - side) / 2;
        const sy = (img.naturalHeight - side) / 2;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
        URL.revokeObjectURL(url);
        canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error('crop failed')), 'image/png', 0.92);
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('load failed')); };
    img.src = url;
  });
}

async function uploadAppIcon(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  setAppIconPreviewLoading();
  const uploadForm = new FormData();
  try {
    const squared = await squareCropImage(file, 512);
    uploadForm.append('icon', squared, 'app-icon.png');
  } catch (_) {
    uploadForm.append('icon', file); // fall back to raw upload if canvas fails
  }
  try {
    const authToken = getCrmAuthToken();
    const qs = new URLSearchParams();
    if (activeHotelId) qs.set('hotelId', activeHotelId);
    if (authToken) qs.set('token', authToken);
    const res = await fetch(`/api/crm/hotel-app-icon?${qs}`, {
      method: 'POST',
      headers: { 'x-crm-token': authToken },
      body: uploadForm,
    });
    const data = await res.json();
    if (data.success && data.appIconUrl) {
      activeHotelAppIcon = data.appIconUrl;
      setAppIconPreviewImage(data.appIconUrl);
      const appsEl = document.getElementById('appsView');
      if (appsEl) {
        appsEl.dataset.appsKey = (activeHotelId || '') + '|' + data.appIconUrl + '|' + (activeHotelDomain || '');
      }
      if (typeof updateFrontdeskManifestLink === 'function') updateFrontdeskManifestLink();
      toast('Logo updated! Guests will see it on their phone.', 'success');
    } else {
      toast(data.message || 'Failed to upload icon', 'error');
      restoreAppIconPreview();
    }
  } catch (e) {
    toast('Failed to upload icon', 'error');
    restoreAppIconPreview();
  }
  input.value = '';
}

function appsCloudinaryImg(url, width) {

function appsPhoneImgStyle(extra) {

// Full-res for lightbox (device pixel aware, max 1600px)
function appsCloudinaryFull(url) {

  return url.replace('/image/upload/', `/image/upload/f_auto,q_auto:best,w_${w}/`);
}

  _appsLbIdx   = startIdx || 0;
  let lb = document.getElementById('appsLightbox');
  if (!lb) {
    lb = document.createElement('div');
    lb.id = 'appsLightbox';
    lb.style.cssText = [
      'position:fixed;inset:0;z-index:102000;background:#000;',
      'display:flex;flex-direction:column;align-items:center;justify-content:flex-start;',
      'overscroll-behavior:contain;touch-action:pan-y;',
      'padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);',
    ].join('');
    document.body.appendChild(lb);
    document.body.style.overflow = 'hidden';
    // Keyboard
    lb._keyHandler = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') appsLbNav(1);
      else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') appsLbNav(-1);
      else if (e.key === 'Escape') appsCloseLightbox();
    };
    document.addEventListener('keydown', lb._keyHandler);
    // Swipe support
    let touchStartX = 0;
    lb.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
    lb.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) appsLbNav(dx < 0 ? 1 : -1);
    }, { passive: true });
  }
  document.body.style.overflow = 'hidden';
  appsLbRender();
}

function appsCloseLightbox() {
  const lb = document.getElementById('appsLightbox');
  if (!lb) return;
  document.removeEventListener('keydown', lb._keyHandler);
  lb.remove();
  document.body.style.overflow = '';
}

function appsLbNav(dir) {
  const total = _appsLbItems.length;
  if (total <= 1) return;
  _appsLbIdx = (_appsLbIdx + dir + total) % total;
  appsLbRender();
}

function appsLbRender() {
  const lb = document.getElementById('appsLightbox');
  if (!lb) return;
  const item    = _appsLbItems[_appsLbIdx];
  const total   = _appsLbItems.length;
  const isImg   = item.type !== 'video';
  const counter = total > 1 ? `${_appsLbIdx + 1} / ${total}` : '';

  const mediaHtml = isImg
    ? `<img src="${appsCloudinaryFull(item.src)}" alt="${item.alt || ''}"
          style="max-width:100%;max-height:calc(100dvh - 160px);width:auto;height:auto;display:block;object-fit:contain;${appsPhoneImgStyle()}"
          loading="eager" decoding="async">`
    : `<video autoplay loop muted playsinline webkit-playsinline
          style="max-width:100%;max-height:calc(100dvh - 160px);width:auto;height:auto;display:block;${appsPhoneImgStyle()}"
          ${item.poster ? `poster="${appsCloudinaryImg(item.poster, 400)}"` : ''}>
          <source src="${item.src}" type="video/mp4">
       </video>`;

  const prevBtn = total > 1
    ? `<button onclick="appsLbNav(-1)" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);">‹</button>` : '';
  const nextBtn = total > 1
    ? `<button onclick="appsLbNav(1)"  style="position:absolute;right:12px;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);">›</button>` : '';

  const dotNav = total > 1 ? `<div style="display:flex;gap:7px;justify-content:center;margin-top:12px;">
    ${Array.from({length: total}, (_, i) =>
      `<div onclick="appsOpenLightbox(_appsLbItems,${i})" style="width:7px;height:7px;border-radius:50%;background:${i===_appsLbIdx ? '#fff' : 'rgba(255,255,255,0.35)'};cursor:pointer;transition:background 0.2s;"></div>`
    ).join('')}
  </div>` : '';

  lb.innerHTML = `
    <div style="position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:max(12px,env(safe-area-inset-top)) 16px 12px;z-index:2;">

      <button onclick="appsCloseLightbox()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);">✕</button>
    </div>
    <div style="position:relative;width:100%;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:52px 16px 8px;box-sizing:border-box;">
      ${mediaHtml}
      ${prevBtn}${nextBtn}

      ${item.caption ? `<div style="font-size:12px;color:rgba(255,255,255,0.65);line-height:1.55;margin-bottom:10px;">${item.caption}</div>` : ''}

function detectAppPlatform() {
  const ua = navigator.userAgent || '';
  if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
  if (/android/i.test(ua)) return 'android';
  return 'ios';

async function loadGuestInstallStats() {
  const el = document.getElementById('guestInstallStats');
  try {
    const data = await api('GET', '/api/crm/guest-install-stats');
    if (!data.success) throw new Error(data.message || 'Failed');
    guestPushSubscriberCount = data.guestPushSubscribers ?? 0;
    applyGuestBroadcastAudienceUi();
    if (!el) return;
    const t = data.totals || {};
    const installed = data.installedBookings || 0;
    const views = t.views || 0;
    if (!installed && !views) {
      el.style.display = 'none';
      el.innerHTML = '';
      return;
    }
    el.style.display = 'block';
    const rate = data.installRatePercent != null ? data.installRatePercent : 0;
    const rows = Object.entries(data.byTouchpoint || {})
      .filter(function(entry) { return (entry[1].views || entry[1].installed); })
      .sort(function(a, b) { return (b[1].installed || 0) - (a[1].installed || 0); })
      .slice(0, 5);
    const rowHtml = rows.length ? rows.map(function(entry) {
      const label = entry[0].replace(/-/g, ' ');
      const s = entry[1];
      return '<div style="display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);">'
        + '<span style="color:var(--text);font-weight:600;text-transform:capitalize;">' + label + '</span>'
        + '<span style="color:var(--text-muted);white-space:nowrap;">' + (s.views || 0) + ' views · ' + (s.installed || 0) + ' installed</span>'
        + '</div>';
    }).join('') : '';

    el.innerHTML = ''
      + '<div style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:8px;">Guest installs — last 30 days</div>'
      + '<div style="display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;">'
      + '<div style="flex:1;min-width:80px;background:var(--bg);border-radius:10px;padding:10px;text-align:center;">'
      + '<div style="font-size:20px;font-weight:800;color:var(--text);">' + rate + '%</div>'
      + '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">of bookings installed</div></div>'
      + '<div style="flex:1;min-width:80px;background:var(--bg);border-radius:10px;padding:10px;text-align:center;">'
      + '<div style="font-size:20px;font-weight:800;color:var(--text);">' + installed + '</div>'
      + '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">confirmed installs</div></div>'
      + '<div style="flex:1;min-width:80px;background:var(--bg);border-radius:10px;padding:10px;text-align:center;">'
      + '<div style="font-size:20px;font-weight:800;color:var(--text);">' + views + '</div>'
      + '<div style="font-size:10px;color:var(--text-muted);margin-top:2px;">install page views</div></div>'
      + '</div>'
      + (rowHtml ? '<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px;">By touchpoint</div>' + rowHtml : '');
  } catch (e) {
    guestPushSubscriberCount = 0;
    applyGuestBroadcastAudienceUi();
    if (el) {
      el.style.display = 'none';
      el.innerHTML = '';
    }
  }
}


// ── APPS TOUR (fullscreen lightbox) ───────────────────
let _appsTourSteps = [];
let _appsTourIdx = 0;
let _appsTourChainFromSettings = false;

function appsTourClose(markDone) {
  const lb = document.getElementById('appsTourLightbox');
  if (lb) {
    if (lb._swipeStart) lb.removeEventListener('touchstart', lb._swipeStart);
    if (lb._swipeEnd) lb.removeEventListener('touchend', lb._swipeEnd);
    lb.remove();
  }
  document.body.style.overflow = '';
  const wasChain = _appsTourChainFromSettings;
  _appsTourChainFromSettings = false;
  try {
    const refresh = (typeof ensureAppsViewRendered === 'function')
      ? ensureAppsViewRendered
      : window.ensureAppsViewRendered;
    if (typeof refresh === 'function') refresh(true);
  } catch (_) {}
  if (markDone) {
    localStorage.setItem('appsTourDone', '1');
    const chainedFromSettings = wasChain
      || localStorage.getItem('settingsTourStep') === 'handoff'
      || settingsTourActive;
    if (chainedFromSettings) {
      const finale = (typeof showFinaleMockModal === 'function')
        ? showFinaleMockModal
        : window.showFinaleMockModal;
      if (typeof finale === 'function') {
        finale();
        return;
      }
    }
  }
}

function appsTourNav(dir) {

    <div style="flex-shrink:0;width:100%;display:flex;align-items:center;justify-content:space-between;padding:max(10px,env(safe-area-inset-top)) 16px 10px;box-sizing:border-box;">
      <div style="font-size:12px;color:rgba(255,255,255,0.55);font-weight:600;">${counter}</div>
      <button type="button" id="appsTourSkipBtn" style="background:rgba(255,255,255,0.12);border:none;color:rgba(255,255,255,0.8);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;padding:8px 14px;border-radius:20px;">Skip</button>
    </div>
    <div style="flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;padding:0 16px;box-sizing:border-box;overflow:hidden;">
      ${mediaHtml}
    </div>
    <div style="flex-shrink:0;width:100%;max-width:400px;margin:0 auto;padding:12px 20px max(16px,env(safe-area-inset-bottom));box-sizing:border-box;text-align:center;">
      <div style="font-size:17px;font-weight:800;color:#fff;line-height:1.35;margin-bottom:6px;display:inline-flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:8px;">${step.title}${titleBadge}</div>
      ${step.caption ? `<div style="font-size:13px;color:rgba(255,255,255,0.7);line-height:1.55;margin-bottom:14px;">${step.caption}</div>` : ''}
      <button type="button" id="appsTourNextBtn" style="width:100%;padding:14px;border-radius:12px;border:none;background:#2E7D5B;color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;">${btnLabel}</button>
      <div style="display:flex;gap:6px;justify-content:center;">${dots}</div>
    </div>`;

  document.getElementById('appsTourNextBtn').onclick = () => {
    if (isLast) {
      const chain = _appsTourChainFromSettings;
      appsTourClose(true);
      if (!chain) {
        const appsEl = document.getElementById('appsView');
        if (appsEl) appsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    } else {
      _appsTourIdx++;
      appsTourRender();
    }
  };
  document.getElementById('appsTourSkipBtn').onclick = () => appsTourClose(true);
}

function startAppsTour(opts) {
  const replay = opts && opts.replay;
  const chainFromSettings = opts && opts.chainFromSettingsTour;
  _appsTourChainFromSettings = !!chainFromSettings;
  if (!replay && !chainFromSettings && localStorage.getItem('appsTourDone')) return;
  if (document.getElementById('appsTourLightbox')) return;

  const hName = activeHotelName || 'Your Hotel';
  const shortName = hName.length > 13 ? hName.slice(0, 13) + '…' : hName;
  const initial = hName.trim().charAt(0).toUpperCase();
  const iconUrl = activeHotelAppIcon || '';
  const iconEl = iconUrl
    ? `<div style="width:52px;height:52px;border-radius:14px;background:#fff;padding:8px;box-sizing:border-box;flex-shrink:0;display:flex;align-items:center;justify-content:center;"><img src="${iconUrl}" alt="${hName}" style="width:100%;height:100%;object-fit:contain;"></div>`
    : `<div style="width:52px;height:52px;border-radius:14px;background:#2E7D5B;color:#fff;font-size:22px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${initial}</div>`;

  _appsTourSteps = [
    {
      type: 'video',
      src: APPS_SHOWCASE.guestInstallVideo,
      poster: appsCloudinaryImg(APPS_SHOWCASE.guestHome, 400),
      title: 'Guests save your hotel to their phone',
      caption: `They tap <strong>Add to Home Screen</strong> on your booking page or scan your QR. Tap <strong>Change your icon</strong> on the Phones tab so they see <strong>${shortName}</strong>.`,
    },
    {
      type: 'image',
      src: appsCloudinaryImg(APPS_SHOWCASE.guestHome, 520),
      alt: 'Guest home screen',
      title: 'What guests see after they install',
      caption: 'Their stay info, direct booking, and a way to message you — all from one icon on their phone.',
    },
    {
      type: 'cta',
      title: 'On the Phones tab',
      caption: '',
      ctaHtml: `
        <div style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px;text-align:left;margin-bottom:10px;">
          <div style="font-size:11px;font-weight:800;color:#4CAF7D;margin-bottom:4px;">AT CHECK-IN</div>
          <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;">📲 Show QR at check-in</div>
          <p style="font-size:12px;color:rgba(255,255,255,0.65);margin:0;line-height:1.5;">Full-screen QR — guests scan to save <strong>${shortName}</strong>.</p>
        </div>
        <div style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px;text-align:left;margin-bottom:10px;">
          <div style="font-size:11px;font-weight:800;color:#4CAF7D;margin-bottom:4px;">NOTIFY GUESTS</div>
          <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;">📣 Notify all guests at once</div>
          <p style="font-size:12px;color:rgba(255,255,255,0.65);margin:0;line-height:1.5;">Push a sale, event, or install reminder to everyone on your guest app.</p>
        </div>
        <div style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:14px;padding:14px;text-align:left;">
          <div style="font-size:11px;font-weight:800;color:#4CAF7D;margin-bottom:8px;">CHANGE YOUR ICON</div>
          <div style="display:flex;align-items:center;gap:12px;">
            ${iconEl}
            <div>
              <div style="font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;">Your logo on their home screen</div>
              <p style="font-size:12px;color:rgba(255,255,255,0.65);margin:0;line-height:1.45;">Upload at the top of the <strong>Phones</strong> tab. Tap <strong>Help</strong> for the full walkthrough.</p>
            </div>
          </div>
        </div>`,
    },
  ];

  _appsTourIdx = 0;
  appsCloseLightbox();
  appsTourClose(false);

  const lb = document.createElement('div');
  lb.id = 'appsTourLightbox';
  lb.style.cssText = [
    'position:fixed;inset:0;z-index:102001;background:#000;',
    'display:flex;flex-direction:column;',
    'overscroll-behavior:contain;touch-action:pan-y;',
    'padding-left:env(safe-area-inset-left,0px);padding-right:env(safe-area-inset-right,0px);',
  ].join('');
  let touchStartX = 0;
  lb._swipeStart = (e) => { touchStartX = e.changedTouches[0].clientX; };
  lb._swipeEnd = (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) appsTourNav(dx < 0 ? 1 : -1);
  };
  lb.addEventListener('touchstart', lb._swipeStart, { passive: true });
  lb.addEventListener('touchend', lb._swipeEnd, { passive: true });
  document.body.appendChild(lb);
  document.body.style.overflow = 'hidden';
  appsTourRender();
}


// ── INIT ───────────────────────────────────────────────
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/frontdesk-sw.js').catch(() => {});
const signInBtn = document.getElementById('signInBtn');
if (signInBtn) signInBtn.addEventListener('click', () => { void doLogin(); });
const pinInputEl = document.getElementById('pinInput');
if (pinInputEl) pinInputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') void doLogin(); });
const magicLinkSendBtn = document.getElementById('magicLinkSendBtn');
if (magicLinkSendBtn) magicLinkSendBtn.addEventListener('click', () => { void sendMagicLink(); });
bootCrmApp();
if ('requestIdleCallback' in window) {
  requestIdleCallback(() => { loadAppsModule().catch(() => {}); }, { timeout: 4000 });
} else {
  setTimeout(() => { loadAppsModule().catch(() => {}); }, 2000);
}
setInterval(refreshCurrentView, 30000);
(function(){
  function loadTelemetry(){
    const s = document.createElement('script');
    s.src = '/marketel-telemetry.js';
    s.defer = true;
    document.body.appendChild(s);
  }
  if ('requestIdleCallback' in window) requestIdleCallback(loadTelemetry, { timeout: 8000 });
  else setTimeout(loadTelemetry, 4000);
})();
</script>
</body>
</html>
