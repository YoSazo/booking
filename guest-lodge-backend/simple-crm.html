<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketel · Front Desk</title>
  <link rel="manifest" href="/manifest-simple-crm.json">
  <meta name="theme-color" content="#EEF2EF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #2E7D5B; --green-light: #4CAF7D; --green-pale: #E8F5EE;
      --green-mint: #C8EDD9; --bg: #EEF2EF; --white: #FFFFFF;
      --text: #1A2B22; --text-muted: #6B7D72; --border: #D8E4DC;
      --red: #E05252; --amber: #F59E0B;
      --shadow: 0 2px 12px rgba(46,125,91,0.10);
      --shadow-lg: 0 8px 32px rgba(46,125,91,0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* ── LOGIN ── */
    .login-screen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a2b22 0%, #2E7D5B 100%);
    }
    .login-card {
      background: white; border-radius: 20px; padding: 40px 36px; width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .login-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .login-logo-icon { height: 48px; width: auto; }
    .login-logo-text { height: 28px; width: auto; }
    .login-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .login-input {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: 12px; font-family: inherit; font-size: 18px; text-align: center;
      letter-spacing: 4px; outline: none; margin-bottom: 12px; color: var(--text);
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--green); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--green); color: white;
      border: none; border-radius: 12px; font-family: inherit; font-size: 15px;
      font-weight: 600; cursor: pointer; transition: background 0.15s;
    }
    .login-btn:hover { background: #245f46; }
    .login-error { color: var(--red); font-size: 13px; margin-top: 8px; min-height: 20px; }

    /* ── HEADER ── */
    .header {
      background: var(--white); border-bottom: 1.5px solid var(--border);
      padding: 8px 16px; min-height: 58px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 8px rgba(46,125,91,0.07);
      gap: 8px; flex-wrap: wrap;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; color: var(--text); flex-shrink: 0; }
    .header-logo-icon { height: 32px; width: auto; }
    .header-logo-text { height: 20px; width: auto; }
    .header-logo-suffix { margin-left: 2px; color: var(--text-muted); font-weight: 600; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .stat-pill {
      background: var(--green-pale); border-radius: 20px; padding: 4px 12px;
      font-size: 12px; font-weight: 600; color: var(--green); display: flex; align-items: center; gap: 4px;
    }
    .refresh-btn {
      background: var(--green-pale); border: 1.5px solid var(--border); border-radius: 8px;
      padding: 5px 12px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--green); cursor: pointer; transition: all 0.15s;
    }
    .refresh-btn:hover { background: var(--green); color: white; border-color: var(--green); }

    /* ── LAYOUT ── */
    .container { max-width: 860px; margin: 0 auto; padding: 24px 20px; }

    /* TABS */
    .tabs-container {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 5px;
      position: relative;
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    .tabs-container::-webkit-scrollbar { display: none; }

    .tabs-slider {
      position: absolute;
      top: 5px;
      left: 5px;
      height: calc(100% - 10px);
      background: var(--white);
      border-radius: 11px;
      box-shadow: 0 2px 8px rgba(46,125,91,0.13), 0 1px 3px rgba(0,0,0,0.07);
      transition: transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 0;
      will-change: transform, width;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: none;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.22s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 1;
      border-radius: 11px;
      white-space: nowrap;
      user-select: none;
    }

    .tab:hover {
      color: var(--text);
      background: none;
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: transparent;
    }

    .tab-badge {
      background: var(--border);
      color: var(--text-muted);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      transition: background 0.22s ease, color 0.22s ease, transform 0.38s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab.active .tab-badge {
      background: var(--green-pale);
      color: var(--green);
      transform: scale(1.08);
    }

    /* Tab ripple on click */
    .tab::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 11px;
      background: var(--green);
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.15s, transform 0.15s;
      z-index: -1;
      pointer-events: none;
    }

    .tab:active::after {
      opacity: 0.07;
      transform: scale(1);
    }

    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .page-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .count-badge {
      background: var(--green); color: white;
      padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }

    /* ── BOOKING CARD ── */
    .booking-card {
      background: var(--white); border: 2px solid var(--border);
      border-radius: 20px; overflow: hidden;
      box-shadow: var(--shadow); margin-bottom: 14px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .booking-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    .card-accent { height: 5px; background: var(--green); }
    .card-accent.declined { background: var(--amber); }

    .card-inner { padding: 20px 22px; }

    /* TOP ROW */
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 17px; }
    .guest-info { display: flex; flex-direction: column; gap: 4px; }
    .guest-name { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .guest-time { font-size: 15px; color: var(--text-muted); font-weight: 500; }

    .card-amount { 
      font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 700;
      color: var(--green); text-align: right; flex-shrink: 0; margin-left: 17px;
    }

    /* META ROW */
    .card-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 17px; align-items: center; }
    .meta-chip {
      display: flex; align-items: center; gap: 4px; background: var(--bg);
      border-radius: 10px; padding: 4px 11px; font-size: 15px; color: var(--text-muted); font-weight: 500;
    }
    .declined-chip {
      background: #FEF3C7; color: #92400E; border-radius: 10px;
      padding: 4px 11px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .pay-chip {
      background: #DBEAFE; color: #1E40AF; border-radius: 10px;
      padding: 4px 11px; font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }

    /* DATES */
    .card-dates {
      display: flex; gap: 0; margin-bottom: 17px;
      background: var(--bg); border-radius: 14px; overflow: hidden;
      border: 2px solid var(--border);
    }
    .date-block {
      flex: 1; padding: 11px 17px; display: flex; flex-direction: column; gap: 3px;
    }
    .date-block + .date-block { border-left: 2px solid var(--border); }
    .date-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.4px; color: var(--text-muted); }
    .date-value { font-size: 18px; font-weight: 600; color: var(--text); }

    /* CONTACT ROW */
    .card-contact { display: flex; align-items: center; justify-content: space-between; margin-bottom: 17px; gap: 14px; }
    .contact-details { display: flex; flex-direction: column; gap: 3px; }
    .contact-phone { font-size: 25px; font-weight: 700; color: var(--green); font-family: 'DM Mono', monospace; }
    .contact-email { font-size: 15px; color: var(--text-muted); }

    .phone-call-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--green); color: white;
      border: none; border-radius: 14px; padding: 13px 22px;
      font-family: inherit; font-size: 18px; font-weight: 700;
      cursor: pointer; text-decoration: none; transition: all 0.15s;
      flex-shrink: 0;
    }
    .phone-call-btn:hover { background: #245f46; transform: scale(1.03); }

    /* FOOTER */
    .card-footer { display: flex; gap: 11px; padding-top: 17px; border-top: 1.4px solid var(--border); }
    .btn {
      flex: 1; padding: 13px 17px; border-radius: 14px; font-family: inherit;
      font-size: 17px; font-weight: 600; cursor: pointer; border: 2px solid transparent;
      transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-confirm { background: var(--green); color: white; }
    .btn-confirm:hover { background: #245f46; }
    .btn-note { background: var(--white); color: var(--text); border-color: var(--border); }
    .btn-note:hover { border-color: var(--green); color: var(--green); background: var(--green-pale); }

    /* ── STATES ── */
    .empty-state {
      text-align: center; padding: 64px 20px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 14px; box-shadow: var(--shadow);
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .empty-sub { font-size: 13px; color: var(--text-muted); }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; font-size: 14px; color: var(--text-muted); gap: 10px;
    }
    .spinner {
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TOAST ── */
    /* Notes Section */
    .card-notes {
      margin-top: 12px;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
    }
    .notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .notes-title {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .notes-count {
      font-size: 11px;
      background: #e5e7eb;
      color: #6b7280;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .notes-content {
      font-size: 13px;
      color: #374151;
      line-height: 1.5;
      white-space: pre-wrap;
      max-height: 100px;
      overflow-y: auto;
    }
    .notes-empty {
      font-size: 12px;
      color: #9ca3af;
      font-style: italic;
    }

    /* Notes Modal */
    .notes-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .notes-modal {
      background: white;
      border-radius: 16px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: modalSlideUp 0.2s ease-out;
    }
    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .notes-modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .notes-modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }
    .notes-modal-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: #f3f4f6;
      color: #6b7280;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .notes-modal-close:hover {
      background: #e5e7eb;
      color: #111827;
    }
    .notes-modal-body {
      padding: 24px;
    }
    .notes-input-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
    }
    .notes-input {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: #111827;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    .notes-input:focus {
      border-color: #2E7D5B;
    }
    .notes-modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .notes-btn {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      font-family: inherit;
    }
    .notes-btn-cancel {
      background: #f3f4f6;
      color: #6b7280;
    }
    .notes-btn-cancel:hover {
      background: #e5e7eb;
    }
    .notes-btn-save {
      background: #2E7D5B;
      color: white;
    }
    .notes-btn-save:hover {
      background: #245f46;
    }

    .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 7px; }
    .toast {
      background: var(--text); color: white; border-radius: 11px; padding: 11px 16px;
      font-size: 12px; font-weight: 600; box-shadow: var(--shadow-lg);
      display: flex; align-items: center; gap: 7px;
      animation: slideInR 0.2s ease, fadeOut 0.3s ease 2.7s forwards;
    }
    @keyframes slideInR { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeOut { to{opacity:0;transform:translateX(20px)} }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    .availability-view { margin-top: 8px; display: flex; flex-direction: column; gap: 12px; }
    .rooms-shell { display: flex; flex-direction: column; gap: 12px; }
    .room-pill-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .room-pill-wrap { display: inline-flex; align-items: center; gap: 6px; }
    .room-pill {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .room-pill:hover { border-color: var(--green); color: var(--green); }
    .room-pill.active { background: var(--green); border-color: var(--green); color: #fff; }
    .room-pill-action {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
    }
    .room-pill-action:hover { border-color: var(--green); color: var(--green); }
    .room-pill-action.danger:hover { border-color: var(--red); color: var(--red); }
    .room-pill-add {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .room-pill-add:hover { border-color: var(--green); color: var(--green); }

    .availability-card {
      background: var(--white);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .availability-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
    .availability-help { font-size: 12px; color: var(--text-muted); }
    .availability-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 30px 10px;
      font-size: 14px;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .cal-month-label { font-size: 15px; font-weight: 700; color: var(--text); }
    .cal-nav { display: flex; gap: 6px; }
    .cal-nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--white);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      transition: all .15s;
    }
    .cal-nav-btn:hover { border-color: var(--green); color: var(--green); }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .cal-dow {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 3px 0 7px;
    }
    .cal-day {
      min-height: 54px;
      border-radius: 10px;
      border: 1.5px solid transparent;
      background: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .12s;
      padding: 4px;
    }
    .cal-day:hover { border-color: var(--green); }
    .cal-day.empty { background: transparent; border-color: transparent !important; cursor: default; }
    .cal-day.past { opacity: .45; cursor: default; }
    .cal-day.past:hover { border-color: transparent; }
    .cal-day.today { border-color: var(--green) !important; }
    .cal-day.open { background: var(--green-pale); }
    .cal-day.partial { background: #FEF3C7; }
    .cal-day.full { background: #FEE2E2; }
    .cal-day.closed { background: #f2f4f3; }
    .day-num { font-size: 13px; font-weight: 700; line-height: 1; margin-bottom: 3px; }
    .day-avail { font-size: 11px; font-family: 'DM Mono', monospace; line-height: 1; }
    .cal-day.open .day-avail { color: var(--green); }
    .cal-day.partial .day-avail { color: #92400E; }
    .cal-day.full .day-avail { color: #991B1B; }
    .cal-day.closed .day-avail { color: var(--text-muted); }

    .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    .range-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .range-field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .range-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .range-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
      font-family: inherit;
      background: var(--white);
      color: var(--text);
    }
    .range-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .range-btn {
      border: 1.5px solid var(--green);
      background: var(--green);
      color: white;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .range-btn.alt { background: var(--white); color: var(--green); }
    .range-toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;

<script>
let token = '';
let bookings = [];
let currentFilter = 'needs-call';
let manualAvailability = { rooms: [], overrides: {} };
let manualSelectedRoom = '';
let availabilityYear = new Date().getFullYear();
let availabilityMonth = new Date().getMonth();
let availabilityEditingDay = '';
let editingRoomName = '';
let currentHotelPms = '';
let revenueEnabled = false;
let revenuePeriod = '30d';
let revenueCache = {};
let revenueLoading = false;
let revenueError = '';
const REVENUE_ROOM_COLORS = ['#2E7D5B', '#4CAF7D', '#8BC4AA', '#C8EDD9', '#5A9E7D'];
const CRM_HOTEL_BY_HOST = {
  'guestlodgeminot.clickinns.com': 'guest-lodge-minot',
  'stcroix.clickinns.com': 'st-croix-wisconsin',
  'homeplacesuites.clickinns.com': 'home-place-suites',
  'myhomeplacesuites.com': 'home-place-suites',
  'www.myhomeplacesuites.com': 'home-place-suites',
  'suitestay.clickinns.com': 'suite-stay',
  'clickinns.com': 'suite-stay',
  'www.clickinns.com': 'suite-stay',
};

function resolveCrmHotelId() {
  try {
    const params = new URLSearchParams(window.location.search || '');
    const byParam = String(params.get('hotelId') || '').trim();
    if (byParam) return byParam;
  } catch (e) {}

  const host = (window.location && window.location.hostname) ? String(window.location.hostname).toLowerCase() : '';
  if (host && CRM_HOTEL_BY_HOST[host]) return CRM_HOTEL_BY_HOST[host];
  if (host === 'localhost' || host === '127.0.0.1') return 'guest-lodge-minot';
  return 'guest-lodge-minot';
}

const activeHotelId = resolveCrmHotelId();

try { token = localStorage.getItem('crmToken') || ''; } catch(e) {}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toIsoDate(dateLike) {
  const d = new Date(dateLike);
  if (Number.isNaN(d.getTime())) return '';
  return d.toISOString().slice(0, 10);
}

function addDaysIso(days) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function enumerateDates(startIso, endIso, maxDays = 180) {
  if (!startIso || !endIso || endIso < startIso) return [];
  const out = [];
  let cursor = new Date(`${startIso}T00:00:00.000Z`);
  const end = new Date(`${endIso}T00:00:00.000Z`);
  while (cursor <= end && out.length < maxDays) {
    out.push(cursor.toISOString().slice(0, 10));
    cursor = new Date(cursor.getTime() + 86400000);
  }
  return out;
}

const AVAIL_DOW = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
const AVAIL_MONTHS = [
  "January", "February", "March", "April", "May", "June",
  "July", "August", "September", "October", "November", "December",
];

function pctChange(currentValue, previousValue) {
  const current = Number(currentValue || 0);
  const previous = Number(previousValue);
  if (!Number.isFinite(previous) || previous === 0) return null;
  return Math.round(((current - previous) / previous) * 100);
}

function formatCurrencyCompact(value) {
  const amount = Number(value || 0);
  const abs = Math.abs(amount);
  if (abs >= 1000) {
    const compact = (amount / 1000).toFixed(abs >= 100000 ? 0 : 1).replace(/\.0$/, '');
    return `$${compact}k`;
  }
  return new Intl.NumberFormat('en-US', {
    style: 'currency',
    currency: 'USD',
    maximumFractionDigits: 0,
  }).format(amount);
}

function formatPercent(value) {
  const num = Number(value || 0);
  return `${Math.round(num * 10) / 10}%`;
}

function updateRevenuePeriodButtons() {
  document.querySelectorAll('.revenue-period-btn').forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.period === revenuePeriod);
  });
}

function syncRevenueUi() {
  const existingBtn = document.getElementById('revenueTabBtn');
  const existingView = document.getElementById('revenueView');

  if (!revenueEnabled) {
    if (existingBtn) existingBtn.remove();
    if (existingView) existingView.remove();
    if (currentFilter === 'revenue') currentFilter = 'needs-call';
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) moveSlider(activeTab);
    return;
  }

  const tabs = document.querySelector('.tabs-container');
  if (tabs && !existingBtn) {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.id = 'revenueTabBtn';
    btn.setAttribute('type', 'button');
    btn.textContent = 'Revenue';
    btn.onclick = function () { setFilter('revenue', btn); };
    tabs.appendChild(btn);
  }

  const container = document.querySelector('.container');
  if (container && !existingView) {
    container.insertAdjacentHTML('beforeend', `
      <div id="revenueView" class="revenue-view" style="display:none">
        <div class="revenue-wrap">
          <div class="revenue-toolbar">
            <button class="revenue-period-btn" data-period="7d" onclick="setRevenuePeriod('7d', this)">7 days</button>
            <button class="revenue-period-btn active" data-period="30d" onclick="setRevenuePeriod('30d', this)">30 days</button>
            <button class="revenue-period-btn" data-period="90d" onclick="setRevenuePeriod('90d', this)">90 days</button>
            <button class="revenue-period-btn" data-period="all" onclick="setRevenuePeriod('all', this)">All time</button>
          </div>
          <div id="revenueRangeNote" class="revenue-range-note">Stay-date revenue</div>
          <div id="revenueStatus"></div>
          <div id="revenueContent" style="display:none">
            <div class="revenue-grid">
              <div class="revenue-card">
                <div class="revenue-label">Revenue</div>
                <div class="revenue-value" id="revenueKpiRev">$0</div>
                <div class="revenue-delta" id="revenueKpiRevDelta"></div>
              </div>
              <div class="revenue-card">
                <div class="revenue-label">Bookings</div>
                <div class="revenue-value" id="revenueKpiBookings">0</div>
                <div class="revenue-delta" id="revenueKpiBookingsDelta"></div>
              </div>
              <div class="revenue-card">
                <div class="revenue-label">Avg. stay value</div>
                <div class="revenue-value" id="revenueKpiAvg">$0</div>
                <div class="revenue-delta" id="revenueKpiAvgDelta"></div>
              </div>
            </div>
            <div class="revenue-bottom-grid">
              <div class="revenue-list-card">
                <div class="revenue-list-title">By room type</div>
                <div id="revenueRoomList"></div>
              </div>
              <div class="revenue-list-card">
                <div class="revenue-list-title">Quick stats</div>
                <div id="revenueQuickStats"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `);
  }

  updateRevenuePeriodButtons();
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) moveSlider(activeTab);
}

function setRevenueDelta(id, currentValue, previousValue, emptyLabel = 'No prior period') {
  const el = document.getElementById(id);
  if (!el) return;

  const pct = pctChange(currentValue, previousValue);
  if (pct === null) {
    el.className = 'revenue-delta';
    el.innerHTML = '<span class="revenue-delta-dot"></span>' + esc(emptyLabel);
    return;
  }

  const up = pct >= 0;
  el.className = `revenue-delta ${up ? 'up' : 'down'}`;
  el.innerHTML = `<span class="revenue-delta-dot"></span>${up ? '+' : ''}${pct}% vs prior period`;
}

function renderRevenueRooms(rooms) {
  const list = document.getElementById('revenueRoomList');
  if (!list) return;

  const items = Array.isArray(rooms) ? rooms : [];
  const maxRev = items.reduce((max, room) => Math.max(max, Number(room.rev || 0)), 0);
  if (!items.length || maxRev <= 0) {
    list.innerHTML = '<div class="revenue-empty-inline">No room revenue yet for this period.</div>';
    return;
  }

  list.innerHTML = items.map((room, index) => {
    const color = REVENUE_ROOM_COLORS[index % REVENUE_ROOM_COLORS.length];
    const roomRevenue = Number(room.rev || 0);
    const width = roomRevenue > 0 && maxRev > 0
      ? Math.max(6, Math.round((roomRevenue / maxRev) * 100))
      : 0;
    return `
      <div class="revenue-room-row">
        <div class="revenue-room-dot" style="background:${color}"></div>
        <div class="revenue-room-name">${esc(room.name || 'Room')}</div>
        <div class="revenue-room-bar"><div class="revenue-room-bar-fill" style="width:${width}%;background:${color}"></div></div>
        <div class="revenue-room-value">${esc(formatCurrencyCompact(room.rev))}</div>
      </div>
    `;
  }).join('');
}

function renderRevenueStats(data) {
  const statsEl = document.getElementById('revenueQuickStats');
  if (!statsEl) return;

  const stats = data && data.stats ? data.stats : {};
  statsEl.innerHTML = `
    <div class="revenue-stat-row"><span class="revenue-stat-key">Nights sold</span><span class="revenue-stat-value">${esc(String(stats.nights || 0))}</span></div>
    <div class="revenue-stat-row"><span class="revenue-stat-key">Occupancy rate</span><span class="revenue-stat-value">${esc(formatPercent(stats.occupancyRate || 0))}</span></div>
    <div class="revenue-stat-row"><span class="revenue-stat-key">Pay at hotel</span><span class="revenue-stat-value">${esc(String(stats.payLater || 0))} bookings</span></div>
    <div class="revenue-stat-row"><span class="revenue-stat-key">Recovered declines</span><span class="revenue-stat-value">${esc(String(stats.recoveredDeclines || 0))}</span></div>
    <div class="revenue-stat-row"><span class="revenue-stat-key">Revenue / booking</span><span class="revenue-stat-value">${esc(formatCurrencyCompact(data.avg || 0))}</span></div>
  `;
}

function renderRevenueView() {
  syncRevenueUi();
  const view = document.getElementById('revenueView');
  if (!view) return;

  updateRevenuePeriodButtons();

  const statusEl = document.getElementById('revenueStatus');
  const contentEl = document.getElementById('revenueContent');
  const noteEl = document.getElementById('revenueRangeNote');
  const data = revenueCache[revenuePeriod] || null;

  if (noteEl) {
    noteEl.textContent = data && data.range && data.range.label
      ? `Stay dates: ${data.range.label}`
      : 'Stay-date revenue';
  }

  if (!data) {
    if (contentEl) contentEl.style.display = 'none';
    if (statusEl) {
      if (revenueLoading) {
        statusEl.innerHTML = '<div class="loading"><div class="spinner"></div> Loading revenue...</div>';
      } else if (revenueError) {
        statusEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">!</div>
            <div class="empty-text">Could not load revenue</div>
            <div class="empty-sub">${esc(revenueError)}</div>
          </div>`;
      } else {
        statusEl.innerHTML = '';
      }
    }
    return;
  }

  if (statusEl) statusEl.innerHTML = '';
  if (contentEl) contentEl.style.display = 'block';

  const revEl = document.getElementById('revenueKpiRev');
  const bookingsEl = document.getElementById('revenueKpiBookings');
  const avgEl = document.getElementById('revenueKpiAvg');
  if (revEl) revEl.textContent = formatCurrencyCompact(data.rev);
  if (bookingsEl) bookingsEl.textContent = String(data.bookings || 0);
  if (avgEl) avgEl.textContent = formatCurrencyCompact(data.avg);

  const noPriorLabel = revenuePeriod === 'all' ? 'All available data' : 'No prior period';
  setRevenueDelta('revenueKpiRevDelta', data.rev, data.prevRev, noPriorLabel);
  setRevenueDelta('revenueKpiBookingsDelta', data.bookings, data.prevBookings, noPriorLabel);
  setRevenueDelta('revenueKpiAvgDelta', data.avg, data.prevAvg, noPriorLabel);
  renderRevenueRooms(data.rooms);
  renderRevenueStats(data);
}

async function loadRevenueData(force = false) {
  if (!revenueEnabled) return;

  const cached = revenueCache[revenuePeriod];
  if (cached && !force) {
    revenueError = '';
    renderRevenueView();
    return;
  }

  revenueLoading = true;
  revenueError = '';
  renderRevenueView();

  try {
    const data = await api('GET', `/api/crm/revenue?period=${encodeURIComponent(revenuePeriod)}`);
    if (!data.success) throw new Error(data.message || 'Failed to load revenue');
    revenueCache[revenuePeriod] = data.data || {};
  } catch (e) {
    revenueError = e.message || 'Failed to load revenue';
  } finally {
    revenueLoading = false;
    renderRevenueView();
  }
}

function setRevenuePeriod(period, btn) {
  revenuePeriod = period;
  if (btn) updateRevenuePeriodButtons();
  loadRevenueData();
}

// ── LOGIN ──────────────────────────────────────────────
async function verifyCrmToken(pin) {
  const res = await fetch(`/api/crm/verify?hotelId=${encodeURIComponent(activeHotelId)}`, {
    headers: { 'x-crm-token': pin }
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok || !json.success) {
    throw new Error(json.message || (res.status === 401 ? 'Wrong PIN' : 'Could not verify access'));
  }
  return json;
}

async function startCrmApp(verification) {
  currentHotelPms = String((verification && verification.pms) || '').toLowerCase();
  revenueEnabled = !!(verification && verification.isManualPms);
  revenueCache = {};
  revenueLoading = false;
  revenueError = '';
  ensureAvailabilityUi();
  syncRevenueUi();
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await Promise.allSettled([
    loadManualAvailability(),
    loadBookings(),
  ]);
}

async function doLogin() {
  const pin = document.getElementById('pinInput').value.trim();
  const err = document.getElementById('loginError');
  err.textContent = '';
  if (!pin) { err.textContent = 'Please enter PIN'; return; }
  
  // Verify PIN with server first
  try {
    const verification = await verifyCrmToken(pin);
    token = pin;
    try { localStorage.setItem('crmToken', token); } catch(e) {}
    await startCrmApp(verification);
  } catch (e) {
    err.textContent = e.message === 'Wrong PIN' ? 'Wrong PIN' : 'Connection failed';
  }
}

// ── API ────────────────────────────────────────────────
async function api(method, path, body) {
  const url = new URL(path, window.location.origin);
  if (!url.searchParams.get('hotelId')) {
    url.searchParams.set('hotelId', activeHotelId);
  }

  const opts = { method, headers: { 'Content-Type': 'application/json', 'x-crm-token': token } };
  const normalizedMethod = String(method || 'GET').toUpperCase();
  if (body || (normalizedMethod !== 'GET' && normalizedMethod !== 'HEAD')) {
    const payload = (body && typeof body === 'object' && !Array.isArray(body)) ? { ...body } : (body || {});
    if (payload.hotelId === undefined) payload.hotelId = activeHotelId;
    opts.body = JSON.stringify(payload);
  }
  const res = await fetch(url.pathname + url.search, opts);
  if (res.status === 401) { showLogin(); throw new Error('Unauthorized'); }
  return res.json();
}

function showLogin() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  token = '';
  currentHotelPms = '';
  revenueEnabled = false;
  revenueCache = {};
  revenueLoading = false;
  revenueError = '';
  syncRevenueUi();
  try { localStorage.removeItem('crmToken'); } catch(e) {}
}

// ── LOAD ───────────────────────────────────────────────
async function loadBookings() {
  try {
    const data = await api('GET', '/api/crm/bookings');
    if (!data.success) throw new Error(data.message);
    bookings = data.data || [];
    if (currentFilter !== 'revenue') revenueCache = {};
    
    // Update counts
    const needsCalls = bookings.filter(b => b.callStatus === 'not-called');
    const called = bookings.filter(b => b.callStatus === 'called');
    document.getElementById('countNeedsCalled').textContent = needsCalls.length;
    document.getElementById('countCalled').textContent = called.length;
    document.getElementById('statCount').textContent = needsCalls.length;
    
    // Render based on current filter
    applyFilter();
  } catch(e) {
    if (e.message === 'Unauthorized') return;
    document.getElementById('bookingsList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
      <div class="empty-text">Could not load bookings</div>
      <div class="empty-sub">${esc(e.message)}</div>
      </div>`;
  }
}

async function refreshCurrentView() {
  const tasks = [loadBookings()];
  if (currentFilter === 'availability') {
    tasks.push(loadManualAvailability());
  }
  if (currentFilter === 'revenue' && revenueEnabled) {
    tasks.push(loadRevenueData(true));
  }
  await Promise.allSettled(tasks);
}

// ── FILTER TABS ────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  moveSlider(btn);
  if (filter === 'availability') {
    loadManualAvailability().then(applyFilter).catch(() => applyFilter());
    return;
  }
  if (filter === 'revenue') {
    applyFilter();
    loadRevenueData();
    return;
  }
  applyFilter();
}

function moveSlider(activeTab) {
  const slider = document.getElementById('tabsSlider');
  const tabs = activeTab ? activeTab.closest('.tabs-container') : null;
  if (!slider || !activeTab || !tabs) return;

  const tabRect = activeTab.getBoundingClientRect();
  const tabsRect = tabs.getBoundingClientRect();
  const cs = getComputedStyle(tabs);
  const borderLeft = parseFloat(cs.borderLeftWidth) || 0;
  const padLeft = parseFloat(cs.paddingLeft) || 0;
  // Slider is `left: Npx` from the padding edge; delta from border box must subtract border + padding.
  const left = tabRect.left - tabsRect.left + tabs.scrollLeft - borderLeft - padLeft;

  slider.style.width = `${Math.round(tabRect.width)}px`;
  slider.style.transform = `translateX(${Math.round(left)}px)`;
}

// Call on load to position slider under the default active tab
document.addEventListener('DOMContentLoaded', () => {
  ensureAvailabilityUi();
  syncRevenueUi();
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) moveSlider(activeTab);

  const tabs = document.querySelector('.tabs-container');
  if (tabs) {
    tabs.addEventListener('scroll', () => {
      const current = document.querySelector('.tab.active');
      if (current) moveSlider(current);
    }, { passive: true });
  }

  window.addEventListener('resize', () => {
    const current = document.querySelector('.tab.active');
    if (current) moveSlider(current);
  });
});

function applyFilter() {
  const bookingsEl = document.getElementById('bookingsList');
  const availabilityEl = document.getElementById('availabilityView');
  const revenueEl = document.getElementById('revenueView');

  if (currentFilter === 'availability') {
    if (bookingsEl) bookingsEl.style.display = 'none';
    if (availabilityEl) availabilityEl.style.display = 'flex';
    if (revenueEl) revenueEl.style.display = 'none';
    renderAvailabilityView();
    return;
  }

  if (currentFilter === 'revenue') {
    if (bookingsEl) bookingsEl.style.display = 'none';
    if (availabilityEl) availabilityEl.style.display = 'none';
    if (revenueEl) revenueEl.style.display = 'flex';
    closeAvailabilityDayPopover();
    renderRevenueView();
    return;
  }

  if (bookingsEl) bookingsEl.style.display = '';
  if (availabilityEl) availabilityEl.style.display = 'none';
  if (revenueEl) revenueEl.style.display = 'none';
  closeAvailabilityDayPopover();
  const filtered = currentFilter === 'needs-call' 
    ? bookings.filter(b => b.callStatus === 'not-called')
    : bookings.filter(b => b.callStatus === 'called');
  renderBookings(filtered);
}

async function loadManualAvailability() {
  try {
    const data = await api('GET', '/api/crm/manual-availability');
    if (!data.success) throw new Error(data.message || 'Failed to load manual availability');
    manualAvailability = data.data || { rooms: [], overrides: {} };
    if (!Array.isArray(manualAvailability.rooms)) manualAvailability.rooms = [];
    if (!manualAvailability.overrides || typeof manualAvailability.overrides !== 'object') {
      manualAvailability.overrides = {};
    }
    if (!manualSelectedRoom && manualAvailability.rooms.length) {
      manualSelectedRoom = manualAvailability.rooms[0].name;
    }
    refreshRoomBadge();
    renderAvailabilityView();
  } catch (e) {
    toast('Could not load manual availability', 'error');
  }
}

function roomDateKey(roomName, day) {
  return `${roomName}|${day}`;
}

function refreshRoomBadge() {
  const badge = document.getElementById('countRooms');
  if (badge) badge.textContent = manualAvailability.rooms.length;
}

function getManualRoomByName(name) {
  return (manualAvailability.rooms || []).find(r => r.name === name) || null;
}

function setActiveManualRoom(name) {
  const room = getManualRoomByName(name);
  if (!room) return;
  manualSelectedRoom = room.name;
  renderAvailabilityView();
}

function renderRoomPills() {
  const bar = document.getElementById('roomsPillBar');
  if (!bar) return;
  const rooms = manualAvailability.rooms || [];

  bar.innerHTML = '';
  rooms.forEach((room) => {
    const wrap = document.createElement('div');
    wrap.className = 'room-pill-wrap';

    const pill = document.createElement('button');
    pill.type = 'button';
    pill.className = `room-pill ${manualSelectedRoom === room.name ? 'active' : ''}`;
    pill.textContent = `${room.name} (${Math.max(0, parseInt(room.totalUnits, 10) || 0)})`;
    pill.addEventListener('click', () => setActiveManualRoom(room.name));

    const editBtn = document.createElement('button');
    editBtn.type = 'button';
    editBtn.className = 'room-pill-action';
    editBtn.title = `Edit ${room.name}`;
    editBtn.setAttribute('aria-label', `Edit ${room.name}`);
    editBtn.textContent = '✎';
    editBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      openRoomsEditModal(room.name);
    });

    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'room-pill-action danger';
    delBtn.title = `Delete ${room.name}`;
    delBtn.setAttribute('aria-label', `Delete ${room.name}`);
    delBtn.textContent = '🗑';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteRoomType(room.name);
    });

    wrap.appendChild(pill);
    wrap.appendChild(editBtn);
    wrap.appendChild(delBtn);
    bar.appendChild(wrap);
  });

  const addBtn = document.createElement('button');
  addBtn.type = 'button';
  addBtn.className = 'room-pill-add';
  addBtn.textContent = '+ Add room type';
  addBtn.addEventListener('click', openRoomsAddModal);

function bookingsByRoomDate() {
  const counts = {};
  for (const b of bookings) {
    if (b.paymentDeclined) continue;
    const roomName = String(b.roomName || '').trim();
    if (!roomName) continue;
    const ci = toIsoDate(b.checkinDate);
    const co = toIsoDate(b.checkoutDate);
    if (!ci || !co || co <= ci) continue;
    const days = enumerateDates(ci, toIsoDate(new Date(new Date(`${co}T00:00:00.000Z`).getTime() - 86400000)));
    for (const day of days) {
      const key = roomDateKey(roomName, day);
      counts[key] = (counts[key] || 0) + 1;
    }
  }
  return counts;
}

function availabilityForDay(room, dayIso, bookedMap) {
  const baseUnits = Math.max(0, Number(room.totalUnits || 0));
  const booked = bookedMap[roomDateKey(room.name, dayIso)] || 0;
  const override = manualAvailability.overrides[roomDateKey(room.name, dayIso)];

  if (override?.closed) {
    return { status: 'closed', value: 0, booked, baseUnits, mode: 'closed' };
  }

  let value = Math.max(0, baseUnits - booked);
  let mode = 'auto';
  if (override && override.availableUnits !== null && override.availableUnits !== undefined && override.availableUnits !== '') {
    value = Math.max(0, Number(override.availableUnits) || 0);
    mode = 'override';
  }

  let status = 'open';
  if (value <= 0) status = 'full';
  else if (value < baseUnits) status = 'partial';

  return { status, value, booked, baseUnits, mode };
}

function renderAvailabilityView() {
  ensureAvailabilityUi();
  renderRoomPills();

  const rooms = manualAvailability.rooms || [];
  if (!manualSelectedRoom && rooms.length) {
    manualSelectedRoom = rooms[0].name;
  }
  if (manualSelectedRoom && !rooms.some(r => r.name === manualSelectedRoom)) {
    manualSelectedRoom = rooms.length ? rooms[0].name : '';
  }

  const noRoom = document.getElementById('availabilityNoRoom');
  const calWrap = document.getElementById('availabilityCalendarWrap');
  const activeLabel = document.getElementById('availabilityActiveRoomLabel');

  if (!manualSelectedRoom) {
    if (noRoom) noRoom.style.display = 'block';
    if (calWrap) calWrap.style.display = 'none';
    if (activeLabel) activeLabel.textContent = 'Select a room type first.';
    closeAvailabilityDayPopover();
    return;
  }

  if (noRoom) noRoom.style.display = 'none';
  if (calWrap) calWrap.style.display = 'block';
  const room = getManualRoomByName(manualSelectedRoom);
  if (activeLabel && room) {
    activeLabel.textContent = `Editing: ${room.name} (${Math.max(0, Number(room.totalUnits || 0))} total units)`;
  }

  renderAvailabilityCalendar();
}

function renderAvailabilityCalendar() {
  const room = getManualRoomByName(manualSelectedRoom);
  const grid = document.getElementById('availabilityCalendarGrid');
  const monthLabel = document.getElementById('availabilityMonthLabel');
  if (!room || !grid || !monthLabel) return;

  monthLabel.textContent = `${AVAIL_MONTHS[availabilityMonth]} ${availabilityYear}`;
  grid.innerHTML = '';
  AVAIL_DOW.forEach((dow) => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = dow;
    grid.appendChild(el);
  });

  const firstDay = new Date(availabilityYear, availabilityMonth, 1).getDay();
  const daysInMonth = new Date(availabilityYear, availabilityMonth + 1, 0).getDate();
  const today = new Date();
  const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
  const bookedMap = bookingsByRoomDate();

  for (let i = 0; i < firstDay; i += 1) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d += 1) {
    const date = new Date(availabilityYear, availabilityMonth, d);
    const iso = toIsoDate(date);
    const isPast = date.getTime() < todayMidnight;
    const isToday = date.getTime() === todayMidnight;

    const result = availabilityForDay(room, iso, bookedMap);
    const dayEl = document.createElement('div');
    dayEl.className = `cal-day ${result.status}${isPast ? ' past' : ''}${isToday ? ' today' : ''}`;

    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = String(d);

    const avail = document.createElement('div');
    avail.className = 'day-avail';
    avail.textContent = result.status === 'closed' ? '--' : String(result.value);

    dayEl.appendChild(num);
    dayEl.appendChild(avail);
    if (!isPast) {
      dayEl.addEventListener('click', (event) => openAvailabilityDayPopover(event, iso));
    }
    grid.appendChild(dayEl);
  }
}

function changeAvailabilityMonth(delta) {
  availabilityMonth += delta;
  if (availabilityMonth > 11) {
    availabilityMonth = 0;
    availabilityYear += 1;
  }
  if (availabilityMonth < 0) {
    availabilityMonth = 11;
    availabilityYear -= 1;
  }
  closeAvailabilityDayPopover();
  renderAvailabilityCalendar();
}

function openAvailabilityDayPopover(event, dayIso) {
  const room = getManualRoomByName(manualSelectedRoom);
  const pop = document.getElementById('availabilityDayPopover');
  const title = document.getElementById('availabilityDayPopoverTitle');
  const countEl = document.getElementById('availabilityDayCount');
  const closedInput = document.getElementById('availabilityDayClosedInput');
  if (!room || !pop || !title || !countEl || !closedInput) return;

  availabilityEditingDay = dayIso;
  const bookedMap = bookingsByRoomDate();
  const result = availabilityForDay(room, dayIso, bookedMap);
  const pretty = new Date(`${dayIso}T00:00:00`).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  title.textContent = pretty;
  countEl.textContent = String(result.value);
  closedInput.checked = result.status === 'closed';
  toggleAvailabilityDayClosed();

  const rect = event.currentTarget.getBoundingClientRect();
  let left = rect.left;
  let top = rect.bottom + 8;
  const popWidth = 228;
  const popHeight = 176;
  if (left + popWidth > window.innerWidth - 8) left = window.innerWidth - popWidth - 8;
  if (top + popHeight > window.innerHeight - 8) top = rect.top - popHeight - 8;
  if (left < 8) left = 8;
  if (top < 8) top = 8;

  pop.style.left = `${left}px`;
  pop.style.top = `${top}px`;
  pop.classList.add('open');
  event.stopPropagation();
}

function closeAvailabilityDayPopover() {
  availabilityEditingDay = '';
  const pop = document.getElementById('availabilityDayPopover');
  if (pop) pop.classList.remove('open');
}

function closeAvailabilityPopoverIfOutside(event) {
  const pop = document.getElementById('availabilityDayPopover');
  if (!pop || !pop.classList.contains('open')) return;
  if (!pop.contains(event.target)) closeAvailabilityDayPopover();
}

function stepAvailabilityDay(delta) {
  if (!availabilityEditingDay) return;
  const room = getManualRoomByName(manualSelectedRoom);
  const countEl = document.getElementById('availabilityDayCount');
  const closedInput = document.getElementById('availabilityDayClosedInput');
  if (!room || !countEl || !closedInput || closedInput.checked) return;
  const cur = parseInt(countEl.textContent, 10) || 0;
  const maxUnits = Math.max(0, parseInt(room.totalUnits, 10) || 0);
  const next = Math.max(0, Math.min(maxUnits, cur + delta));
  countEl.textContent = String(next);
}

function toggleAvailabilityDayClosed() {
  const closedInput = document.getElementById('availabilityDayClosedInput');
  const countEl = document.getElementById('availabilityDayCount');
  const stepButtons = document.querySelectorAll('.day-step-btn');
  if (!closedInput || !countEl) return;
  const isClosed = !!closedInput.checked;
  countEl.style.opacity = isClosed ? '0.35' : '1';
  stepButtons.forEach((btn) => {
    btn.disabled = isClosed;
    btn.style.opacity = isClosed ? '0.35' : '1';
  });
}

async function saveAvailabilityDay() {
  if (!availabilityEditingDay || !manualSelectedRoom) return;
  const closedInput = document.getElementById('availabilityDayClosedInput');
  const countEl = document.getElementById('availabilityDayCount');
  if (!closedInput || !countEl) return;

  const payload = {
    roomName: manualSelectedRoom,
    startDate: availabilityEditingDay,
    endDate: availabilityEditingDay,
    closed: !!closedInput.checked,
  };
  if (!closedInput.checked) {
    payload.availableUnits = Math.max(0, parseInt(countEl.textContent, 10) || 0);
  }

  try {
    const data = await api('POST', '/api/crm/manual-availability/range', payload);
    if (!data.success) throw new Error(data.message || 'Failed to save day');
    manualAvailability = data.data || manualAvailability;
    closeAvailabilityDayPopover();
    renderAvailabilityCalendar();
    toast('Day updated', 'success');
  } catch (e) {
    toast('Failed to update day', 'error');
  }
}

async function saveRoomType() {
  const nameEl = document.getElementById('roomsAddNameInput');
  const unitsEl = document.getElementById('roomsAddUnitsInput');
  if (!nameEl || !unitsEl) return;
  const roomName = nameEl.value.trim();
  const totalUnits = Math.max(0, parseInt(unitsEl.value, 10) || 0);
  if (!roomName) {
    toast('Room name is required', 'error');
    return;
  }

  try {
    const data = await api('POST', '/api/crm/manual-availability/rooms', { roomName, totalUnits });
    if (!data.success) throw new Error(data.message || 'Failed to save room type');
    manualAvailability = data.data || manualAvailability;
    manualSelectedRoom = roomName;
    closeRoomsAddModal();
    refreshRoomBadge();
    renderAvailabilityView();
    toast('Room type saved', 'success');
  } catch (e) {
    toast('Failed to save room type', 'error');
  }
}

async function saveEditedRoomType() {
  const nameEl = document.getElementById('roomsEditNameInput');
  const unitsEl = document.getElementById('roomsEditUnitsInput');
  if (!nameEl || !unitsEl || !editingRoomName) return;

  const newRoomName = nameEl.value.trim();
  const totalUnits = Math.max(0, parseInt(unitsEl.value, 10) || 0);
  if (!newRoomName) {
    toast('Room name is required', 'error');
    return;
  }

  try {
    const data = await api('PUT', '/api/crm/manual-availability/rooms', {
      currentRoomName: editingRoomName,
      newRoomName,
      totalUnits,
    });
    if (!data.success) throw new Error(data.message || 'Failed to update room type');
    manualAvailability = data.data || manualAvailability;
    manualSelectedRoom = newRoomName;
    closeRoomsEditModal();
    refreshRoomBadge();
    renderAvailabilityView();
    toast('Room type updated', 'success');
  } catch (e) {
    toast(e.message || 'Failed to update room type', 'error');
  }
}

async function deleteRoomType(roomName) {
  const room = getManualRoomByName(roomName);
  if (!room) return;

  const confirmDelete = confirm(`Delete room type "${room.name}"? This will also remove its day-by-day overrides.`);
  if (!confirmDelete) return;

  try {
    const data = await api('DELETE', '/api/crm/manual-availability/rooms', { roomName: room.name });
    if (!data.success) throw new Error(data.message || 'Failed to delete room type');
    manualAvailability = data.data || manualAvailability;
    if (manualSelectedRoom === room.name) {
      manualSelectedRoom = (manualAvailability.rooms && manualAvailability.rooms[0] && manualAvailability.rooms[0].name) || '';
    }
    closeAvailabilityDayPopover();
    refreshRoomBadge();
    renderAvailabilityView();
    toast('Room type deleted', 'success');
  } catch (e) {
    toast(e.message || 'Failed to delete room type', 'error');
  }
}

async function applyAvailabilityRange() {
  const roomName = manualSelectedRoom;
  const startDate = (document.getElementById('availabilityRangeStart') || {}).value || '';
  const endDate = (document.getElementById('availabilityRangeEnd') || {}).value || '';
  const unitsRaw = (document.getElementById('availabilityRangeUnits') || {}).value;
  const closed = !!((document.getElementById('availabilityRangeClosed') || {}).checked);

  if (!roomName || !startDate || !endDate) {
    toast('Room and date range are required', 'error');
    return;
  }

  const payload = { roomName, startDate, endDate, closed };
  if (unitsRaw !== '' && unitsRaw !== null && unitsRaw !== undefined) {
    payload.availableUnits = Math.max(0, parseInt(unitsRaw, 10) || 0);
  }

  try {
    const data = await api('POST', '/api/crm/manual-availability/range', payload);
    if (!data.success) throw new Error(data.message || 'Failed to apply override');
    manualAvailability = data.data || manualAvailability;
    renderAvailabilityCalendar();
    toast(`Override applied (${data.affectedDays || 0} days)`, 'success');
  } catch (e) {
    toast('Failed to apply override', 'error');
  }
}

async function clearAvailabilityRange() {
  const roomName = manualSelectedRoom;
  const startDate = (document.getElementById('availabilityRangeStart') || {}).value || '';
  const endDate = (document.getElementById('availabilityRangeEnd') || {}).value || '';
  if (!roomName || !startDate || !endDate) {
    toast('Room and date range are required', 'error');
    return;
  }

  try {
    const data = await api('POST', '/api/crm/manual-availability/range', { roomName, startDate, endDate, clear: true });
    if (!data.success) throw new Error(data.message || 'Failed to clear override');
    manualAvailability = data.data || manualAvailability;
    renderAvailabilityCalendar();
    toast(`Range cleared (${data.affectedDays || 0} days)`, 'success');
  } catch (e) {
    toast('Failed to clear range', 'error');
  }
}

// ── ACTIONS ────────────────────────────────────────────
async function markConfirmed(id) {
  try {
    await api('POST', `/api/crm/bookings/${id}/confirm`);
    bookings = bookings.map(b => b.id === id ? { ...b, callStatus: 'called' } : b);
    
    // Update counts
    const needsCalls = bookings.filter(b => b.callStatus === 'not-called');
    const called = bookings.filter(b => b.callStatus === 'called');
    document.getElementById('countNeedsCalled').textContent = needsCalls.length;
    document.getElementById('countCalled').textContent = called.length;
    document.getElementById('statCount').textContent = needsCalls.length;
    
    applyFilter();
    toast('Marked as called', 'success');
  } catch(e) { toast('Failed to update', 'error'); }
}

// ── NOTES MODAL ────────────────────────────────────────
let currentNoteBookingId = null;

function addNote(id, existingNote = '') {
  currentNoteBookingId = id;
  const modal = document.getElementById('notesModal');
  const input = document.getElementById('noteInput');
  input.value = existingNote;
  modal.style.display = 'flex';
  setTimeout(() => input.focus(), 100);
}

function closeNotesModal(event) {
  if (event && event.target !== event.currentTarget) return;
  const modal = document.getElementById('notesModal');
  modal.style.display = 'none';
  currentNoteBookingId = null;
  document.getElementById('noteInput').value = '';
}

async function saveNote() {
  const note = document.getElementById('noteInput').value.trim();
  if (!note) {
    toast('Please enter a note', 'error');
    return;
  }
  
  try {
    await api('POST', `/api/crm/bookings/${currentNoteBookingId}/note`, { note });
    toast('Note saved', 'success');
    closeNotesModal();
    loadBookings();
  } catch(e) {
    toast('Failed to save note', 'error');
  }
}

// Close modals/popovers on Escape, and submit room modal on Enter
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const modal = document.getElementById('notesModal');
    if (modal.style.display === 'flex') {
      closeNotesModal();
    }
    closeRoomsAddModal();
    closeRoomsEditModal();
    closeAvailabilityDayPopover();
  }

  if (e.key === 'Enter') {
    const roomModal = document.getElementById('roomsAddModalBg');
    const roomEditModal = document.getElementById('roomsEditModalBg');
    if (roomModal && roomModal.classList.contains('open')) {
      e.preventDefault();
      saveRoomType();
      return;
    }
    if (roomEditModal && roomEditModal.classList.contains('open')) {
      e.preventDefault();
      saveEditedRoomType();
    }
  }
});

// ── NOTIFICATIONS ──────────────────────────────────────
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  const output = new Uint8Array(rawData.length);
  for (let i = 0; i < rawData.length; ++i) output[i] = rawData.charCodeAt(i);
  return output;
}

async function enableNotifications() {
  if (!token) { toast('Sign in first', 'error'); return; }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') { toast('Notifications blocked', 'error'); return; }
    const keyRes = await fetch('/api/push/vapid-public');
    const keyData = await keyRes.json().catch(() => ({}));
    if (!keyData.publicKey) { toast('Push not configured', 'error'); return; }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(keyData.publicKey)
    });
    const bufToB64 = buf => btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
    await api('POST', '/api/push/subscribe', {
      endpoint: sub.endpoint,
      p256dh: sub.getKey('p256dh') ? bufToB64(sub.getKey('p256dh')) : '',
      auth: sub.getKey('auth') ? bufToB64(sub.getKey('auth')) : '',
      source: 'simple-crm'
    });
    toast('Notifications enabled', 'success');
    document.getElementById('btnNotify').textContent = '🔔 On';
  } catch(e) { toast('Failed: ' + (e.message || e), 'error'); }
}

// ── HELPERS ────────────────────────────────────────────
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function toast(msg, type = '') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = `${type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ'} ${msg}`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

if (token) {
  verifyCrmToken(token)
    .then(startCrmApp)
    .catch(() => showLogin());
}

setInterval(refreshCurrentView, 30000);
