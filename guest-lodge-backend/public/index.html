    <title>Suite Stay</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #f8faf9;
      }

      .app-boot-loader {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, #ffffff 0%, #f3f8f5 100%);
      }

      .app-boot-loader__mark {
        width: 46px;
        height: 48px;
        background: url('/marketellogo.svg') center / contain no-repeat;
        animation: appBootBounce 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
        filter: drop-shadow(0 10px 18px rgba(46, 125, 91, 0.16));
      }

      @keyframes appBootBounce {
        0%, 100% { transform: translateY(0) scale(1); }
        45% { transform: translateY(-10px) scale(1.04); }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-boot-loader__mark {
          animation: none;
        }
      }
    </style>

    <!-- Webkit/Safari Safety Script -->
    <script>
      (function() {
        // Prevent webkit-specific bugs and ensure compatibility
        if (/Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent)) {
          // Fix for Safari input autofill issues
          document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('input');
            inputs.forEach(function(input) {
              // Force Safari to respect autocomplete attributes
              input.setAttribute('autocomplete', input.getAttribute('autocomplete') || 'off');
            });
          });

          // Fix for Safari scroll issues with fixed elements
          document.addEventListener('touchstart', function() {}, { passive: true });

          console.log('Safari/Webkit optimizations applied');
        }
      })();
    </script>
