<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketel &mdash; Set Up Your Hotel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f9fa; --card: #ffffff; --border: #e5e7eb; --text: #1a1a2e;
  --muted: #6b7280; --green: #2E7D5B; --green-dark: #1a5c3f;
  --green-lt: #e8f5ee; --red: #ef4444; --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08); --r: 16px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.setup-container { max-width: 500px; margin: 0 auto; padding: 32px 20px 100px; }
.setup-container.compact { padding-bottom: 8px; }
.setup-header { text-align: center; margin-bottom: 24px; }
.setup-logo { height: 36px; margin-bottom: 12px; }
.setup-title { font-size: 20px; font-weight: 700; }

.progress-bar { display: flex; gap: 6px; margin-bottom: 28px; }
.progress-step { flex: 1; height: 5px; border-radius: 3px; background: var(--border); transition: background 0.3s; }
.progress-step.done { background: var(--green); }
.progress-step.active { background: var(--green); opacity: 0.6; }

.step { display: none; }
.step.active { display: block; }

.form-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--r); padding: 24px; box-shadow: var(--shadow-md); margin-bottom: 12px;
}
.form-card h2 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
.field input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: 10px; font-family: inherit; font-size: 16px; outline: none;
}
.field input:focus { border-color: var(--green); }

.btn {
  width: 100%; padding: 14px; border-radius: 10px; font-family: inherit;
  font-size: 15px; font-weight: 600; cursor: pointer; border: none;
  transition: all 0.15s;
}
.btn-primary { background: var(--green); color: white; }
.btn-primary:hover { background: var(--green-dark); }
.btn-back {
  background: none; border: 1.5px solid var(--border); color: var(--muted);
  margin-top: 8px;
}
.btn-back:hover { border-color: var(--green); color: var(--green); }

/* Room cards */
.room-item {
  background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
  padding: 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px;
}
.room-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
.room-item-placeholder { width: 50px; height: 50px; border-radius: 8px; background: var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 18px; }
.room-item-info { flex: 1; }
.room-item-name { font-size: 14px; font-weight: 700; }
.room-item-actions { display: flex; gap: 6px; }
.room-item-btn { background: none; border: none; font-size: 12px; color: var(--muted); cursor: pointer; padding: 4px 6px; border-radius: 4px; }
.room-item-btn:hover { color: var(--red); background: #fef2f2; }

/* Image upload */
.upload-area {
  border: 2px dashed var(--border); border-radius: 12px; padding: 24px;
  text-align: center; cursor: pointer; transition: all 0.15s; margin-top: 8px;
}
.upload-area:hover { border-color: var(--green); }
.upload-area p { font-size: 13px; color: var(--muted); }
.upload-preview { margin-top: 8px; }
.upload-preview img { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; margin: 4px; }

/* Live card */
.live-card {
  background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
  border-radius: var(--r); padding: 28px; color: white; text-align: center;
}
.live-card h2 { font-size: 20px; margin-bottom: 8px; }
.live-card p { opacity: 0.85; font-size: 14px; margin-bottom: 16px; }

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--green); color: white; padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); z-index: 300; display: none;
}
.toast.show { display: block; }
.toast.error { background: var(--red); }

/* Full-page iframe steps (mobile only) */
.step-fullpage {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 200;
  background: var(--bg);
  display: none;
  flex-direction: column;
}
.step-fullpage.active {
  display: flex !important;
}
.fullpage-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  padding-top: calc(10px + env(safe-area-inset-top, 0px));
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.fullpage-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
}
.fullpage-back {
  background: none;
  border: none;
  font-size: 18px;
  color: var(--green);
  cursor: pointer;
  padding: 4px 8px;
  font-weight: 600;
}
.fullpage-iframe-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.fullpage-iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}
.fullpage-loading {
  position: absolute;
  inset: 0;
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.fullpage-bottombar {
  padding: 14px 16px;
  padding-bottom: calc(14px + env(safe-area-inset-bottom, 0px));
  background: #f0fdf4;
  border-top: 1.5px solid #bbf7d0;
  flex-shrink: 0;
}
.fullpage-bottombar .btn {
  width: 100%;
}

/* Desktop: revert to inline iframe layout */
@media (min-width: 769px) {
  .step-fullpage {
    position: static;
    z-index: auto;
    background: none;
    flex-direction: column;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }
  .step-fullpage.active {
    display: block !important;
  }
  .fullpage-topbar {
    display: none;
  }
  .fullpage-iframe-wrap {
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    height: 80vh;
    flex: none;
  }
  .fullpage-bottombar {
    background: none;
    border: none;
    box-shadow: none;
    padding: 16px 0;
  }
}

.loading-overlay {
  display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8);
  z-index: 250; align-items: center; justify-content: center;
}
.loading-overlay.show { display: flex; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<body>

<div class="setup-container">
  <div class="setup-header">
    <img src="/marketellogo.svg" alt="Marketel" class="setup-logo">
    <div class="setup-title">Set up your booking engine</div>
  </div>

  <div class="progress-bar">
    <div class="progress-step done" id="prog-1"></div>
    <div class="progress-step" id="prog-2"></div>
  </div>

  <!-- STEP 1: Hotel Name -->
  <div class="step active" id="step-1">
    <div class="form-card">
      <h2>Your hotel</h2>
      <div class="field">
        <label>Hotel Name</label>
        <input type="text" id="hotelName" placeholder="e.g. Sunset Inn">
      </div>
      <button class="btn btn-primary" onclick="saveStep1()">Next &rarr;</button>
    </div>
  </div>

  <!-- STEP 2: Add first room -->
  <div class="step" id="step-2">
    <div class="form-card">
      <h2>Add your first room</h2>
      <div class="field">
        <label>Room Name</label>
        <input type="text" id="rmName" placeholder="e.g. King Suite">
      </div>
      <button class="btn btn-primary" onclick="addRoomAndFinish()">Build My Engine &rarr;</button>
      <button class="btn btn-back" onclick="goToStep(1)">&larr; Back</button>
    </div>
  </div>

  <!-- STEP 3: Success - give them everything -->
  <div class="step" id="step-3">
    <div class="form-card" style="text-align:center;">
      <h2>🎉 You're in!</h2>
      <p style="font-size:14px; color:var(--muted); margin-bottom:16px;">Your booking engine and front desk are ready.</p>
      <div style="background:#e8f5ee; border-radius:12px; padding:14px; font-family:monospace; font-size:14px; color:#2E7D5B; font-weight:600; margin-bottom:14px; word-break:break-all;" id="successDomain"></div>
      <div style="background:#f0f4ff; border:1.5px solid #c7d2fe; border-radius:12px; padding:14px; margin-bottom:14px;">
        <div style="font-size:11px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px;">Front Desk PIN</div>
        <div style="font-family:monospace; font-size:24px; font-weight:700; letter-spacing:3px;" id="successPin"></div>
      </div>
      <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">Tap the ✏️ pencil on your booking site to manage rooms, photos, rates, and availability.</p>
      <a class="btn btn-primary" id="successLink" href="#" target="_blank" style="text-decoration:none; text-align:center; opacity:0.5; pointer-events:none;">Setting up your site...</a>
      <p style="font-size:11px; color:var(--muted); margin-top:20px;">We've emailed your PIN to you.</p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<script>
const TOKEN = window.location.pathname.split('/setup/')[1]?.split('/')[0] || '';
const API = '';
let hotelData = {};
let rooms = [];
let pendingFile = null;

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}
function showLoading(s) { document.getElementById('loadingOverlay').className = 'loading-overlay' + (s ? ' show' : ''); }

function goToStep(n) {
  fetch('/api/funnel/onboarding', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ eventName: 'Step' + n + 'Reached', email: hotelData.id || TOKEN }) }).catch(() => {});
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step-' + n).classList.add('active');
  document.querySelectorAll('.progress-step').forEach((s, i) => {
    s.className = 'progress-step' + (i < n - 1 ? ' done' : i === n - 1 ? ' active' : '');
  });
  window.scrollTo(0, 0);
}

// Load existing data
async function loadSetup() {
  if (!TOKEN) return;
  try {
    const res = await fetch(API + '/api/setup/' + TOKEN);
    if (!res.ok) return;
    const data = await res.json();
    hotelData = data.hotel || {};
    rooms = data.rooms || [];
    if (hotelData.name) document.getElementById('hotelName').value = hotelData.name;
  } catch (e) {}
}

// Step 1: Save hotl info
async function saveStep1() {
  const name = document.getElementById('hotelName').value.trim();
  if (!name) { showToast('Enter your hotel name', true); return; }

  showLoading(true);
  try {
    await fetch(API + '/api/setup/' + TOKEN + '/hotel', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    hotelData = { ...hotelData, name };
    goToStep(2);
  } catch (e) { showToast('Failed to save', true); }
  showLoading(false);
}

// Step 2: Rooms
async function addRoomAndFinish() {
  const name = document.getElementById('rmName').value.trim();
  if (!name) { showToast('Enter a room name', true); return; }

  showLoading(true);
  try {
    // Save room
    const res = await fetch(API + '/api/setup/' + TOKEN + '/rooms', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, maxOccupancy: 4, totalUnits: 5 }),
    });
    if (!res.ok) throw new Error('Server error');

    // Complete setup — get domain + PIN
    const completeRes = await fetch(API + '/api/setup/' + TOKEN + '/complete', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
    });
    const completeData = await completeRes.json();

    // Show success
    console.log('Complete response:', completeData);
    const domain = completeData.bookingUrl || 'https://' + (hotelData.name || 'your-hotel').toLowerCase().replace(/['\u2019]s\b/g, 's').replace(/['\u2019]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') + '.bookmarketel.com';
    document.getElementById('successDomain').textContent = domain.replace('https://', '');
    document.getElementById('successPin').textContent = completeData.crmPin || '----';
    document.getElementById('successLink').href = domain + '?welcome=1&pin=' + encodeURIComponent(completeData.crmPin || '');

    // Enable after 8 seconds (Vercel SSL provisioning time)
    setTimeout(function() {
      var link = document.getElementById('successLink');
      link.textContent = 'Visit Your Site \u2192';
      link.style.opacity = '1';
      link.style.pointerEvents = 'auto';
    }, 8000);

    // Send welcome email
    fetch(API + '/api/setup/' + TOKEN + '/finalize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: '', phone: '', pin: completeData.crmPin || '', domainPref: 'subdomain', customDomain: '' }),
    }).catch(() => {});

    goToStep(3);
  } catch (e) { showToast('Something went wrong. Try again.', true); }
  showLoading(false);
}

loadSetup();
</script>
</body>
</html>
