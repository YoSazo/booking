<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketel — Stop Paying OTAs for Guests Who Already Found You</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fafaf9; --white: #ffffff; --text: #1a1a2e; --muted: #6b7280;
  --green: #2E7D5B; --green-dark: #1a5c3f; --green-lt: #e8f5ee;
  --border: #e5e7eb; --red: #dc2626;
  --shadow: 0 1px 3px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
}
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

/* NAV */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo { height: 30px; }

/* HERO */
.hero {
  padding: 120px 24px 60px; text-align: center; max-width: 680px; margin: 0 auto;
}
.hero h1 {
  font-size: clamp(28px, 5vw, 44px); font-weight: 800; line-height: 1.15;
  margin-bottom: 16px; letter-spacing: -0.5px;
}
.hero h1 .red { color: var(--red); }
.hero h1 .green { color: var(--green); }
.hero p {
  font-size: 16px; color: var(--muted); max-width: 520px;
  margin: 0 auto 28px; line-height: 1.6;
}

/* CTA FORM */
.cta-box {
  max-width: 400px; margin: 0 auto;
}
.cta-box input {
  width: 100%; padding: 14px 16px; border: 1.5px solid var(--border);
  border-radius: 10px; font-family: inherit; font-size: 15px;
  margin-bottom: 10px; outline: none; transition: border-color 0.15s;
}
.cta-box input:focus { border-color: var(--green); }
.cta-btn {
  width: 100%; padding: 15px; background: var(--green); color: white;
  border: none; border-radius: 10px; font-family: inherit; font-size: 16px;
  font-weight: 700; cursor: pointer; transition: all 0.15s;
  box-shadow: 0 4px 12px rgba(46,125,91,0.25);
}
.cta-btn:hover { background: var(--green-dark); transform: translateY(-1px); }
.cta-sub {
  margin-top: 10px; font-size: 12px; color: var(--muted); text-align: center;
}

/* DEMO */
.demo-section {
  padding: 60px 24px 80px; max-width: 900px; margin: 0 auto;
}
.demo-label {
  text-align: center; font-size: 14px; font-weight: 600; color: var(--muted);
  margin-bottom: 16px;
}
.demo-tabs {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 16px;
}
.demo-tab {
  padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--white); color: var(--text); font-family: inherit;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.demo-tab.active { background: var(--green); color: white; border-color: var(--green); }
.demo-view-tabs {
  display: flex; gap: 6px; justify-content: center; margin-bottom: 12px;
}
.demo-view-tab {
  padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--white); color: var(--muted); font-family: inherit;
  font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.demo-view-tab.active { background: var(--green); color: white; border-color: var(--green); }
.demo-frame-wrap {
  max-width: 375px; margin: 0 auto; border-radius: 16px; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid var(--border);
  transition: max-width 0.3s ease;
}
.demo-frame-wrap iframe {
  width: calc(100% + 17px); height: 650px; border: none; display: block;
}

/* BULLETS */
.bullets {
  max-width: 500px; margin: 0 auto; padding: 0 24px 60px;
}
.bullet {
  display: flex; align-items: flex-start; gap: 12px; padding: 12px 0;
}
.bullet-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.bullet-text { font-size: 14px; color: var(--text); line-height: 1.5; }
.bullet-text strong { font-weight: 700; }

@media (max-width: 600px) {
  .hero { padding: 100px 16px 40px; }
  .hero h1 { font-size: 26px; }
  .demo-section { padding: 40px 16px 60px; }
}
</style>
</head>
<body>

<nav class="nav">
  <img src="/marketellogo.svg" alt="Marketel" class="nav-logo">
</nav>

<section class="hero">
  <h1>Stop paying <span class="red">15–25%</span> to OTAs on guests who <span class="green">already found you</span>.</h1>
  <p>Build your hotel's direct booking page in 10 minutes.</p>
  <div class="cta-box">
    <input type="email" id="setupEmail" placeholder="Your email">
    <button class="cta-btn" onclick="startFreeSetup()">Build My Free Preview →</button>
    <div class="cta-sub">No credit card. Takes 10 minutes. Completely free.</div>
  </div>
</section>

<section class="demo-section">
  <div class="demo-label">Hotels using this right now:</div>
  <div class="demo-tabs">
    <button class="demo-tab active" onclick="switchDemo('suite')">Suite Stay — AL</button>
    <button class="demo-tab" onclick="switchDemo('stcroix')">St Croix Falls — WI</button>
  </div>
  <div class="demo-frame-wrap" id="demoWrap" style="max-width:100%; margin:0 16px;">
    <iframe id="demoFrame" src="https://suitestay.clickinns.com" style="width:100%; height:650px;"></iframe>
  </div>
</section>

<script>
function startFreeSetup() {
  const email = document.getElementById('setupEmail').value.trim();
  if (!email || !email.includes('@')) { alert('Enter a valid email.'); return; }
  const btn = document.querySelector('.cta-btn');
  btn.textContent = 'Setting up...'; btn.disabled = true;
  const API = '';
  fetch(API + '/api/setup/start', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email }),
  }).then(r => r.json()).then(data => {
    if (data.setupUrl) { window.location.href = API + data.setupUrl; }
    else { throw new Error(); }
  }).catch(() => {
    alert('Something went wrong. Try again.');
    btn.textContent = 'Build My Free Preview →'; btn.disabled = false;
  });
}

function switchDemo(which) {
  const frame = document.getElementById('demoFrame');
  document.querySelectorAll('.demo-tab').forEach(t => t.classList.remove('active'));
  if (which === 'suite') {
    frame.src = 'https://suitestay.clickinns.com';
    document.querySelectorAll('.demo-tab')[0].classList.add('active');
  } else {
    frame.src = 'https://stcroix.clickinns.com';
    document.querySelectorAll('.demo-tab')[1].classList.add('active');
  }
}

function switchDemoView() {}
</script>
</body>
</html>
